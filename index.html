<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telperion - RRG Tree Builder</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-color: #ffffff;
      --surface: #f5faf7;
      --surface-warm: #eaf3ed;
      --border: #dee2e6;
      --border-light: #e9ecef;
      --text: #212529;
      --text-secondary: #6c757d;
      --accent: #0f5132;
      --accent-hover: #198754;
      --selected: #0d6efd;
      --selected-bg: #e3f2fd;
      --selected-glow: rgba(13, 110, 253, 0.12);
      --danger: #dc3545;
      --level-gap: 16px;
      --equator-gap: 0px;
      --sibling-gap: 30px;
      --equator-item-gap: 20px;
      --font-serif: 'Crimson Pro', Georgia, serif;
      --font-sans: 'Source Sans 3', system-ui, sans-serif;
      --shadow-soft: 0 8px 24px rgba(0,0,0,0.06);
      --shadow-float: 0 12px 32px rgba(0,0,0,0.08);
      --shadow-glow: 0 0 0 3px var(--selected-glow);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    #root { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    body { font-family: var(--font-sans); background: var(--bg-color); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    .topbar { background: var(--surface); padding: 10px 24px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    
    .brand-header { display: flex; align-items: center; gap: 12px; }
    .brand-logo { height: 36px; width: auto; object-fit: contain; }
    .brand-text { display: flex; flex-direction: column; justify-content: center; }
    .brand-title { font-family: var(--font-serif); font-size: 1.35rem; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: 0.05em; text-transform: uppercase; }
    .brand-subtitle { font-family: var(--font-sans); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-top: 3px; font-weight: 600; }

    .btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer; font-weight: 600; transition: all 0.2s ease; font-family: inherit; font-size: 0.875rem; color: var(--text); }
    .btn:hover:not(:disabled) { background: var(--surface-warm); border-color: #ced4da; }
    .btn.btn-no-hover { cursor: default; }
    .btn.btn-no-hover:hover:not(:disabled) { background: white; border-color: unset; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }

    .main-layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; grid-template-rows: 1fr; flex: 1; overflow: hidden; min-width: 0; min-height: 0; width: 100%; isolation: isolate; }

    .canvas-container { width: 100%; min-width: 0; min-height: 0; flex: 1 1 0; overflow-x: auto; overflow-y: auto; position: relative; background: var(--bg-color); display: block; isolation: isolate; }
    
    .tree-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; width: max-content; box-sizing: border-box; padding: 0 32px; transform-origin: 0 0; isolation: isolate; }
    
    .svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
    .svg-layer-back { z-index: 1; }
    .svg-layer-front { z-index: 80; }

    .svg-layer path, .svg-layer polygon { stroke-linejoin: round; }

    .syntax-tree-container { display: flex; justify-content: center; z-index: 2; position: relative; width: max-content; min-width: 100%; min-height: 100px; pointer-events: none; }
    .lexical-equator { position: relative; display: flex; gap: var(--equator-item-gap); justify-content: center; align-items: flex-start; flex-wrap: nowrap; margin-top: var(--equator-gap); pointer-events: none; }

    .init-screen { display: flex; flex-direction: column; align-items: center; flex: 1; min-height: 0; width: 100%; background: #2a4d35; padding: 0; overflow-y: auto; }
    .init-hero { display: flex; flex-direction: column; align-items: center; padding: 40px 20px 28px; width: 100%; }
    .init-hero img { height: auto; max-height: 200px; max-width: 90%; margin-bottom: 0; }
    .init-container { display: flex; gap: 20px; max-width: 960px; width: 100%; align-items: stretch; padding: 0 20px; }
    .init-box { background: #f5faf7; padding: 32px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); flex: 1; display: flex; flex-direction: column; }
    .init-box .sentence-input { background: white; border-color: var(--border); color: var(--text); }
    .init-box .sentence-input::placeholder { color: #adb5bd; }
    .init-box .sentence-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10); }
    .init-screen .app-footer { background: transparent; border-top: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); }
    .init-screen .app-footer a { color: rgba(255,255,255,0.7); }
    .init-screen .app-footer a:hover { color: white; }
    .init-screen .app-footer img { filter: invert(1); opacity: 0.4; }
    .init-screen .app-footer img:hover { opacity: 0.7; }
    
    .sidebar { width: 300px; min-width: 300px; max-width: 300px; background: var(--surface); border-left: 1px solid var(--border-light); padding: 20px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 24px; box-shadow: -4px 0 16px rgba(0,0,0,0.03); z-index: 10; height: 100%; }
    .sidebar-section { display: flex; flex-direction: column; gap: 10px; }
    .sidebar-title { font-family: var(--font-serif); font-size: 1rem; text-transform: none; letter-spacing: 0.01em; color: var(--accent); font-weight: 600; margin-bottom: 4px; border-bottom: 1px solid var(--border-light); padding-bottom: 6px; }
    
    .action-row { display: flex; gap: 8px; }
    .action-row button { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer; font-family: inherit; font-size: 0.85rem; color: var(--text); transition: all 0.2s ease; }
    .action-row button:hover:not(:disabled) { background: var(--surface-warm); border-color: #ced4da; }
    .action-row button:disabled { opacity: 0.45; cursor: not-allowed; }

    .joined-row { display: flex; width: 100%; }
    .joined-row button { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 10px; background: white; cursor: pointer; font-family: inherit; font-size: 0.85rem; color: var(--text); transition: all 0.2s ease; }
    .joined-row button:hover:not(:disabled) { background: var(--surface-warm); border-color: #ced4da; }
    .joined-row button:disabled { opacity: 0.45; cursor: not-allowed; }
    .joined-row button:first-child { border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .joined-row button:last-child { border-top-left-radius: 0; border-bottom-left-radius: 0; }
    .joined-row button + button { margin-left: -1px; }

    .tree-node { display: flex; flex-direction: column; align-items: center; position: relative; flex: 0 0 auto; pointer-events: none; overflow: visible; }
    .node-content { margin-bottom: var(--level-gap); position: relative; display: flex; justify-content: center; align-items: center; min-height: 32px; overflow: visible; isolation: isolate; }
    
    .node-label { 
      position: relative; 
      padding: 4px 10px;
      border: 2px solid transparent; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 16px;
      min-width: 0;
      min-height: 28px;
      height: auto;
      display: inline-flex; 
      align-items: center; 
      justify-content: center; 
      background: var(--bg-color); 
      transition: all 0.2s ease; 
      pointer-events: auto; 
    }
    .node-label:hover { border-color: var(--border-light); background: rgba(248,249,250,0.9); }
    .node-label.selected { border-color: var(--accent); background: rgba(15, 81, 50, 0.04); box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10); }
    
    .node-chevron {
      position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
      display: flex; align-items: center; justify-content: center; width: 20px; height: 20px;
      border-radius: 4px; color: var(--accent); cursor: pointer; pointer-events: auto;
      z-index: 30; transition: transform 0.2s ease, color 0.2s ease, background 0.15s ease;
    }
    .node-chevron:hover { color: var(--accent-hover); background: rgba(15, 81, 50, 0.06); }
    .node-chevron.active { transform: translateY(-50%) rotate(180deg); }
    .node-chevron svg { width: 10px; height: 6px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .node-action-btn {
      position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #198754; color: #fff;
      border: 1px solid rgba(0,0,0,0.12); box-shadow: 0 2px 8px rgba(0,0,0,0.14); display: flex; align-items: center;
      justify-content: center; font-size: 14px; font-weight: 800; line-height: 1; cursor: pointer; user-select: none;
      pointer-events: auto; z-index: 60;
    }
    .node-label .node-action-btn { opacity: 0; pointer-events: none; transform-origin: center; transition: opacity 0.12s ease, transform 0.12s ease, filter 0.12s ease; }
    .node-label:hover .node-action-btn, .node-label.selected .node-action-btn { opacity: 1; pointer-events: auto; }
    .node-label .node-action-btn.bottom-center { transform: translateX(-50%) scale(0.96); }
    .node-label:hover .node-action-btn.bottom-center, .node-label.selected .node-action-btn.bottom-center { transform: translateX(-50%) scale(1); }
    .node-label .node-action-btn.left-center, .node-label .node-action-btn.right-center { transform: translateY(-50%) scale(0.96); }
    .node-label:hover .node-action-btn.left-center, .node-label.selected .node-action-btn.left-center,
    .node-label:hover .node-action-btn.right-center, .node-label.selected .node-action-btn.right-center { transform: translateY(-50%) scale(1); }
    .node-action-btn:hover { filter: brightness(0.96); }
    .node-action-btn.bottom-center { left: 50%; bottom: -11px; }
    .node-action-btn.left-center { left: -11px; top: 50%; }
    .node-action-btn.right-center { right: -11px; top: 50%; }
    .node-action-btn.arrow { font-size: 9px; font-weight: 900; }
    .node-action-btn:active { transform: translateX(-50%) scale(0.9); filter: brightness(0.8); }
    
    .node-label.is-editing .node-display { opacity: 0; pointer-events: none; }
    .node-display { white-space: pre; display: inline-flex; align-items: center; justify-content: center; height: 100%; line-height: 1; }

    .node-display.placeholder { color: #adb5bd; border: 1.5px dashed #ced4da; background: rgba(227, 242, 253, 0.25); padding: 2px 12px; border-radius: 6px; min-width: 40px; }
    .node-display.placeholder::before { content: "✎ "; opacity: 0.4; font-size: 13px; }
    
    .node-input { 
      position: absolute; inset: 0; font-family: inherit; font-size: 16px; font-style: inherit; font-weight: inherit;
      color: inherit; line-height: 28px; text-align: center; padding: 0 4px; border: 2px solid var(--accent); 
      border-radius: 6px; outline: none; box-sizing: border-box; background: rgba(255,255,255,0.98);
      box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10); margin: 0; z-index: 20; min-width: 100%; width: 100%; height: 100%;
      appearance: none; -webkit-appearance: none; vertical-align: top; pointer-events: auto;
    }

    .dropdown-list {
      position: absolute; top: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: white;
      border: 1px solid var(--border-light); border-radius: 10px; box-shadow: var(--shadow-float); max-height: 240px;
      overflow-y: auto; z-index: 20000; width: max-content; min-width: 160px; max-width: 280px; padding: 10px;
      list-style: none; pointer-events: auto;
    }
    .dropdown-list .no-label { display: block; font-size: 12px; color: var(--text-secondary); cursor: pointer; font-style: italic; text-align: center; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border-light); transition: color 0.15s ease; }
    .dropdown-list .no-label:hover { color: var(--danger); }
    .dropdown-list .pills-container { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
    .dropdown-list .pill-item { padding: 4px 10px; font-size: 13px; border-radius: 6px; cursor: pointer; background: var(--surface); border: 1px solid var(--border-light); font-weight: 600; color: var(--text); transition: all 0.15s ease; font-family: var(--font-sans); white-space: nowrap; }
    .dropdown-list .pill-item:hover { background: var(--accent); color: white; border-color: var(--accent); }

    .node-number-input { font-family: inherit; font-size: 15px; padding: 4px 4px 4px 12px; border: 1px solid var(--border); border-radius: 6px; width: 60px; outline: none; text-align: center; font-weight: 400; color: var(--text); background: white; transition: all 0.2s ease; }
    .node-number-input:focus { border-color: var(--selected); box-shadow: var(--shadow-glow); }
    .node-number-input::-webkit-inner-spin-button, .node-number-input::-webkit-outer-spin-button { opacity: 1; height: 28px; cursor: pointer; }

    .node-select { font-family: inherit; font-size: 14px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; width: 100%; outline: none; cursor: pointer; pointer-events: auto; transition: all 0.2s ease; }
    .node-select:focus { border-color: var(--selected); box-shadow: var(--shadow-glow); }
    
    .node-children { display: flex; justify-content: center; gap: var(--sibling-gap); position: relative; align-items: flex-start; pointer-events: none; }
    .equator-item { font-style: normal; font-weight: 400; color: var(--text); padding: 0 10px; pointer-events: auto; } 

    .operator-layer-content { pointer-events: none; }
    .operator-label { pointer-events: auto; font-size: 15px; }

    .zoom-controls { position: absolute; top: 10px; right: 10px; display: flex; align-items: center; gap: 2px; background: rgba(255,255,255,0.95); border: 1px solid var(--border-light); border-radius: 8px; padding: 4px; z-index: 200; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; box-shadow: var(--shadow-soft); }
    .zoom-controls.visible { opacity: 0.6; pointer-events: auto; }
    .zoom-controls.visible:hover { opacity: 1; }
    .zoom-btn { width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: var(--text); border-radius: 4px; transition: background 0.2s ease; }
    .zoom-btn:hover:not(:disabled) { background: rgba(0,0,0,0.06); }
    .zoom-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .zoom-indicator { min-width: 44px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-radius: 4px; transition: background 0.2s ease, color 0.2s ease; user-select: none; }
    .zoom-indicator:hover { background: rgba(0,0,0,0.06); color: var(--text); }

    .autosave-indicator { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; background: rgba(255,255,255,0.95); border: 1px solid var(--border-light); border-radius: 8px; padding: 6px 12px; z-index: 200; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; box-shadow: var(--shadow-soft); font-size: 12px; color: var(--text-secondary); }
    .autosave-indicator.visible { opacity: 0.6; pointer-events: auto; }
    .autosave-indicator.visible:hover { opacity: 1; }
    .autosave-indicator span { color: var(--accent-hover); }

    .app-footer { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 12px 24px; font-size: 0.85rem; color: #495057; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .app-footer a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .app-footer a:hover { text-decoration: underline; color: var(--accent-hover); }
    .app-footer img { height: 24px; opacity: 0.85; transition: opacity 0.2s ease; }
    .app-footer img:hover { opacity: 1; }

    .sentence-input { width: 100%; padding: 12px 16px; font-size: 1.1rem; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font-sans); outline: none; transition: all 0.2s ease; background: white; color: var(--text); }
    .sentence-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10); }
    .sentence-input::placeholder { color: #adb5bd; font-style: italic; }

    .ipa-toggle-btn { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-family: var(--font-sans); font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); transition: all 0.2s ease; white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .ipa-toggle-btn:hover { background: var(--surface-warm); border-color: #ced4da; color: var(--text); }
    .ipa-toggle-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .ipa-toggle-btn.active:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .ipa-inline-btn{ padding: 4px 8px; border: 1.5px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-family: var(--font-sans); font-size: 12px; line-height: 1; box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
    .ipa-inline-btn:hover{ border-color: var(--accent); color: var(--accent); }

    .ipa-panel { background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 8px; box-shadow: var(--shadow-soft); max-height: 260px; overflow-y: auto; position: relative; z-index: 20001; }
    .ipa-category-title { font-family: var(--font-sans); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-secondary); margin-top: 8px; margin-bottom: 4px; padding-left: 2px; }
    .ipa-category-title:first-child { margin-top: 0; }
    .ipa-grid { display: flex; flex-wrap: wrap; gap: 3px; }
    .ipa-char-btn { width: 32px; height: 32px; border: 1px solid var(--border-light); border-radius: 5px; background: var(--surface); cursor: pointer; font-family: var(--font-sans); font-size: 1.05rem; color: var(--text); display: flex; align-items: center; justify-content: center; transition: all 0.15s ease; padding: 0; }
    .ipa-char-btn:hover { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.12); }
    .ipa-char-btn:active { transform: scale(0.95); }

    .segment-workspace { background: var(--surface); border-radius: 8px; border: 1.5px solid var(--border-light); padding: 20px; margin: 16px 0 24px 0; }
    .word-flow { display: flex; flex-wrap: wrap; align-items: center; padding: 8px 0; min-height: 44px; gap: 0; user-select: none; }
    .word-token { padding: 6px 3px; font-size: 1.05rem; color: var(--text); line-height: 1.4; }
    .cut-zone { width: 24px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; border-radius: 4px; transition: background 0.15s ease; }
    .cut-zone::after { content: ''; display: block; width: 2px; height: 0; border-radius: 1px; transition: all 0.2s ease; }
    .cut-zone:hover { background: rgba(15, 81, 50, 0.05); }
    .cut-zone:hover::after { height: 70%; background: var(--border); }
    .cut-zone.active::after { height: 85%; background: var(--accent); }
    .cut-zone.active:hover::after { background: var(--danger); }
    .segment-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-light); min-height: 32px; align-items: center; }
    .segment-chip { padding: 5px 14px; background: white; border: 1px solid var(--border); border-radius: 20px; font-size: 0.9rem; color: var(--text); font-family: var(--font-sans); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

    const generateId = () => Math.random().toString(36).substring(2, 9);
    const MAX_HISTORY = 100;
    const BASE_TREE_PADDING_TOP = 40;
    const TREE_PADDING_SIDE = 96;
    const TREE_PADDING_BOTTOM = 56;
    const MIN_VISIBLE_TOP_GAP = 24;
    const NODE_INSERT_Y_OFFSET = 48;
    const COLLISION_MIN_NODE_GAP = 18;
    const COLLISION_LEVEL_BAND = 22;
    const PERIPHERY_MIN_EDGE_GAP = 32;
    const EQUATOR_MIN_ITEM_GAP = 22;

    const ZOOM_MIN = 60;
    const ZOOM_MAX = 150;
    const ZOOM_STEP = 10;

    // --- RRG Dictionary ---
    const RRG_LABELS = [
      "SENTENCE", "CLAUSE", "CORE", "NUC", "PRED", "PERIPHERY", "AUX",
      "PrDP", "PoDP", "PrCS", "PoCS", "ECS", "LM", "ARG",
      "RP", "PP", "MP", "XP",
      "CORE_P", "NUC_P",
      "CORE_R", "NUC_R", "RPIP", "RPFP",
      "CORE_M", "NUC_M",
      "CORE_W", "NUC_W", "AFF", "CL",
      "V", "N", "P", "ADJ", "ADV", "N_PROP", "PRO",
    ];

    const RRG_OPERATOR_STRATA = [
      "V", "N",
      "NUC", "CORE", "CLAUSE", "SENTENCE",
      "NUC_P", "CORE_P", "PP",
      "NUC_R", "CORE_R", "RP",
      "NUC_M", "CORE_M", "MP",
    ];

    const RRG_OPERATOR_LABELS = [
      "ASP", "NEG", "DIR_NUC", "DIR_CORE", "EVQ", "MOD", "STA", "TNS", "EVID", "IF",
      "NASP", "NUM", "DEF", "DEIC"
    ];

    const RRG_INFO_STRUCTURE_LABELS = [
      "IU", "{IU}", "{IU", "IU}", "IU}top", "IU}comm", "{IU}top", "{IU}comm"
    ];

    const renderInfoLabel = (text) => {
      if (!text) return text;
      
      // Detecta el formato especial de RRG para extraer el superíndice (ej: {IU}top)
      const match = text.match(/^(.+\})(\w+)$/);
      if (match) {
        return React.createElement('span', { style: { display: 'inline-flex', alignItems: 'flex-start' } },
          // Pasa la primera parte ({IU}) por nuestro motor de formato
          React.createElement('span', null, renderLabel(match[1])),
          // Pasa la segunda parte (top) por nuestro motor de formato y la hace superíndice
          React.createElement('sup', { style: { fontSize: '0.65em', lineHeight: '1' } }, renderLabel(match[2]))
        );
      }
      
      // Si no es un nodo especial con "}", pasa el texto entero por el motor
      return renderLabel(text);
    };

    const renderLabel = (text) => {
      if (!text || typeof text !== 'string') return text;
      
      // Si no hay formatos, devolvemos el texto normal para ahorrar recursos
      if (!text.includes('_') && !text.includes('*') && !text.includes('%')) return text;

      const elements = [];
      let currentText = '';
      
      // "Interruptores" de estilo
      let isItalic = false;
      let isSmallCaps = false;
      let isSubscript = false;
      let isSuperscript = false;

      // Función que empaqueta el texto acumulado con los estilos activos
      const pushElement = (idx) => {
        if (!currentText) return;
        
        const style = {};
        if (isItalic) style.fontStyle = 'italic';
        if (isSmallCaps) {
          style.fontVariant = 'small-caps';
          style.textTransform = 'lowercase';
          style.fontWeight = 500;
          style.fontSize = (isSubscript || isSuperscript) ? '0.75em' : '1.05em';
        } else if (isSubscript || isSuperscript) {
          style.fontSize = '0.7em';
        }
        
        // Alineación vertical nativa
        if (isSubscript) style.verticalAlign = 'sub';
        if (isSuperscript) style.verticalAlign = 'super';

        elements.push(React.createElement('span', { key: `chunk-${idx}`, style }, currentText));
        currentText = ''; 
      };

      // Leemos el texto carácter por carácter
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        
        // Detectar doble guion bajo para el superíndice
        if (char === '_' && text[i+1] === '_') {
          pushElement(i);
          isSuperscript = !isSuperscript; 
          i++; // Nos saltamos el segundo guion bajo
          continue;
        }

        if (char === '*') {
          pushElement(i);
          isItalic = !isItalic; 
        } else if (char === '%') {
          pushElement(i);
          isSmallCaps = !isSmallCaps; 
        } else if (char === '_') {
          pushElement(i);
          isSubscript = !isSubscript; 
        } else {
          currentText += char; 
        }
      }
      
      pushElement('end');

      // Usamos un span normal para que la alineación vertical funcione perfectamente
      return React.createElement('span', null, ...elements);
    };

    const debounce = (func, delay) => {
      let timeout;
      return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func(...args), delay); };
    };

    const formatTimeAgo = (date) => {
      const seconds = Math.floor((Date.now() - date) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes === 1) return '1 minute ago';
      if (minutes < 60) return `${minutes} minutes ago`;
      const hours = Math.floor(minutes / 60);
      if (hours === 1) return '1 hour ago';
      return `${hours} hours ago`;
    };

    const IPA_CATEGORIES = [
      { title: 'Vowels', chars: 'i y ɨ ʉ ɯ u ɪ ʏ ʊ e ø ɘ ɵ ɤ o ə ɛ œ ɜ ɞ ʌ ɔ æ ɐ a ɶ ɑ ɒ'.split(' ') },
      { title: 'Plosives', chars: 'p b t d ʈ ɖ c ɟ k ɡ q ɢ ʔ'.split(' ') },
      { title: 'Nasals', chars: 'm ɱ n ɳ ɲ ŋ ɴ'.split(' ') },
      { title: 'Fricatives', chars: 'ɸ β f v θ ð s z ʃ ʒ ʂ ʐ ç ʝ x ɣ χ ʁ ħ ʕ h ɦ'.split(' ') },
      { title: 'Approximants', chars: 'ʋ ɹ ɻ j ɰ l ɭ ʎ ʟ'.split(' ') },
      { title: 'Others', chars: 'ʙ r ʀ ⱱ ɾ ɽ ɬ ɮ ɺ ʘ ǀ ǃ ǂ ǁ ɓ ɗ ʄ ɠ ʛ'.split(' ') },
      { title: 'Suprasegmentals', chars: 'ˈ ˌ ː ˑ ̆  ‿ | ‖'.split(' ') },
      { title: 'Diacritics', chars: '̥ ̬ ̤ ̰ ̼ ʰ ʷ ʲ ˠ ˤ ⁿ ˡ ̹ ̜ ̟ ̠ ̈ ̽ ̩ ̯ ˞ ̃ ̴'.split(' ') },
      { title: 'Tones', chars: '˥ ˦ ˧ ˨ ˩ ↗ ↘'.split(' ') },
      { title: 'Brackets', chars: '/ [ ]'.split(' ') },
    ];

    const TreeNode = ({ 
      node, selectedId, editingId, shifts = {}, 
      onNodeClick, onLabelChange, onEditEnd, onAddChild
    }) => {
      const isSelected = selectedId === node.id;
      const isEditing = editingId === node.id;
      const [localVal, setLocalVal] = useState(node.label === '...' ? '' : node.label);
      const [showDropdown, setShowDropdown] = useState(false);
      const inputRef = useRef(null);

      const isEditingAncestor = useMemo(() => {
        if (!editingId) return false;
        const check = (n) => {
          if (!n) return false;
          if (n.id === editingId) return true;
          if (n.children?.some(check)) return true;
          if (n.peripheries?.some(check)) return true;
          return false;
        };
        return node.children?.some(check) || node.peripheries?.some(check);
      }, [node, editingId]);

      useEffect(() => {
        if (isEditing) {
          setLocalVal(node.label === '...' ? '' : node.label);
          setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 0);
        } else {
          setShowDropdown(false);
        }
      }, [isEditing, node.label]);

      const selectLabel = (lbl) => {
        const finalLabel = lbl === 'NO LABEL' ? '...' : lbl;
        onLabelChange(node.id, finalLabel);
        setLocalVal(finalLabel === '...' ? '' : finalLabel);
        setShowDropdown(false);
        onEditEnd();
      };

      const handleLabelClick = (e) => {
        e.stopPropagation();
        if (!isEditing) onNodeClick(e, node.id);
      };

      const handleChevronMouseDown = (e) => {
        e.preventDefault(); 
        e.stopPropagation();
        if (!isEditing) {
          onNodeClick(e, node.id); 
          setShowDropdown(true);   
        } else {
          setShowDropdown(prev => !prev);
          if (inputRef.current) inputRef.current.focus();
        }
      };

      const offsetY = node.manualYOffset || 0;
      const offsetX = node.manualXOffset || 0;
      const shiftX = (shifts[node.id] || 0) + offsetX;
      
      const shiftStyle = { 
        transform: (shiftX || offsetY) ? `translate(${shiftX}px, ${offsetY}px)` : 'none',
        zIndex: isEditing ? 10000 : (isEditingAncestor ? 9999 : '') 
      };
      
      const leftPerifs = (node.peripheries || []).filter(p => p.side === 'left');
      const rightPerifs = (node.peripheries || []).filter(p => p.side === 'right');

      const isPlaceholder = !node.label || node.label === '...';
      // Filtrado insensible a mayúsculas/minúsculas:
      const filteredLabels = RRG_LABELS.filter(l => l.toLowerCase().includes(localVal.toLowerCase()));
      const inputWidth = Math.max(100, (localVal.length + 1) * 10);

      const NodeCore = (
        <div className="tree-node" data-node-id={node.id} style={shiftStyle}>
          <div className="node-content" style={{ zIndex: isEditing ? 10000 : (isEditingAncestor ? 9999 : 2) }}>
            <div className={`node-label ${isSelected && !isEditing ? 'selected' : ''} ${isEditing ? 'is-editing' : ''}`} onClick={handleLabelClick}>
              <div className={`node-display ${isPlaceholder ? 'placeholder' : ''}`}>
                {isPlaceholder ? '...' : renderLabel(node.label)}
              </div>

              {!isEditing && (
                <div className="node-action-btn bottom-center" title="Add child" onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }} onClick={(e) => { e.stopPropagation(); onAddChild && onAddChild(node.id); }}>+</div>
              )}

              {isEditing && (
                <>
                  <input 
                    ref={inputRef} className="node-input"
                    style={{ width: `${inputWidth}px`, left: '50%', transform: 'translateX(-50%)', paddingRight: '24px' }}
                    value={localVal} size={Math.max(3, localVal.length)}
                    onChange={(e) => { setLocalVal(e.target.value); setShowDropdown(true); }}
                    onBlur={(e) => { onLabelChange(node.id, e.target.value || '...'); onEditEnd(); }}
                    onKeyDown={(e) => { 
                      if (e.key === 'Enter') { onLabelChange(node.id, localVal || '...'); onEditEnd(); }
                      else if (e.key === 'Escape') { if (showDropdown) { setShowDropdown(false); e.stopPropagation(); } else { onEditEnd(); } }
                    }}
                    onFocus={(e) => e.target.select()}
                  />

                  <div className={`node-chevron ${showDropdown ? 'active' : ''}`} onMouseDown={handleChevronMouseDown} onClick={(e) => e.stopPropagation()} style={{ right: `calc(50% - ${inputWidth / 2}px + 4px)` }}>
                    <svg viewBox="0 0 10 6"><path d="M1 1L5 5L9 1"/></svg>
                  </div>

                  {showDropdown && (
                    <div className="dropdown-list">
                      <div className="no-label" onMouseDown={(e) => { e.preventDefault(); selectLabel('NO LABEL'); }}>no label</div>
                      <div className="pills-container">
                        {filteredLabels.map(lbl => (
                          <span key={lbl} className="pill-item" onMouseDown={(e) => { e.preventDefault(); selectLabel(lbl); }}>{renderLabel(lbl)}</span>
                        ))}
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
          
          {node.children && node.children.length > 0 && (
            <div className="node-children">
              {node.children.map(child => <TreeNode key={child.id} node={child} selectedId={selectedId} editingId={editingId} shifts={shifts} onNodeClick={onNodeClick} onLabelChange={onLabelChange} onEditEnd={onEditEnd} onAddChild={onAddChild} />)}
            </div>
          )}
        </div>
      );

      if (leftPerifs.length === 0 && rightPerifs.length === 0) return NodeCore;

      return (
        <div style={{ display: 'flex', gap: '40px', alignItems: 'flex-start', width: 'max-content', pointerEvents: 'none' }}>
          {leftPerifs.map(p => <TreeNode key={p.id} node={p} selectedId={selectedId} editingId={editingId} shifts={shifts} onNodeClick={onNodeClick} onLabelChange={onLabelChange} onEditEnd={onEditEnd} onAddChild={onAddChild} />)}
          {NodeCore}
          {rightPerifs.map(p => <TreeNode key={p.id} node={p} selectedId={selectedId} editingId={editingId} shifts={shifts} onNodeClick={onNodeClick} onLabelChange={onLabelChange} onEditEnd={onEditEnd} onAddChild={onAddChild} />)}
        </div>
      );
    };

    const ExpressionItem = ({ expr, selectedId, editingId, shifts = {}, onSelect, onChange, onEndEdit, showOperators = true, showInfoStructure = true, projectionFocus = 'all', onAddOperatorLayerAfter, onAddOperatorToLayer, hasSecondaryGloss }) => {
      const isSelected = selectedId === expr.id;
      const isEditing = editingId === expr.id;
      const isEditingGloss = editingId === expr.id + '-gloss';
      
      const [localVal, setLocalVal] = useState(expr.label === '...' ? '' : expr.label);
      const [localGlossVal, setLocalGlossVal] = useState((expr.secondaryGloss === '...' || expr.secondaryGloss === '\u00A0') ? '' : (expr.secondaryGloss || ''));
      
      const inputRef = useRef(null);
      const glossInputRef = useRef(null);
      const [showIPAInline, setShowIPAInline] = useState(false);

      useEffect(() => { if (isEditing) setLocalVal(expr.label === '...' ? '' : expr.label); }, [isEditing, expr.label]);
      useEffect(() => { if (isEditingGloss) setLocalGlossVal((expr.secondaryGloss === '...' || expr.secondaryGloss === '\u00A0') ? '' : (expr.secondaryGloss || '')); }, [isEditingGloss, expr.secondaryGloss]);
      useEffect(() => { if (!isEditing) setShowIPAInline(false); }, [isEditing]);
      
      const insertIPAInlineChar = (char) => {
        const input = inputRef.current;
        const start = input && typeof input.selectionStart === 'number' ? input.selectionStart : localVal.length;
        const end = input && typeof input.selectionEnd === 'number' ? input.selectionEnd : start;
        const newVal = localVal.substring(0, start) + char + localVal.substring(end);
        setLocalVal(newVal);
        setTimeout(() => {
          if (!inputRef.current) return;
          inputRef.current.focus();
          const pos = start + char.length;
          inputRef.current.setSelectionRange(pos, pos);
        }, 0);
      };

      const shiftStyle = { 
        transform: shifts[expr.id] ? `translateX(${shifts[expr.id]}px)` : 'none',
        zIndex: isEditing || isEditingGloss ? 10000 : ''
      };

      const isPlaceholder = !expr.label || expr.label === '...' || expr.label === '∅';
      const inputWidth = Math.max(100, (localVal.length + 1) * 10);

      const hasOps = expr.operatorLayers && expr.operatorLayers.length > 0;
      const hasIS = !!expr.infoUnit;
      const opacityOp = (showOperators && showInfoStructure && projectionFocus === 'IS') ? 0.25 : 1;
      const opacityIS = (showOperators && showInfoStructure && projectionFocus === 'OP') ? 0.25 : 1;

      return (
        <div className="tree-node" data-expr-id={expr.id} style={shiftStyle}>
          <div className="node-content" style={{ marginBottom: hasSecondaryGloss ? '25px' : 0, zIndex: isEditing || isEditingGloss ? 10000 : 2, position: 'relative' }}>
            <div 
              className={`node-label equator-item ${isSelected && !isEditing ? 'selected' : ''} ${isEditing ? 'is-editing' : ''}`} 
              onClick={(e) => onSelect(e, expr.id)}
            >
              <div className={`node-display ${isPlaceholder ? 'placeholder' : ''}`}>
                {isPlaceholder ? '...' : renderLabel(expr.label)}
              </div>

              {isEditing && (
                <>
                  <input 
                    ref={inputRef}
                    className="node-input equator-item"
                    style={{ width: `${inputWidth}px`, left: '50%', transform: 'translateX(-50%)' }}
                    autoFocus value={localVal} size={Math.max(3, localVal.length)}
                    onChange={(e) => setLocalVal(e.target.value)}
                    onBlur={(e) => { onChange(expr.id, e.target.value); onEndEdit(); }}
                    onKeyDown={(e) => { 
                      if (e.key === 'Enter') { e.preventDefault(); onChange(expr.id, localVal); onEndEdit(); }
                      if (e.key === 'Escape') { e.preventDefault(); setLocalVal(expr.label); onEndEdit(); }
                    }}
                  />

                  <button type="button" className="ipa-inline-btn" title="Insert IPA character" onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }} onClick={(e) => { e.preventDefault(); e.stopPropagation(); setShowIPAInline(prev => !prev); }} style={{ position: 'absolute', top: '0%', left: `calc(50% + ${Math.round(inputWidth/2) + 6}px)`, transform: 'none', zIndex: 10002, background: 'var(--accent)', color: '#ffffff', border: 'none', width: '22px', height: '22px', borderRadius: '6px', fontWeight: 800, lineHeight: '22px', cursor: 'pointer', boxShadow: '0 1px 3px rgba(0,0,0,0.25)' }}>ə</button>

                  {showIPAInline && (
                    <div className="ipa-panel ipa-panel-inline" onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }} style={{ position: 'absolute', top: '0', left: `calc(50% + ${Math.round(inputWidth/2) + 32}px)`, transform: 'none', zIndex: 10003, width: '380px' }}>
                      {IPA_CATEGORIES.map((cat) => (
                        <div key={cat.title}>
                          <div className="ipa-category-title">{cat.title}</div>
                          <div className="ipa-grid">
                            {cat.chars.map((ch, j) => (
                              <button key={j} type="button" className="ipa-char-btn" onClick={() => insertIPAInlineChar(ch)} title={ch}>{ch}</button>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              )}
            </div>

            {hasSecondaryGloss && (
              <div
                className={`node-label gloss-label ${selectedId === expr.id + '-gloss' && !isEditingGloss ? 'selected' : ''} ${isEditingGloss ? 'is-editing' : ''}`}
                onClick={(e) => onSelect(e, expr.id + '-gloss')}
                style={{
                  position: 'absolute',
                  top: '100%',
                  marginTop: '-3px',
                  left: '50%',
                  transform: 'translateX(-50%)',
                  minHeight: '28px',
                  minWidth: '100%',
                  width: 'max-content',
                  background: 'white',
                  border: 'none',
                  borderRadius: '6px',
                  zIndex: 65,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  fontSize: '14px',
                  fontWeight: 400,
                  color: 'var(--text)',
                  padding: '2px 8px'
                }}
              >
                {!isEditingGloss && (
                  <div className={`node-display ${!expr.secondaryGloss || expr.secondaryGloss === '...' ? 'placeholder' : ''}`} style={{ minWidth: 0 }}>
                    {(!expr.secondaryGloss || expr.secondaryGloss === '...') ? '...' : renderLabel(expr.secondaryGloss)}
                  </div>
                )}
                {isEditingGloss && (
                  <input
                    ref={glossInputRef}
                    className="node-input equator-item"
                    style={{ width: '100%', left: 0, transform: 'none', fontWeight: 400, color: 'var(--text)' }}
                    autoFocus
                    value={localGlossVal}
                    onChange={(e) => setLocalGlossVal(e.target.value)}
                    onBlur={(e) => { onChange(expr.id, e.target.value, true); onEndEdit(); }}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter') { e.preventDefault(); onChange(expr.id, localGlossVal, true); onEndEdit(); }
                      if (e.key === 'Escape') { e.preventDefault(); setLocalGlossVal((expr.secondaryGloss === '\u00A0') ? '' : (expr.secondaryGloss || '')); onEndEdit(); }
                    }}
                  />
                )}
              </div>
            )}
          </div>

          <div style={{ display: 'flex', flexDirection: 'row', alignItems: 'flex-start', justifyContent: 'center', gap: (hasOps && hasIS) ? '40px' : '0' }}>
            {showInfoStructure && hasIS && (
              <div className="is-spine" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', transition: 'opacity 0.3s ease', opacity: opacityIS }}>
                <InfoStructureNode unit={expr.infoUnit} selectedId={selectedId} editingId={editingId} onSelect={onSelect} onChange={onChange} onEndEdit={onEndEdit} />
              </div>
            )}
            {showOperators && hasOps && (
              <div className="operator-spine" style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', transition: 'opacity 0.3s ease', opacity: opacityOp }}>
                {expr.operatorLayers.map((layer) => (
                  <OperatorLayerItem key={layer.id} layer={layer} selectedId={selectedId} editingId={editingId} onSelect={onSelect} onChange={onChange} onEndEdit={onEndEdit} canAddChild={!!(expr.operatorLayers && (expr.operatorLayers[expr.operatorLayers.length - 1]?.id === layer.id))} onAddChildLayer={onAddOperatorLayerAfter} onAddOperatorLeft={(layerId) => onAddOperatorToLayer(layerId, 'left')} onAddOperatorRight={(layerId) => onAddOperatorToLayer(layerId, 'right')} />
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    const OperatorLayerItem = ({ layer, selectedId, editingId, onSelect, onChange, onEndEdit, canAddChild = false, onAddChildLayer, onAddOperatorLeft, onAddOperatorRight }) => {
      const isSelected = selectedId === layer.id;
      const isEditing = editingId === layer.id;
      const [localVal, setLocalVal] = useState(layer.label === '...' ? '' : (layer.label || ''));
      const [showDropdown, setShowDropdown] = useState(false);
      const inputRef = useRef(null);

      useEffect(() => { 
        if (isEditing) {
          setLocalVal(layer.label === '...' ? '' : (layer.label || ''));
          setTimeout(() => { if (inputRef.current) inputRef.current.focus(); }, 0);
        } else {
          setShowDropdown(false);
        }
      }, [isEditing, layer.label]);

      const selectLabel = (lbl) => {
        const finalLabel = lbl === 'NO LABEL' ? '...' : lbl;
        onChange(layer.id, finalLabel);
        setLocalVal(finalLabel === '...' ? '' : finalLabel);
        setShowDropdown(false);
        onEndEdit();
      };

      const handleLabelClick = (e) => {
        e.stopPropagation();
        if (!isEditing) onSelect(e, layer.id);
      };

      const handleChevronMouseDown = (e) => {
        e.preventDefault(); e.stopPropagation();
        if (!isEditing) { onSelect(e, layer.id); setShowDropdown(true); } 
        else { setShowDropdown(prev => !prev); if (inputRef.current) inputRef.current.focus(); }
      };

      const isPlaceholder = !layer.label || layer.label === '...';
      const filteredLabels = RRG_OPERATOR_STRATA.filter(l => l.toLowerCase().includes(localVal.toLowerCase()));
      const inputWidth = Math.max(100, (localVal.length + 1) * 10);
      const leftOps = (layer.operators || []).filter(o => o.side === 'left');
      const rightOps = (layer.operators || []).filter(o => o.side === 'right');
      const hasOps = leftOps.length > 0 || rightOps.length > 0;

      return (
        <div className="node-content operator-layer-content" data-operator-id={layer.id} style={{marginBottom: 0, position: hasOps ? 'relative' : undefined, marginTop: `${16 + (layer.manualYOffset || 0)}px`}}>
          <div className={`node-label operator-label ${isSelected && !isEditing ? 'selected' : ''} ${isEditing ? 'is-editing' : ''}`} onClick={handleLabelClick}>
            <div className={`node-display ${isPlaceholder ? 'placeholder' : ''}`}>
              {isPlaceholder ? '...' : renderLabel(layer.label)}
            </div>

            {!isEditing && (
              <>
                {canAddChild && (
                  <div className="node-action-btn bottom-center" title="Add child layer" onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }} onClick={(e) => { e.stopPropagation(); onAddChildLayer && onAddChildLayer(layer.id); }}>+</div>
                )}
                <div className="node-action-btn left-center arrow" title="Add operator (left)" onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }} onClick={(e) => { e.stopPropagation(); onAddOperatorLeft && onAddOperatorLeft(layer.id); }}>→</div>
                <div className="node-action-btn right-center arrow" title="Add operator (right)" onMouseDown={(e) => { e.preventDefault(); e.stopPropagation(); }} onClick={(e) => { e.stopPropagation(); onAddOperatorRight && onAddOperatorRight(layer.id); }}>←</div>
              </>
            )}

            {isEditing && (
              <>
                <input 
                  ref={inputRef} className="node-input"
                  style={{ width: `${inputWidth}px`, left: '50%', transform: 'translateX(-50%)', paddingRight: '24px' }}
                  value={localVal} size={Math.max(3, localVal.length)}
                  onChange={(e) => { setLocalVal(e.target.value); setShowDropdown(true); }}
                  onBlur={(e) => { onChange(layer.id, e.target.value || '...'); onEndEdit(); }}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter') { onChange(layer.id, localVal || '...'); onEndEdit(); } 
                    else if (e.key === 'Escape') { if (showDropdown) { setShowDropdown(false); e.stopPropagation(); } else { onEndEdit(); } }
                  }}
                  onFocus={(e) => e.target.select()}
                />

                <div className={`node-chevron ${showDropdown ? 'active' : ''}`} onMouseDown={handleChevronMouseDown} onClick={(e) => e.stopPropagation()} style={{ right: `calc(50% - ${inputWidth / 2}px + 4px)` }}>
                  <svg viewBox="0 0 10 6"><path d="M1 1L5 5L9 1"/></svg>
                </div>

                {showDropdown && (
                  <div className="dropdown-list">
                    <div className="no-label" onMouseDown={(e) => { e.preventDefault(); selectLabel('NO LABEL'); }}>no label</div>
                    <div className="pills-container">
                      {filteredLabels.map(lbl => (
                        <span key={lbl} className="pill-item" onMouseDown={(e) => { e.preventDefault(); selectLabel(lbl); }}>{renderLabel(lbl)}</span>

      const handleExportPNG = async () => {
        const filename = (prompt('Enter filename:', 'diagram') || 'diagram').replace(/\s+/g, '_');
        if (!filename) return;

        const SCALE = 3;
        const PAD = 60;

              if (![x1,y1,x2,y2].every(v => Number.isFinite(v))) return;
              const ang = Math.atan2(y2 - y1, x2 - x1);
              const hL = 10, hW = 7, tx = x2, ty = y2;
              const bx = tx - hL * Math.cos(ang), by = ty - hL * Math.sin(ang);
              const lx = bx + (hW/2)*Math.cos(ang+Math.PI/2), ly = by + (hW/2)*Math.sin(ang+Math.PI/2);

          svgClone.removeAttribute('style'); svgClone.removeAttribute('class');

          const svgString = new XMLSerializer().serializeToString(svgClone);

          const svgUrl = URL.createObjectURL(svgBlob);

            return await new Promise((resolve) => {

              img.onload = () => resolve(img);

        finalCanvas.width = finalPxW; finalCanvas.height = finalPxH;
        const ctx = finalCanvas.getContext('2d');

        if (svgBackImg) ctx.drawImage(svgBackImg, 0, 0, finalPxW, finalPxH);
        ctx.drawImage(htmlCanvas, 0, 0);
        if (svgFrontImg) ctx.drawImage(svgFrontImg, 0, 0, finalPxW, finalPxH);

        selectedEls.forEach(x => x.classList.add('selected'));
        editingEls.forEach(x => x.classList.add('is-editing'));
        setZoomLevel(savedZoom);

        const a = document.createElement('a');
        a.download = `${filename}.png`; a.href = finalCanvas.toDataURL('image/png'); a.click();
      };

      const handleLoadClick = () => { if (fileInputRef.current) fileInputRef.current.click(); };

      const loadFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            setDiagram(parsed); setHistory([parsed]); setHistoryIndex(0);
            setSelectedId(null); setEditingId(null);
          } catch (err) { alert("Error: The .tlp file is invalid or corrupted"); }
        };
        reader.readAsText(file);
      };

      const handleFileChange = (e) => { loadFile(e.target.files[0]); e.target.value = null; };
      const handleDrop = (e) => { e.preventDefault(); setIsDragOver(false); const file = e.dataTransfer.files[0]; if (file && file.name.endsWith('.tlp')) loadFile(file); else if (file) alert('Please drop a .tlp file'); };
      const handleDragOver = (e) => { e.preventDefault(); setIsDragOver(true); };
      const handleDragLeave = () => setIsDragOver(false);

      const updateNode = (node, id, updater) => {
        if (!node) return null;
        if (node.id === id) return updater(node);
        const newChildren = node.children ? node.children.map(c => updateNode(c, id, updater)) : [];
        const newPeripheries = node.peripheries ? node.peripheries.map(p => updateNode(p, id, updater)) : [];
        return { ...node, children: newChildren, peripheries: newPeripheries };
      };

      const findNode = (node, searchId) => {
        if (!node) return null;
        if (node.id === searchId) return node;
        if (node.children) { for (let c of node.children) { const res = findNode(c, searchId); if (res) return res; } }
        if (node.peripheries) { for (let p of node.peripheries) { const res = findNode(p, searchId); if (res) return res; } }
        return null;
      };

      const findParentAndIndex = (node, searchId, parent = null) => {
        if (!node) return null;
        if (node.id === searchId) {
          if (!parent) return { parent: null, index: -1, nodeType: 'root' };
          const cIdx = parent.children ? parent.children.findIndex(c => c.id === searchId) : -1;
          if (cIdx !== -1) return { parent, index: cIdx, nodeType: 'child' };
          const pIdx = parent.peripheries ? parent.peripheries.findIndex(p => p.id === searchId) : -1;
          if (pIdx !== -1) return { parent, index: pIdx, nodeType: 'periphery' };
          return { parent, index: -1, nodeType: 'unknown' };
        }
        if (node.children) { for (let c of node.children) { const res = findParentAndIndex(c, searchId, node); if (res) return res; } }
        if (node.peripheries) { for (let p of node.peripheries) { const res = findParentAndIndex(p, searchId, node); if (res) return res; } }
        return null;
      };

      const getItemTypeById = (id) => {
        if (!diagram) return null;
        if (id === 'speech-act') return { type: 'speechAct' };

        if (id.endsWith('-gloss')) {
          const baseId = id.replace('-gloss', '');
          const eIdx = diagram.expressions.findIndex(e => e.id === baseId);
          if (eIdx !== -1) return { type: 'gloss', index: eIdx, anchorExprId: baseId };
        }

        const eIdx = diagram.expressions.findIndex(e => e.id === id);
        if (eIdx !== -1) return { type: 'expression', index: eIdx };
        
        for (let ei = 0; ei < diagram.expressions.length; ei++) {
          const expr = diagram.expressions[ei];
          if (expr.infoUnit && expr.infoUnit.id === id) return { type: 'infoUnit', exprIndex: ei, anchorExprId: expr.id };
        }
        
        for (let ei = 0; ei < diagram.expressions.length; ei++) {
          const expr = diagram.expressions[ei];
          if (expr.operatorLayers) {
            for (let li = 0; li < expr.operatorLayers.length; li++) {
              const layer = expr.operatorLayers[li];
              if (layer.id === id) return { type: 'operator', exprIndex: ei, layerIndex: li, anchorExprId: expr.id };
              if (layer.operators) {
                const oi = layer.operators.findIndex(o => o.id === id);
                if (oi !== -1) return { type: 'operatorNode', exprIndex: ei, layerIndex: li, opIndex: oi, layerId: layer.id, anchorExprId: expr.id };
              }
            }
          }
        }
        if (diagram.root) {
          const nodeInfo = findParentAndIndex(diagram.root, id);
          if (nodeInfo) return { type: 'node', ...nodeInfo };
        }
        return null;
      };

      const getSelectedInfo = () => {
        if (!selectedId || !diagram) return null;
        return getItemTypeById(selectedId);
      };

      const handleLabelChange = (id, newLabel, isGloss = false) => {
        if (isGloss) {
          const newExprs = diagram.expressions.map(e => e.id === id ? { ...e, secondaryGloss: newLabel || '...' } : e);
          if (JSON.stringify(newExprs) !== JSON.stringify(diagram.expressions)) commitChange({ ...diagram, expressions: newExprs });
          return;
        }

        const itemInfo = getItemTypeById(id);
        if (!itemInfo) return;
        if (itemInfo.type === 'expression') {
          const newExprs = diagram.expressions.map(e => e.id === id ? { ...e, label: newLabel } : e);
          if (JSON.stringify(newExprs) !== JSON.stringify(diagram.expressions)) commitChange({ ...diagram, expressions: newExprs });
        } else if (itemInfo.type === 'operator') {
          const newExprs = diagram.expressions.map((e, ei) => {
            if (ei !== itemInfo.exprIndex) return e;
            const newLayers = e.operatorLayers.map(l => l.id === id ? { ...l, label: newLabel } : l);
            return { ...e, operatorLayers: newLayers };
          });
          commitChange({ ...diagram, expressions: newExprs });
        } else if (itemInfo.type === 'infoUnit') {
          const newExprs = diagram.expressions.map((e, ei) => {
            if (ei !== itemInfo.exprIndex) return e;
            return { ...e, infoUnit: { ...e.infoUnit, label: newLabel } };
          });
          commitChange({ ...diagram, expressions: newExprs });
        } else if (itemInfo.type === 'operatorNode') {
          const newExprs = diagram.expressions.map((e, ei) => {
            if (ei !== itemInfo.exprIndex) return e;
            const newLayers = e.operatorLayers.map((l, li) => {
              if (li !== itemInfo.layerIndex) return l;
              const newOps = l.operators.map(o => o.id === id ? { ...o, label: newLabel } : o);
              return { ...l, operators: newOps };
            });
            return { ...e, operatorLayers: newLayers };
          });
          commitChange({ ...diagram, expressions: newExprs });
        } else {
          const newRoot = updateNode(diagram.root, id, n => ({ ...n, label: newLabel }));
          if (JSON.stringify(newRoot) !== JSON.stringify(diagram.root)) commitChange({ ...diagram, root: newRoot });
        }
      };

      const collectNodes = (n, acc = []) => {
        if (!n) return acc;
        acc.push(n);
        if (n.children) n.children.forEach(child => collectNodes(child, acc));
        if (n.peripheries) n.peripheries.forEach(perif => collectNodes(perif, acc));
        return acc;
      };

      const buildSimpleChildren = (count) => {
        return Array.from({ length: count }, () => ({ id: generateId(), label: '...', children: [], peripheries: [], isSpine: false }));
      };

      const buildSimplePeriphery = (side) => ({ id: generateId(), label: '...', side, children: [], peripheries: [], isSpine: false });

      const setDaughtersCount = (newCount) => {
        if (!selectedId || isNaN(newCount) || newCount < 0) return;
        const currentNode = findNode(diagram.root, selectedId);
        if (!currentNode) return;
        
        const currentCount = currentNode.children ? currentNode.children.length : 0;
        if (newCount === currentCount) return;

        let newRoot = diagram.root;
        if (newCount > currentCount) {
          const toAdd = newCount - currentCount;
          const addedNodes = buildSimpleChildren(toAdd);
          newRoot = updateNode(diagram.root, selectedId, n => ({ ...n, children: [...(n.children || []), ...addedNodes] }));
        } else {
          newRoot = updateNode(diagram.root, selectedId, n => ({ ...n, children: (n.children || []).slice(0, newCount) }));
        }
        commitChange({ ...diagram, root: newRoot });
      };

      const addChildToNode = (parentId) => {
        if (!diagram || !diagram.root || !parentId) return;
        const newChild = buildSimpleChildren(1)[0];
        const newRoot = updateNode(diagram.root, parentId, n => ({ ...n, children: [...(n.children || []), newChild] }));
        commitChange({ ...diagram, root: newRoot });
        setSelectedId(newChild.id); setPendingEditId(newChild.id);
      };

      const addPeriphery = (side) => {
        if (!selectedId) return;
        const newPeriphery = buildSimplePeriphery(side);
        const newRoot = updateNode(diagram.root, selectedId, n => ({ ...n, peripheries: [...(n.peripheries || []), newPeriphery] }));
        commitChange({ ...diagram, root: newRoot });
      };

      const addParentNode = () => {
        const info = getSelectedInfo();
        if (!info || info.type !== 'node' || info.parent) return;

        const currentNode = findNode(diagram.root, selectedId);
        if (!currentNode) return;

        const insertedLevelOffset = NODE_INSERT_Y_OFFSET;
        let requiredRootShift = 0;

        if (wrapperRef.current) {
          const currentLabelEl = wrapperRef.current.querySelector(`[data-node-id="${selectedId}"] > .node-content > .node-label`);
          if (currentLabelEl) {
            const wrapperRect = wrapperRef.current.getBoundingClientRect();
            const currentRect = currentLabelEl.getBoundingClientRect();
            const predictedParentTop = (currentRect.top - wrapperRect.top) - insertedLevelOffset;
            requiredRootShift = Math.max(0, Math.ceil(MIN_VISIBLE_TOP_GAP - predictedParentTop));
          }
        }

        const wrappedChild = { ...currentNode, isSpine: true, manualYOffset: currentNode.manualYOffset || 0 };
        const newParent = {
          id: generateId(), label: '', children: [wrappedChild], peripheries: [], isSpine: false,
          manualYOffset: -(insertedLevelOffset) + requiredRootShift
        };

        commitChange({ ...diagram, root: newParent });
        setSelectedId(newParent.id); setPendingEditId(newParent.id);
      };

      const getNodeLinkIds = (node) => {
        if (!node) return [];
        if (Array.isArray(node.exprIds)) return node.exprIds.filter(Boolean);
        return node.exprId ? [node.exprId] : [];
      };

      const subtreeHasEquatorLink = (node) => {
        if (!node) return false;
        if (getNodeLinkIds(node).length > 0) return true;
        if (Array.isArray(node.children) && node.children.some(subtreeHasEquatorLink)) return true;
        if (Array.isArray(node.peripheries) && node.peripheries.some(subtreeHasEquatorLink)) return true;
        return false;
      };

      const setNodeLinkIds = (node, ids) => {
        const clean = [...new Set((ids || []).filter(Boolean))];
        const updated = { ...node };
        delete updated.exprId; delete updated.exprIds;
        if (clean.length === 1) updated.exprId = clean[0];
        else if (clean.length > 1) updated.exprIds = clean;
        return updated;
      };

      const getLinkedExpressionsMaps = () => {
        const syntaxMap = {}; const operatorMap = {};
        if (!diagram) return { syntaxMap, operatorMap };
        
        if (diagram.root) {
          const walk = (n) => {
            if (!n) return;
            getNodeLinkIds(n).forEach(exprId => { syntaxMap[exprId] = n.label; });
            if (n.children) n.children.forEach(walk);
            if (n.peripheries) n.peripheries.forEach(walk);
          };
          walk(diagram.root);
        }
        
        diagram.expressions.forEach(e => {
          if (!e.operatorLayers) return;
          e.operatorLayers.forEach(l => {
            if (!l.operators) return;
            l.operators.forEach(op => {
              getNodeLinkIds(op).forEach(exprId => { 
                if (!operatorMap[exprId]) operatorMap[exprId] = op.label; 
              });
            });
          });
        });
        
        return { syntaxMap, operatorMap };
      };

      const handleToggleTriangle = () => {
        if (!selectedId) return;
        const newRoot = updateNode(diagram.root, selectedId, n => ({ ...n, linkAsTriangle: !n.linkAsTriangle }));
        commitChange({ ...diagram, root: newRoot });
      };

      const handleLinkExpression = (exprId) => {
        if (!selectedId) return;
        const info = getSelectedInfo();
        const currentNode = findNode(diagram.root, selectedId);
        if (!currentNode) return;
        const currentIds = getNodeLinkIds(currentNode);
        const isPeriphery = info?.nodeType === 'periphery';

        const unlinkPrevious = (n) => {
          if (!n) return n;
          let updated = { ...n };
          const existing = getNodeLinkIds(updated);
          if (existing.includes(exprId) && updated.id !== selectedId) {
            updated = setNodeLinkIds(updated, existing.filter(id => id !== exprId));
          }
          if (updated.children) updated.children = updated.children.map(unlinkPrevious);
          if (updated.peripheries) updated.peripheries = updated.peripheries.map(unlinkPrevious);
          return updated;
        };

        let newRoot = diagram.root;
        if (exprId) newRoot = unlinkPrevious(newRoot);

        newRoot = updateNode(newRoot, selectedId, n => {
          const ids = getNodeLinkIds(n);
          if (!exprId) return setNodeLinkIds(n, []);
          if (isPeriphery) {
            const nextIds = ids.includes(exprId) ? ids.filter(id => id !== exprId) : [...ids, exprId];
            return setNodeLinkIds(n, nextIds);
          }
          return setNodeLinkIds(n, [exprId]);
        });

        commitChange({ ...diagram, root: newRoot });
      };

      const handleLinkExpressionForOpNode = (exprId) => {
        if (!selectedId) return;
        const info = getItemTypeById(selectedId);
        if (!info || info.type !== 'operatorNode') return;

        const newExprs = diagram.expressions.map((e, ei) => {
          if (ei !== info.exprIndex) return e;
          const newLayers = e.operatorLayers.map((l, li) => {
            if (li !== info.layerIndex) return l;
            const newOps = l.operators.map(o => {
              if (o.id !== selectedId) return o;
              const ids = getNodeLinkIds(o);
              if (!exprId) return setNodeLinkIds(o, []);
              const nextIds = ids.includes(exprId) ? ids.filter(id => id !== exprId) : [...ids, exprId];
              return setNodeLinkIds(o, nextIds);
            });
            return { ...l, operators: newOps };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
      };

      const getIncomingLinks = (exprId) => {
        const links = [];
        if (!diagram) return links;

        if (diagram.root) {
          const walk = (n) => {
            if (!n) return;
            if (getNodeLinkIds(n).includes(exprId)) {
              links.push({ type: 'syntax', sourceId: n.id, label: n.label });
            }
            if (n.children) n.children.forEach(walk);
            if (n.peripheries) n.peripheries.forEach(walk);
          };
          walk(diagram.root);
        }

        diagram.expressions.forEach(e => {
          if (e.operatorLayers) {
            e.operatorLayers.forEach(l => {
              if (l.operators) {
                l.operators.forEach(op => {
                  if (getNodeLinkIds(op).includes(exprId)) {
                    links.push({ type: 'operator', sourceId: op.id, label: op.label });
                  }
                });
              }
            });
          }
        });
        return links;
      };

      const handleRemoveIncomingLink = (exprId, link) => {
        if (link.type === 'syntax') {
          const newRoot = updateNode(diagram.root, link.sourceId, n => {
            const currentIds = getNodeLinkIds(n);
            return setNodeLinkIds(n, currentIds.filter(id => id !== exprId));
          });
          commitChange({ ...diagram, root: newRoot });
        } else if (link.type === 'operator') {
          const newExprs = diagram.expressions.map(e => {
            if (!e.operatorLayers) return e;
            const newLayers = e.operatorLayers.map(l => {
              if (!l.operators) return l;
              const newOps = l.operators.map(op => {
                if (op.id !== link.sourceId) return op;
                const currentIds = getNodeLinkIds(op);
                return setNodeLinkIds(op, currentIds.filter(id => id !== exprId));
              });
              return { ...l, operators: newOps };
            });
            return { ...e, operatorLayers: newLayers };
          });
          commitChange({ ...diagram, expressions: newExprs });
        }
      };

      const clearSpawnTargetDeep = (node) => {
        if (!node) return node;
        const { spawnTargetX, ...rest } = node;
        return {
          ...rest,
          children: (rest.children || []).map(clearSpawnTargetDeep),
          peripheries: (rest.peripheries || []).map(clearSpawnTargetDeep)
        };
      };

      const clearSpawnTargetShallow = (node) => {
        if (!node) return node;
        const { spawnTargetX, ...rest } = node;
        return rest;
      };

      const addLexicalItem = (direction) => {
        const info = getSelectedInfo();
        if (!info || (info.type !== 'expression' && info.type !== 'gloss')) return;
        const newExpr = { id: generateId(), label: '...' };
        const insertIndex = direction === -1 ? info.index : info.index + 1;
        const newExpressions = [...diagram.expressions];
        newExpressions.splice(insertIndex, 0, newExpr);
        commitChange({ ...diagram, expressions: newExpressions });
      };

      const addInfoUnit = (exprId) => {
        const newUnit = { id: generateId(), label: '...', spanLeft: 0, spanRight: 0 };
        const newExprs = diagram.expressions.map(e => {
          if (e.id !== exprId) return e;
          return { ...e, infoUnit: newUnit };
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newUnit.id); setPendingEditId(newUnit.id);
      };

      const deleteInfoUnit = (exprId) => {
        const newExprs = diagram.expressions.map(e => {
          if (e.id !== exprId) return e;
          const { infoUnit, ...rest } = e;
          return rest;
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(null); setEditingId(null);
      };

      const addOperatorLayer = (exprId) => {
        const newLayer = { id: generateId(), label: '...' };
        const newExprs = diagram.expressions.map(e => {
          if (e.id !== exprId) return e;
          const layers = e.operatorLayers ? [...e.operatorLayers, newLayer] : [newLayer];
          return { ...e, operatorLayers: layers };
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newLayer.id); setPendingEditId(newLayer.id);
      };

      const addOperatorLayerAfter = (operatorId) => {
        const info = getItemTypeById(operatorId);
        if (!info || info.type !== 'operator') return;
        const expr = diagram.expressions[info.exprIndex];
        const newLayer = { id: generateId(), label: '...' };
        const newLayers = [...(expr.operatorLayers || [])];
        newLayers.splice(info.layerIndex + 1, 0, newLayer);
        const newExprs = diagram.expressions.map((e, i) => i === info.exprIndex ? { ...e, operatorLayers: newLayers } : e);
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newLayer.id); setPendingEditId(newLayer.id);
      };

      const deleteOperatorLayer = (layerId) => {
        const newExprs = diagram.expressions.map(e => {
          if (!e.operatorLayers) return e;
          const newLayers = e.operatorLayers
            .filter(l => l.id !== layerId)
            .map(l => l.superiorLayerId === layerId ? (() => { const { superiorLayerId, ...rest } = l; return rest; })() : l);
          return { ...e, operatorLayers: newLayers.length > 0 ? newLayers : undefined };
        });
        commitChange({ ...diagram, expressions: newExprs });
        if (selectedId === layerId) { setSelectedId(null); setEditingId(null); }
      };

      const addOperatorToLayer = (layerId, side) => {
        const newOp = { id: generateId(), label: '...', side };
        const newExprs = diagram.expressions.map(e => {
          if (!e.operatorLayers) return e;
          const newLayers = e.operatorLayers.map(l => {
            if (l.id !== layerId) return l;
            return { ...l, operators: [...(l.operators || []), newOp] };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newOp.id); setPendingEditId(newOp.id);
      };

      const deleteOperatorNode = (opId) => {
        const newExprs = diagram.expressions.map(e => {
          if (!e.operatorLayers) return e;
          const newLayers = e.operatorLayers.map(l => {
            if (!l.operators) return l;
            const newOps = l.operators.filter(o => o.id !== opId);
            return { ...l, operators: newOps.length > 0 ? newOps : undefined };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
        if (selectedId === opId) { setSelectedId(null); setEditingId(null); }
      };

      const moveOperatorNode = (opId, direction) => {
        const info = getItemTypeById(opId);
        if (!info || info.type !== 'operatorNode') return;
        const step = direction * 20;
        const newExprs = diagram.expressions.map((e, ei) => {
          if (ei !== info.exprIndex) return e;
          const newLayers = e.operatorLayers.map((l, li) => {
            if (li !== info.layerIndex) return l;
            const newOps = l.operators.map(o => {
              if (o.id !== opId) return o;
              const curr = o.manualXOffset || 0;
              const next = curr + step;
              if (o.side === 'left' && next > 0) return o;
              if (o.side === 'right' && next < 0) return o;
              return { ...o, manualXOffset: next };
            });
            return { ...l, operators: newOps };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
      };

      const moveOperatorLayerVertical = (layerId, direction) => {
        const info = getItemTypeById(layerId);
        if (!info || info.type !== 'operator') return;
        const step = direction * 25;
        const newExprs = diagram.expressions.map((e, ei) => {
          if (ei !== info.exprIndex) return e;
          const newLayers = e.operatorLayers.map((l, li) => {
            if (li !== info.layerIndex) return l;
            const curr = l.manualYOffset || 0;
            const next = Math.max(0, curr + step);
            return { ...l, manualYOffset: next };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
      };

      const moveSpeechActVertical = (direction) => {
        const step = direction * 10;
        const curr = diagram.speechActYOffset || 0;
        const next = curr + step;
        commitChange({ ...diagram, speechActYOffset: next });
      };

      const toggleSpine = () => {
        const info = getSelectedInfo();
        if (!info || info.type !== 'node' || !info.parent || info.nodeType !== 'child') return; 
        const { parent } = info;
        const currentIsSpine = parent.children.find(c => c.id === selectedId)?.isSpine || false;
        const newChildren = parent.children.map(c => ({ ...clearSpawnTargetDeep(c), isSpine: c.id === selectedId ? !currentIsSpine : false }));
        const newRoot = updateNode(diagram.root, parent.id, n => ({ ...n, children: newChildren }));
        commitChange({ ...diagram, root: newRoot });
      };

      const moveItem = (direction) => { 
        const info = getSelectedInfo();
        if (!info) return;

        if (info.type === 'expression' || info.type === 'gloss') {
          const idx = info.index;
          const newIdx = idx + direction;
          if (newIdx < 0 || newIdx >= diagram.expressions.length) return;
          const newExprs = [...diagram.expressions];
          const temp = newExprs[idx];
          newExprs[idx] = newExprs[newIdx];
          newExprs[newIdx] = temp;
          commitChange({ ...diagram, expressions: newExprs });
          return;
        }

        if (info.type === 'node' && info.parent) {
          const { parent, nodeType, index } = info;
          if (nodeType === 'child') {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= parent.children.length) return;
            const newChildren = parent.children.map(clearSpawnTargetDeep);
            const temp = newChildren[index];
            newChildren[index] = newChildren[newIndex];
            newChildren[newIndex] = temp;
            const newRoot = updateNode(diagram.root, parent.id, n => ({ ...n, children: newChildren }));
            commitChange({ ...diagram, root: newRoot });
          } else if (nodeType === 'periphery') {
            const lefts = (parent.peripheries || []).filter(p => p.side === 'left');
            const rights = (parent.peripheries || []).filter(p => p.side === 'right');
            const visual = [...lefts, 'CORE', ...rights];
            const currentIndex = visual.findIndex(item => item !== 'CORE' && item.id === selectedId);
            const newIndex = currentIndex + direction;
            if (newIndex < 0 || newIndex >= visual.length) return;

            const temp = visual[currentIndex];
            visual[currentIndex] = visual[newIndex];
            visual[newIndex] = temp;

            const newPeripheries = [];
            let currentSide = 'left';
            for (const item of visual) {
              if (item === 'CORE') currentSide = 'right';
              else newPeripheries.push({ ...clearSpawnTargetDeep(item), side: currentSide });
            }
            const newRoot = updateNode(diagram.root, parent.id, n => ({ ...n, peripheries: newPeripheries }));
            commitChange({ ...diagram, root: newRoot });
          }
        }
      };

      const deleteItem = (idToRemove) => {
        if (diagram.root && diagram.root.id === idToRemove) {
          commitChange({ ...diagram, root: null }); setSelectedId(null); setEditingId(null); return;
        }
        const opInfo = getItemTypeById(idToRemove);
        if (opInfo && opInfo.type === 'operator') { deleteOperatorLayer(idToRemove); return; }
        if (opInfo && opInfo.type === 'operatorNode') { deleteOperatorNode(idToRemove); return; }
        if (opInfo && opInfo.type === 'infoUnit') { deleteInfoUnit(opInfo.anchorExprId); return; }
        
        if (opInfo && opInfo.type === 'gloss') {
          // If a gloss is selected, delete ONLY the gloss content (keep the base item)
          const newExprs = diagram.expressions.map(e => 
            e.id === opInfo.anchorExprId ? { ...e, secondaryGloss: '\u00A0' } : e
          );
          commitChange({ ...diagram, expressions: newExprs });
          if (selectedId === idToRemove) { setSelectedId(null); setEditingId(null); }
          return;
        }

        const actualIdToRemove = idToRemove;

        if (diagram.expressions.find(e => e.id === actualIdToRemove)) {
          const unlink = (n) => {
            if(!n) return n;
            let newN = {...n}; 
            newN = setNodeLinkIds(newN, getNodeLinkIds(newN).filter(linkId => linkId !== actualIdToRemove));
            if(newN.children) newN.children = newN.children.map(unlink);
            if(newN.peripheries) newN.peripheries = newN.peripheries.map(unlink);
            return newN;
          };
          const newRoot = diagram.root ? unlink(diagram.root) : null;
          const newExprs = diagram.expressions.filter(e => e.id !== actualIdToRemove);
          commitChange({ ...diagram, root: newRoot, expressions: newExprs });
          if (selectedId === idToRemove) { setSelectedId(null); setEditingId(null); }
          return;
        }
        if (diagram.root) {
          const removeRecursively = (nodes) => {
            if (!nodes) return [];
            return nodes.filter(n => n.id !== idToRemove).map(n => ({
                ...n, children: removeRecursively(n.children), peripheries: removeRecursively(n.peripheries)
            }));
          };
          const newRoot = {
            ...diagram.root,
            children: removeRecursively(diagram.root.children),
            peripheries: removeRecursively(diagram.root.peripheries)
          };
          commitChange({ ...diagram, root: newRoot });
        }
        if (selectedId === idToRemove) { setSelectedId(null); setEditingId(null); }
      };

      const handleNodeClick = (e, id) => {
        e.stopPropagation();

        if (focusSelectionMode) {
          const info = getItemTypeById(id);
          if (info && info.type === 'infoUnit') {
            const exprIndex = info.exprIndex;
            const currentExpr = diagram.expressions[exprIndex];
            const currentUnit = currentExpr.infoUnit;
            const newExprs = [...diagram.expressions];

            if (focusSelectionMode === 'pfd') {
              newExprs[exprIndex] = { ...currentExpr, infoUnit: { ...currentUnit, isPotentialFocus: !currentUnit.isPotentialFocus } };
            } else if (focusSelectionMode === 'afd') {
              newExprs[exprIndex] = { ...currentExpr, infoUnit: { ...currentUnit, isActualFocus: !currentUnit.isActualFocus, focusType: !currentUnit.isActualFocus ? 'actual' : undefined } };
            } else if (focusSelectionMode === 'completive') {
