        // Pack items to the left of the first anchor.
        let firstAnchor = isAnchored.findIndex(Boolean);
        if (firstAnchor === -1) {
          firstAnchor = 0;
        } else {
          for (let i = firstAnchor - 1; i >= 0; i--) {
            const minGap = sorted[i].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[i + 1].width / 2;
            centers[i] = centers[i + 1] - minGap;
          }
        }

        // Pack items to the right of the last anchor.
        const reversedAnchor = [...isAnchored].reverse().findIndex(Boolean);
        const lastAnchor = reversedAnchor === -1 ? sorted.length - 1 : sorted.length - 1 - reversedAnchor;
        if (reversedAnchor !== -1) {
          for (let i = lastAnchor + 1; i < sorted.length; i++) {
            const minGap = sorted[i - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[i].width / 2;
            centers[i] = centers[i - 1] + minGap;
          }
        }

        // For every span between anchored items, distribute only the unanchored items.
        let prevAnchor = -1;
        for (let i = 0; i < sorted.length; i++) {
          if (!isAnchored[i]) continue;
          if (prevAnchor === -1) {
            prevAnchor = i;
            continue;
          }

          const gapCount = i - prevAnchor;
          if (gapCount > 1) {
            const left = centers[prevAnchor];
            const right = centers[i];
            const minNeeded = (() => {
              let acc = 0;
              for (let j = prevAnchor + 1; j <= i; j++) {
                acc += sorted[j - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[j].width / 2;
              }
              return acc;
            })();

            if (right - left >= minNeeded) {
              let cursor = left;
              const extra = (right - left - minNeeded) / gapCount;
              for (let j = prevAnchor + 1; j < i; j++) {
                cursor += sorted[j - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + extra + sorted[j].width / 2;
                centers[j] = cursor;
              }
            } else {
              let cursor = left;
              for (let j = prevAnchor + 1; j < i; j++) {
                cursor += sorted[j - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[j].width / 2;
                centers[j] = cursor;
              }
            }
          }

          prevAnchor = i;
        }

        // If there are no anchors at all, fall back to a simple non-overlap layout.
        if (!isAnchored.some(Boolean)) {
          for (let i = 1; i < sorted.length; i++) {
            const minCenter = centers[i - 1] + sorted[i - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[i].width / 2;
            if (centers[i] < minCenter) centers[i] = minCenter;
          }
        }

        const shifts = {};
        sorted.forEach((expr, i) => {
          const naturalCenter = expr.left + expr.width / 2;
          shifts[expr.id] = centers[i] - naturalCenter;
        });
        return shifts;
      };

      // ----------------------------------------------------------------
      // GEOMETRIC ENGINE
      // ----------------------------------------------------------------
      useLayoutEffect(() => {
        if (!diagram || !wrapperRef.current) return;

        if (editingId !== null) return; 

        // CRITICAL: Temporarily remove scale transform so ALL measurements are in local (unscaled) coords.
        const wrapperEl = wrapperRef.current;
        wrapperEl.style.transform = 'none';
        void wrapperEl.offsetWidth; // force reflow at scale=1

        const wrapperRect = wrapperEl.getBoundingClientRect();
        
        const getEl = (id) => document.querySelector(`[data-node-id="${id}"] > .node-content > .node-label`);
        const getExprEl = (id) => document.querySelector(`[data-expr-id="${id}"] > .node-content > .node-label`);
        const getOpEl = (id) => document.querySelector(`[data-operator-id="${id}"] .node-label`);
        const getOpNodeEl = (id) => document.querySelector(`[data-opnode-id="${id}"] .node-label`);
        const getInfoEl = (id) => document.querySelector(`[data-info-id="${id}"] .node-label`);
        const getWrapperEl = (id) => document.querySelector(`[data-node-id="${id}"]`);

        const yOffsetMap = {};
        const xOffsetMap = {};
        const collectNodeOffsets = (n) => {
          if (!n) return;
          yOffsetMap[n.id] = n.manualYOffset || 0;
          xOffsetMap[n.id] = n.manualXOffset || 0;
          if (n.children) n.children.forEach(collectNodeOffsets);
          if (n.peripheries) n.peripheries.forEach(collectNodeOffsets);
        };
        collectNodeOffsets(diagram.root);

        document.querySelectorAll('[data-node-id].tree-node').forEach(el => {
          const id = el.getAttribute('data-node-id');
          const y = yOffsetMap[id] || 0;
          const x = xOffsetMap[id] || 0;
          el.style.transform = (x || y) ? `translate(${x}px, ${y}px)` : 'none';
        });

        // Reset expression transforms before measuring
        document.querySelectorAll('[data-expr-id]').forEach(el => {
          el.style.transform = 'none';
        });

        const localShifts = {};
        const calculatedLines = [];

        if (diagram.root) {
          const naturalXs = {};
          const measureNatural = (n) => {
            if(!n) return;
            const el = getEl(n.id);
            if (el) naturalXs[n.id] = el.getBoundingClientRect().left + el.getBoundingClientRect().width / 2;
            if(n.children) n.children.forEach(measureNatural);
            if(n.peripheries) n.peripheries.forEach(measureNatural);
          }
          measureNatural(diagram.root);

          const exprMetrics = [];
          diagram.expressions.forEach((expr, index) => {
             const el = getExprEl(expr.id);
             if (el) {
               const rect = el.getBoundingClientRect();
               naturalXs[expr.id] = rect.left + rect.width / 2;
               exprMetrics.push({ id: expr.id, index, left: rect.left - wrapperRect.left, width: rect.width });
             }
          });

          // 1. Pass Bottom-Up: Encontrar anclas léxicas
          const anchorXs = {};
          const computeAnchors = (n) => {
              if (!n) return;
              if (n.children) n.children.forEach(computeAnchors);
              if (n.peripheries) n.peripheries.forEach(computeAnchors);

              const linkIds = getNodeLinkIds(n);
              const linkCenters = linkIds.map(id => naturalXs[id]).filter(x => x !== undefined);
              if (linkCenters.length) {
                  anchorXs[n.id] = linkCenters.reduce((a,b)=>a+b,0) / linkCenters.length;
              } else if (n.children && n.children.length > 0) {
                  const spineChild = n.children.find(c => c.isSpine);
                  if (spineChild && anchorXs[spineChild.id] !== undefined) {
                      anchorXs[n.id] = anchorXs[spineChild.id];
                  } else {
                      const childAnchors = n.children.map(c => anchorXs[c.id]).filter(x => x !== undefined);
                      if (childAnchors.length > 0) {
                          anchorXs[n.id] = (Math.min(...childAnchors) + Math.max(...childAnchors)) / 2;
                      }
                  }
              }
          };
          computeAnchors(diagram.root);

          // 2. Pass Top-Down
          const targetXs = {};
          const computeTargetsTopDown = (n, parentShift) => {
              if (!n || naturalXs[n.id] === undefined) return;

              if (anchorXs[n.id] !== undefined) {
                  targetXs[n.id] = anchorXs[n.id];
              } else {
                  targetXs[n.id] = naturalXs[n.id] + parentShift;
              }

              let containerShift = targetXs[n.id] - naturalXs[n.id];
              const spineChild = n.children && n.children.find(c => c.isSpine);
              if (spineChild && naturalXs[spineChild.id] !== undefined) {
                  containerShift = targetXs[n.id] - naturalXs[spineChild.id];
              }

              if (n.children) n.children.forEach(c => computeTargetsTopDown(c, containerShift));
              if (n.peripheries) n.peripheries.forEach(p => computeTargetsTopDown(p, containerShift));
          };
          computeTargetsTopDown(diagram.root, 0);

          // 2b. Post-render collision resolution
          const allTreeNodes = collectNodes(diagram.root);
          const nodeRectsForCollision = [];
          allTreeNodes.forEach(n => {
            const el = getEl(n.id);
            if (!el || targetXs[n.id] === undefined) return;
            const rect = el.getBoundingClientRect();
            nodeRectsForCollision.push({
              id: n.id,
              targetCX: targetXs[n.id],
              width: rect.width,
              top: rect.top,
              node: n
            });
          });

          const shiftSubtree = (node, dx) => {
            (node.children || []).forEach(c => {
              if (targetXs[c.id] !== undefined) targetXs[c.id] += dx;
              const entry = nodeRectsForCollision.find(nr => nr.id === c.id);
              if (entry) entry.targetCX += dx;
              shiftSubtree(c, dx);
            });
            (node.peripheries || []).forEach(p => {
              if (targetXs[p.id] !== undefined) targetXs[p.id] += dx;
              const entry = nodeRectsForCollision.find(nr => nr.id === p.id);
              if (entry) entry.targetCX += dx;
              shiftSubtree(p, dx);
            });
          };

          const resolveOverlaps = () => {
            const bands = {};
            nodeRectsForCollision.forEach(nr => {
              const key = Math.round(nr.top / COLLISION_LEVEL_BAND);
              if (!bands[key]) bands[key] = [];
              bands[key].push(nr);
            });
            Object.values(bands).forEach(group => {
              if (group.length < 2) return;
              for (let pass = 0; pass < 8; pass++) {
                group.sort((a, b) => a.targetCX - b.targetCX);
                let anyOverlap = false;
                for (let i = 1; i < group.length; i++) {
                  const prev = group[i - 1];
                  const curr = group[i];
                  const minDist = (prev.width + curr.width) / 2 + COLLISION_MIN_NODE_GAP;
                  const dist = curr.targetCX - prev.targetCX;
                  if (dist < minDist) {
                    anyOverlap = true;
                    const push = (minDist - dist) / 2 + 0.5;
                    prev.targetCX -= push;
                    targetXs[prev.id] = prev.targetCX;
                    shiftSubtree(prev.node, -push);
                    curr.targetCX += push;
                    targetXs[curr.id] = curr.targetCX;
                    shiftSubtree(curr.node, push);
                  }
                }
                if (!anyOverlap) break;
              }
            });
          };

          resolveOverlaps();

          // 2c. Single-child vertical alignment
          const alignSingleChildParents = (n) => {
            if (!n) return;
            (n.children || []).forEach(alignSingleChildParents);
            (n.peripheries || []).forEach(alignSingleChildParents);

            if (n.children && n.children.length === 1 && !getNodeLinkIds(n).length) {
              const child = n.children[0];
              if (targetXs[child.id] !== undefined && targetXs[n.id] !== undefined) {
                const dx = targetXs[child.id] - targetXs[n.id];
                if (Math.abs(dx) > 0.5) {
                  targetXs[n.id] = targetXs[child.id];
                  const entry = nodeRectsForCollision.find(nr => nr.id === n.id);
                  if (entry) entry.targetCX = targetXs[n.id];
                }
              }
            }
          };
          alignSingleChildParents(diagram.root);

          resolveOverlaps();

          // 2d. Periphery minimum arrow gap
          const enforcePeripheryGap = (n) => {
            if (!n) return;
            (n.children || []).forEach(enforcePeripheryGap);
            (n.peripheries || []).forEach(perif => {
              enforcePeripheryGap(perif);
              if (targetXs[n.id] === undefined || targetXs[perif.id] === undefined) return;
              const coreEntry = nodeRectsForCollision.find(nr => nr.id === n.id);
              const perifEntry = nodeRectsForCollision.find(nr => nr.id === perif.id);
              if (!coreEntry || !perifEntry) return;
              const coreHalf = coreEntry.width / 2;
              const perifHalf = perifEntry.width / 2;
              const edgeGap = Math.abs(targetXs[perif.id] - targetXs[n.id]) - coreHalf - perifHalf;
              if (edgeGap < PERIPHERY_MIN_EDGE_GAP) {
                const push = PERIPHERY_MIN_EDGE_GAP - edgeGap;
                if (targetXs[perif.id] < targetXs[n.id]) {
                  targetXs[perif.id] -= push;
                  if (perifEntry) perifEntry.targetCX = targetXs[perif.id];
                  shiftSubtree(perif, -push);
                } else {
                  targetXs[perif.id] += push;
                  if (perifEntry) perifEntry.targetCX = targetXs[perif.id];
                  shiftSubtree(perif, push);
                }
              }
            });
          };
          enforcePeripheryGap(diagram.root);

          resolveOverlaps();

          // 3. Equator solving + forced vertical alignment
          const nodeToExprMap = getNodeToExprMap();

          // FIX 3: Compute desired equator centers for MULTIPLE lexical items cleanly separated
          const desiredExprCenters = {};
          Object.entries(nodeToExprMap).forEach(([nodeId, exprIds]) => {
            if (targetXs[nodeId] !== undefined) {
              const ids = Array.isArray(exprIds) ? exprIds : [exprIds];
              if (ids.length === 1) {
                desiredExprCenters[ids[0]] = targetXs[nodeId] - wrapperRect.left;
              } else if (ids.length > 1) {
                const exprs = ids.map(id => exprMetrics.find(e => e.id === id)).filter(Boolean);
                if (exprs.length > 0) {
                  let totalWidth = exprs.reduce((sum, e, i) => sum + e.width + (i < exprs.length - 1 ? EQUATOR_MIN_ITEM_GAP : 0), 0);
                  let startX = (targetXs[nodeId] - wrapperRect.left) - totalWidth / 2;
                  exprs.forEach(e => {
                    desiredExprCenters[e.id] = startX + e.width / 2;
                    startX += e.width + EQUATOR_MIN_ITEM_GAP;
                  });
                }
              }
            }
          });
          const finalExprShiftMap = solveEquatorPositions(exprMetrics, desiredExprCenters);

          // FIX 3 (continued): Center the parent node exactly over the averaged span of all its lexical items
          Object.entries(nodeToExprMap).forEach(([nodeId, exprIds]) => {
            const ids = Array.isArray(exprIds) ? exprIds : [exprIds];
            if (ids.length > 0 && targetXs[nodeId] !== undefined) {
              const centers = ids.map(exprId => {
                const expr = exprMetrics.find(e => e.id === exprId);
                if (!expr) return null;
                return wrapperRect.left + (expr.left + expr.width / 2) + (finalExprShiftMap[expr.id] || 0);
              }).filter(c => c !== null);
              
              if (centers.length > 0) {
                const avgCenter = centers.reduce((a, b) => a + b, 0) / centers.length;
                targetXs[nodeId] = avgCenter;
                const entry = nodeRectsForCollision.find(nr => nr.id === nodeId);
                if (entry) entry.targetCX = avgCenter;
              }
            }
          });

          // 3c. Re-align single-child parents upward
          alignSingleChildParents(diagram.root);

          // 4. Aplicar desplazamientos 
          const applyLocalShifts = (n, inheritedDOMShift) => {
             if (!n || targetXs[n.id] === undefined || naturalXs[n.id] === undefined) return;
             const myAbsShift = targetXs[n.id] - naturalXs[n.id];
             localShifts[n.id] = myAbsShift - inheritedDOMShift;
             
             if (n.children) n.children.forEach(c => applyLocalShifts(c, myAbsShift));
             if (n.peripheries) n.peripheries.forEach(p => applyLocalShifts(p, inheritedDOMShift));
          }
          applyLocalShifts(diagram.root, 0);

          Object.assign(localShifts, finalExprShiftMap);

          Object.keys(localShifts).forEach(id => {
            const el = getWrapperEl(id);
            if (el) {
              const x = (localShifts[id] || 0) + (xOffsetMap[id] || 0);
              const y = (yOffsetMap[id] || 0);
              el.style.transform = (x || y) ? `translate(${x}px, ${y}px)` : 'none';
            }
          });

          exprMetrics.forEach(expr => {
            const el = document.querySelector(`[data-expr-id="${expr.id}"]`);
            if (!el) return;
            const x = localShifts[expr.id] || 0;
            el.style.transform = x ? `translateX(${x}px)` : 'none';
          });

          // [NUEVO] 3d. Centrado horizontal de enlaces cruzados (Cross-spine links) y cascada
          diagram.expressions.forEach(expr => {
            if (!expr.operatorLayers) return;

            // Inicializamos el desplazamiento de esta columna en 0
            let currentSpineShiftX = 0; 

            expr.operatorLayers.forEach(layer => {
              // Si este estrato tiene un enlace cruzado, calculamos el nuevo centro
              if (layer.superiorLayerId) {
                const sourceLabel = getOpEl(layer.id);
                const targetLabel = getOpEl(layer.superiorLayerId) || getExprEl(layer.superiorLayerId);
                const exprLabel = getExprEl(expr.id); // El ancla léxica original
                
                if (sourceLabel && targetLabel && exprLabel) {
                  const targetRect = targetLabel.getBoundingClientRect();
                  const exprRect = exprLabel.getBoundingClientRect();

                  const targetX = targetRect.left + targetRect.width / 2;
                  const anchorX = exprRect.left + exprRect.width / 2;

                  const midX = (anchorX + targetX) / 2;
                  
                  // Actualizamos el desplazamiento para este estrato y TODOS los que vengan debajo
                  currentSpineShiftX = midX - anchorX;
                }
              }

              // Aplicamos el desplazamiento actual (ya sea 0, o el heredado de un nodo superior)
              if (currentSpineShiftX !== 0) {
                const layerWrapper = document.querySelector(`[data-operator-id="${layer.id}"]`);
                if (layerWrapper) {
                  // Si el usuario además lo movió manualmente, se suma al desplazamiento de la cascada
                  const manualX = layer.manualXOffset || 0; 
                  layerWrapper.style.transform = `translateX(${currentSpineShiftX + manualX}px)`;
                }
              }
            });
          });

          // 4. Medir líneas y flechas
          const measureLines = (n) => {
            if (!n) return;
            const pLabel = getEl(n.id);
            
            if (pLabel) {
              const pRect = pLabel.getBoundingClientRect();
              const pBottomX = pRect.left + pRect.width / 2 - wrapperRect.left;
              const pBottomY = pRect.bottom - wrapperRect.top;

              // Líneas hacia el Ecuador Léxico
              const linkedExprIds = getNodeLinkIds(n);
              if (linkedExprIds.length) {
                if (n.linkAsTriangle) {
                  // Si es triángulo, buscamos los extremos izquierdo y derecho de todas las palabras enlazadas
                  let minLeft = Infinity;
                  let maxRight = -Infinity;
                  let eTop = 0;
                  
                  linkedExprIds.forEach((exprId) => {
                    const eLabel = getExprEl(exprId);
                    if (eLabel) {
                      const eRect = eLabel.getBoundingClientRect();
                      minLeft = Math.min(minLeft, eRect.left - wrapperRect.left);
                      maxRight = Math.max(maxRight, eRect.right - wrapperRect.left);
                      eTop = eRect.top - wrapperRect.top;
                    }
                  });
                  
                  if (minLeft !== Infinity) {
                    const padX = 4; // Margen horizontal
                    const liftY = 2; // Elevamos la base 2px para que el fondo de la palabra no la muerda
                    calculatedLines.push({
                      id: `expr-triangle-${n.id}`,
                      isTriangle: true,
                      points: `${pBottomX},${pBottomY} ${minLeft - padX},${eTop - liftY} ${maxRight + padX},${eTop - liftY}`
                    });
                  }
                } else {
                  // Comportamiento normal (líneas rectas)
                  linkedExprIds.forEach((exprId, idx) => {
                    const eLabel = getExprEl(exprId);
                    if (eLabel) {
                      const eRect = eLabel.getBoundingClientRect();
                      calculatedLines.push({
                        id: `expr-line-${n.id}-${exprId}-${idx}`,
                        x1: pBottomX, y1: pBottomY,
                        x2: eRect.left + eRect.width / 2 - wrapperRect.left,
                        y2: eRect.top - wrapperRect.top,
                        isArrow: false
                      });
                    }
                  });
                }
              }

              // Líneas hacia Hijos
              if (n.children) {
                n.children.forEach(child => {
                  const childLabel = getEl(child.id);
                  if (childLabel) {
                    const cRect = childLabel.getBoundingClientRect();
                    calculatedLines.push({
                      id: `line-${n.id}-${child.id}`,
                      x1: pBottomX, y1: pBottomY,
                      x2: cRect.left + cRect.width / 2 - wrapperRect.left,
                      y2: cRect.top - wrapperRect.top,
                      isArrow: false
                    });
                  }
                  measureLines(child);
                });
              }

              // Flechas de Periferias
              if (n.peripheries) {
                const mainRect = pLabel.getBoundingClientRect();
                const mainCenterX = mainRect.left + mainRect.width / 2;

                n.peripheries.forEach(perif => {
                  const perifLabel = getEl(perif.id);
                  if (perifLabel) {
                    const pRect = perifLabel.getBoundingClientRect();
                    const pCenterX = pRect.left + pRect.width / 2;
                    const y = mainRect.top + mainRect.height / 2 - wrapperRect.top;
                    
                    let x1, x2;
                    const buffer = 4;
                    if (pCenterX < mainCenterX) {
                        x1 = pRect.right - wrapperRect.left + buffer;
                        x2 = mainRect.left - wrapperRect.left - buffer;
                    } else {
                        x1 = pRect.left - wrapperRect.left - buffer;
                        x2 = mainRect.right - wrapperRect.left + buffer;
                    }

                    calculatedLines.push({
                      id: `perif-${n.id}-${perif.id}`,
                      x1, y1: y, x2, y2: y,
                      isArrow: true
                    });
                  }
                  measureLines(perif);
                });
              }
            }
          };
          measureLines(diagram.root);
        }

        // Operator column vertical lines (works with or without constituent projection)
        diagram.expressions.forEach(expr => {
          if (!expr.operatorLayers || !expr.operatorLayers.length) return;
          const exprLabel = getExprEl(expr.id);
          if (!exprLabel) return;
          const exprRect = exprLabel.getBoundingClientRect();
          
          // En lugar de un colX fijo, guardamos el punto inferior previo (empieza en la expresión)
          let prevBottomX = exprRect.left + exprRect.width / 2 - wrapperRect.left;
          let prevBottomY = exprRect.bottom - wrapperRect.top;

          expr.operatorLayers.forEach((layer) => {
            const layerLabel = getOpEl(layer.id);
            if (!layerLabel) return;
            const layerRect = layerLabel.getBoundingClientRect();
            
            // Calculamos el centro X real de este estrato (tomando en cuenta su nuevo shift)
            const currentLayerX = layerRect.left + layerRect.width / 2 - wrapperRect.left;
            const layerTopY = layerRect.top - wrapperRect.top;
            const layerBottomY = layerRect.bottom - wrapperRect.top;

            calculatedLines.push({
              id: `op-line-${expr.id}-${layer.id}`,
              x1: prevBottomX, y1: prevBottomY, // Desde el X,Y inferior del elemento anterior
              x2: currentLayerX, y2: layerTopY, // Hacia el X,Y superior del estrato actual (torciendo la línea)
              isArrow: false
            });
            
            // Actualizamos el punto previo para la siguiente iteración (si hay un estrato más arriba)
            prevBottomX = currentLayerX;
            prevBottomY = layerBottomY;

            // Operator node arrows (horizontal, from operator to layer)
            if (layer.operators) {
              const layerCenterX = layerRect.left + layerRect.width / 2;
              layer.operators.forEach(op => {
                const opLabel = getOpNodeEl(op.id);
                if (!opLabel) return;
                const opRect = opLabel.getBoundingClientRect();
                const opCenterX = opRect.left + opRect.width / 2;
                const y = layerRect.top + layerRect.height / 2 - wrapperRect.top;
                const buffer = 4;
                let x1, x2;
                if (opCenterX < layerCenterX) {
                  x1 = opRect.right - wrapperRect.left + buffer;
                  x2 = layerRect.left - wrapperRect.left - buffer;
                } else {
                  x1 = opRect.left - wrapperRect.left - buffer;
                  x2 = layerRect.right - wrapperRect.left + buffer;
                }
                calculatedLines.push({
                  id: `oparrow-${layer.id}-${op.id}`,
                  x1, y1: y, x2, y2: y,
                  isArrow: true
                });

                // Dashed lines from operator node top to linked expression bottom
                const opLinkedIds = getNodeLinkIds(op);
                opLinkedIds.forEach((linkedExprId, idx) => {
                  const linkedExprLabel = getExprEl(linkedExprId);
                  if (!linkedExprLabel) return;
                  const linkedRect = linkedExprLabel.getBoundingClientRect();
                  calculatedLines.push({
                    id: `oplink-${op.id}-${linkedExprId}-${idx}`,
                    x1: opRect.left + opRect.width / 2 - wrapperRect.left,
                    y1: opRect.top - wrapperRect.top,
                    x2: linkedRect.left + linkedRect.width / 2 - wrapperRect.left,
                    y2: linkedRect.bottom - wrapperRect.top,
                    isArrow: false,
                    isDashed: true
                  });
                });
              });
            }
          });
        });

        // Cross-spine operator layer links (superiorLayerId)
        diagram.expressions.forEach(expr => {
          if (!expr.operatorLayers) return;
          expr.operatorLayers.forEach(layer => {
            if (!layer.superiorLayerId) return;
            const sourceLabel = getOpEl(layer.id);
            const targetLabel = getOpEl(layer.superiorLayerId) || getExprEl(layer.superiorLayerId);
            if (!sourceLabel || !targetLabel) return;
            const srcRect = sourceLabel.getBoundingClientRect();
            const tgtRect = targetLabel.getBoundingClientRect();
            calculatedLines.push({
              id: `crosslink-${layer.id}-${layer.superiorLayerId}`,
              x1: srcRect.left + srcRect.width / 2 - wrapperRect.left,
              y1: srcRect.top - wrapperRect.top,
              x2: tgtRect.left + tgtRect.width / 2 - wrapperRect.left,
              y2: tgtRect.bottom - wrapperRect.top,
              isArrow: false,
              isDashed: false
            });
          });
        });

        // Information Structure vertical lines and centering (SPAN SUPPORT + BRACKET)
        diagram.expressions.forEach((expr, idx) => {
          if (!expr.infoUnit) return;
          const exprLabel = getExprEl(expr.id);
          const infoLabel = getInfoEl(expr.infoUnit.id);
          const infoNodeWrapper = document.querySelector(`[data-info-id="${expr.infoUnit.id}"]`);
          if (!exprLabel || !infoLabel || !infoNodeWrapper) return;

          const exprRect = exprLabel.getBoundingClientRect();
          const sLeft = expr.infoUnit.spanLeft || 0;
          const sRight = expr.infoUnit.spanRight || 0;

          let minLeft = Infinity;
          let maxRight = -Infinity;
          let maxBottomY = -Infinity;

          // Encontrar todos los elementos que abarca el span
          for (let i = Math.max(0, idx - sLeft); i <= Math.min(diagram.expressions.length - 1, idx + sRight); i++) {
            const spanExpr = diagram.expressions[i];
            const spanExprEl = getExprEl(spanExpr.id);
            if (spanExprEl) {
              const sRect = spanExprEl.getBoundingClientRect();
              minLeft = Math.min(minLeft, sRect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, sRect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, sRect.bottom - wrapperRect.top);
            }
          }

          const targetCenterX = (minLeft + maxRight) / 2;
          const anchorCenterX = (exprRect.left + exprRect.width / 2) - wrapperRect.left;
          const shiftX = targetCenterX - anchorCenterX;

          // 1. Desplazar visualmente el contenedor del nodo IU para que quede al centro del rango
          infoNodeWrapper.style.transform = `translateX(${shiftX}px)`;

          // 2. Trazar líneas
          const infoRectNow = infoLabel.getBoundingClientRect();
          const infoCenterX = infoRectNow.left + infoRectNow.width / 2 - wrapperRect.left;
          const infoTopY = infoRectNow.top - wrapperRect.top;

          if (sLeft === 0 && sRight === 0) {
            // Un solo nodo: línea vertical directa y sólida
            calculatedLines.push({
              id: `info-line-${expr.id}-${expr.infoUnit.id}-single`,
              // Diagonal dotted line from the anchor expression to the IU node (classic Telperion behavior)
              x1: anchorCenterX,
              y1: maxBottomY,
              x2: infoCenterX,
              y2: infoTopY,
              isArrow: false,
              isDotted: true
            });
          } else {
            // Varios nodos: Corchete horizontal y línea vertical
            const bracketY = maxBottomY + 10; // Separación debajo de las palabras
            const tickHeight = 6; // Altura de los "dientes" del corchete hacia arriba
            
            // Trazado del corchete (bracket)
            calculatedLines.push({
              id: `info-bracket-${expr.id}-${expr.infoUnit.id}`,
              isPath: true,
              d: `M ${minLeft} ${bracketY - tickHeight} L ${minLeft} ${bracketY} L ${maxRight} ${bracketY} L ${maxRight} ${bracketY - tickHeight}`,
              stroke: "#343a40",
              strokeWidth: "1.5",
              isDashed: false // Línea sólida
            });

            // Línea vertical desde el centro del corchete hasta el nodo IU
            calculatedLines.push({
              id: `info-line-${expr.id}-${expr.infoUnit.id}-center`,
              x1: targetCenterX,
              y1: bracketY,
              x2: infoCenterX,
              y2: infoTopY,
              isArrow: false,
              isDotted: true // Dotted line from bracket center to IU node
            });
          }
        });

        // --- Dominios de Foco (PFD y AFD) ---
        let globalPfdMidX = null; // Variable para compartir el eje vertical entre ambos triángulos
        let globalPfdVertexY = null; // Variable para compartir el vértice Y entre ambos triángulos

        // 1. Potential Focus Domain (PFD) - Triángulo invertido sin base ("V")
        const pfdNodes = diagram.expressions.filter(e => e.infoUnit && e.infoUnit.isPotentialFocus);
        if (pfdNodes.length > 0) {
          let minLeft = Infinity;
          let maxRight = -Infinity;
          let maxBottomY = -Infinity;

          pfdNodes.forEach(expr => {
            const infoLabel = getInfoEl(expr.infoUnit.id);
            if (infoLabel) {
              const rect = infoLabel.getBoundingClientRect();
              minLeft = Math.min(minLeft, rect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, rect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, rect.bottom - wrapperRect.top);
            }
          });

          if (minLeft !== Infinity) {
            const padX = 17; 
            const baseY = maxBottomY + 16; 
            const speechActOffset = diagram.speechActYOffset || 0;
            const vertexY = baseY + 150 + speechActOffset; 
            const midX = (minLeft + maxRight) / 2;
            
            globalPfdMidX = midX; // Guardamos el eje central del Acto de Habla
            globalPfdVertexY = vertexY; // Guardamos el vértice Y para el texto Speech Act

            // Trazado en forma de "V"
            calculatedLines.push({
              id: 'pfd-triangle-path',
              isPath: true,
              isDashed: true,
              d: `M ${minLeft - padX} ${baseY} L ${midX} ${vertexY} L ${maxRight + padX} ${baseY}`,
              stroke: "#343a40",
              strokeWidth: "1.5"
            });

            calculatedLines.push({
              id: 'pfd-text',
              isText: true,
              isSpeechAct: true,
              text: 'Speech Act',
              x: midX,
              y: vertexY + 22 
            });
          }
        }

        // 2. Actual Focus Domain (AFD) - Triángulo invertido sólido con base
        const afdNodes = diagram.expressions.filter(e => e.infoUnit && e.infoUnit.isActualFocus);
        if (afdNodes.length > 0) {
          let minLeft = Infinity;
          let maxRight = -Infinity;
          let maxBottomY = -Infinity;

          afdNodes.forEach(expr => {
            const infoLabel = getInfoEl(expr.infoUnit.id);
            if (infoLabel) {
              const rect = infoLabel.getBoundingClientRect();
              minLeft = Math.min(minLeft, rect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, rect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, rect.bottom - wrapperRect.top);
            }
          });

          if (minLeft !== Infinity) {
            const padX = 9; 
            const baseY = maxBottomY + 16; 
            const speechActOffset = diagram.speechActYOffset || 0;
            const vertexY = baseY + 145 + speechActOffset; // Más corto que el PFD
            
            // LA MAGIA: Si existe un PFD, forzamos su vértice inferior al mismo eje. Si no, usamos su propio centro.
            const targetMidX = globalPfdMidX !== null ? globalPfdMidX : (minLeft + maxRight) / 2;

            // Trazado: Mueve a izq (M), línea a der (L), línea al vértice compartido (L), cierra base (Z)
            calculatedLines.push({
              id: 'afd-triangle-path',
              isPath: true,
              isDashed: false, // Línea sólida
              d: `M ${minLeft - padX} ${baseY} L ${maxRight + padX} ${baseY} L ${targetMidX} ${vertexY} Z`,
              stroke: "#343a40",
              strokeWidth: "1.5"
            });

            // Si no hay PFD, el AFD también genera la etiqueta Speech Act
            if (globalPfdVertexY === null) {
              calculatedLines.push({
                id: 'pfd-text',
                isText: true,
                isSpeechAct: true,
                text: 'Speech Act',
                x: targetMidX,
                y: vertexY + 22
              });
            }
          }
        }

        setShifts(prev => JSON.stringify(prev) === JSON.stringify(localShifts) ? prev : localShifts);
        setSvgLines(prev => JSON.stringify(prev) === JSON.stringify(calculatedLines) ? prev : calculatedLines);

        // Measure natural dimensions for scroll sizer, then restore scale transform
        const natW = wrapperEl.scrollWidth;
        const natH = wrapperEl.scrollHeight;
        setWrapperNaturalSize(prev => (prev.w === natW && prev.h === natH) ? prev : { w: natW, h: natH });

        // Restore scale transform after all measurements and shift applications are done
        wrapperEl.style.transform = `scale(${zoomLevel / 100})`;

      }, [diagram, editingId, layoutTick, zoomLevel, showConstituent, showOperators, showInfoStructure, projectionFocus]); 

      const editingType = editingId ? getItemTypeById(editingId)?.type : null;

      // --- INITIAL SCREEN RENDER ---
      if (!diagram) {
        return (

            <div className="init-container">

                <form onSubmit={handleGenerateBase} style={{display: 'flex', flexDirection: 'column', flex: 1}}>
                  <div style={{display: 'flex', gap: '8px', alignItems: 'stretch'}}>

                    />
                    <button

                      title="IPA character picker"
                    >
                      <span style={{fontSize: '1.05rem'}}>ə</span> IPA
                    </button>
                  </div>

                  {showIPA && (
                    <div className="ipa-panel">
                      {ipaCategories.map((cat) => (
                        <div key={cat.title}>
                          <div className="ipa-category-title">{cat.title}</div>

                              <button key={j} type="button" className="ipa-char-btn" onClick={() => insertIPAChar(ch)} title={ch}>
                                {ch}

                  {words.length > 0 && (
                    <div className="segment-workspace">
                      <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px'}}>

                      <div className="word-flow">

                      <div className="segment-preview">

                    </div>
                  )}
                  
                  <div style={{marginTop: 'auto'}}>
                    <button type="submit" className="btn btn-primary" style={{width: '100%', padding: '12px', fontSize: '1.05rem'}} disabled={words.length === 0}>
                      Generate Initial Expression
                    </button>
                  </div>
                </form>
              </div>

              <div 
                className="init-box" 
                style={{

                  borderColor: isDragOver ? 'var(--accent)' : undefined,

                    <>

                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                      </svg>
                      <h3 style={{fontFamily: 'var(--font-serif)', color: 'var(--accent)', marginBottom: '8px', fontSize: '1.15rem', fontWeight: 600}}>Drop here</h3>
                    </>
                  ) : (
                    <>
                      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom: '12px'}}>
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                      </svg>
                      <h3 style={{fontFamily: 'var(--font-serif)', color: '#495057', marginBottom: '6px', fontSize: '1.15rem', fontWeight: 600}}>Load Tree</h3>
                      <p style={{color: 'var(--text-secondary)', marginBottom: '20px', fontSize: '0.85rem'}}>
                        Drop a .tlp file here<br/>or click to browse.
                      </p>
                    </>

                  <button type="button" className="btn" style={{width: '100%', padding: '10px', fontSize: '0.95rem'}} onClick={handleLoadClick}>
                    Load .tlp File

            </div>

            <div style={{textAlign: 'center', marginTop: '20px'}}>
              <a

                  fontSize: '1.1rem',

                  transition: 'color 0.2s ease'
                }}
                onMouseEnter={(e) => e.currentTarget.style.color = 'white'}
                onMouseLeave={(e) => e.currentTarget.style.color = 'rgba(255,255,255,0.65)'}
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                  <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                User Manual
              </a>
            </div>

            <footer className="app-footer" style={{marginTop: 'auto', width: '100%'}}>
              <p>Carlos González Vergara (<strong><a href="mailto:cgonzalv@uc.cl">cgonzalv@uc.cl</a></strong>)</p>
              <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">
                <img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by-nc-nd.svg" alt="CC BY-NC-ND 4.0" />
              </a>
            </footer>
          </div>
        );
      }

      // --- DIAGRAM RENDER ---
      const info = getSelectedInfo();
      const isSyntax = info && info.type === 'node';
      const isExpr = info && info.type === 'expression';
      const isOperator = info && info.type === 'operator';
      const isOperatorNode = info && info.type === 'operatorNode';
      const isInfoUnit = info && info.type === 'infoUnit';
      const isSpeechAct = info && info.type === 'speechAct';
      const canAddParent = isSyntax && info && !info.parent;
      const canDeleteSelection = Boolean(info) && !isSpeechAct;
      const deleteLabel = isInfoUnit ? '✕ Delete Info Unit' : isOperatorNode ? '✕ Delete Operator' : isOperator ? '✕ Delete Layer' : isExpr ? '✕ Delete Item' : (isSyntax ? '✕ Delete Node' : '✕ Delete');
      
      let canMoveLeft = false;
      let canMoveRight = false;
      let isSpineActive = false;
      let canSpine = false;
      
      if (info) {
        if (info.type === 'expression') {
          canMoveLeft = info.index > 0;
          canMoveRight = info.index < diagram.expressions.length - 1;
        } else if (info.type === 'node' && info.parent) {
          if (info.nodeType === 'child') {
            canMoveLeft = info.index > 0;
            canMoveRight = info.index < info.parent.children.length - 1;
            canSpine = true;
            isSpineActive = info.parent.children[info.index].isSpine;
          } else if (info.nodeType === 'periphery') {
            const lefts = (info.parent.peripheries || []).filter(p => p.side === 'left');
            const rights = (info.parent.peripheries || []).filter(p => p.side === 'right');
            const visual = [...lefts, 'CORE', ...rights];
            const currentIndex = visual.findIndex(item => item !== 'CORE' && item.id === selectedId);
            canMoveLeft = currentIndex > 0;
            canMoveRight = currentIndex < visual.length - 1;
          }
        }
      }

      const selectedNodeData = isSyntax ? findNode(diagram.root, selectedId) : null;
      const { syntaxMap, operatorMap } = getLinkedExpressionsMaps();

      return (
        <>
        <div className="main-layout" onClick={() => { setSelectedId(null); setEditingId(null); setLinkingLayerId(null); }}>
          
          <svg style={{ width: 0, height: 0, position: 'absolute' }}>
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#343a40" />
              </marker>
            </defs>
          </svg>

          <div style={{ display: 'flex', flexDirection: 'column', minWidth: 0, minHeight: 0, overflow: 'hidden' }}>
            <header className="topbar">
              <div className="brand-header">
                <img src="telperion_mini.png" alt="Telperion Logo" className="brand-logo" />
                <div className="brand-text">
                  <span className="brand-title">Telperion</span>
                  <span className="brand-subtitle">RRG tree builder</span>
                </div>
    
                <button 
                  className="btn btn-primary" 
                  style={{ marginLeft: '16px' }} 
                  onClick={() => window.open('manual.html', '_blank')}
                >
                  Manual
                </button>
              </div>
  
              <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                <button className="btn" onClick={handleLoadClick}>Load</button>
                <button className="btn" onClick={handleSave} disabled={!diagram}>Save</button>
                <button className="btn" onClick={handleExportPNG} disabled={!diagram}>Export PNG</button>
                <div style={{width: '1px', background: 'var(--border-light)', margin: '0 4px', alignSelf: 'stretch'}}></div>
                <button className="btn" onClick={undo} disabled={historyIndex <= 0} title="Undo (Ctrl/⌘+Z)" style={{padding: '7px 10px', fontSize: '1rem', lineHeight: 1}}>↩</button>
                <button className="btn" onClick={redo} disabled={historyIndex >= history.length - 1} title="Redo (Ctrl/⌘+Y)" style={{padding: '7px 10px', fontSize: '1rem', lineHeight: 1}}>↪</button>
                <div style={{width: '1px', background: 'var(--border-light)', margin: '0 4px', alignSelf: 'stretch'}}></div>
                <button className="btn btn-primary" onClick={startNewDiagram}>New Diagram</button>
                <input type="file" ref={fileInputRef} style={{ display: 'none' }} accept=".tlp" onChange={handleFileChange} />
              </div>
            </header>

            <div className="canvas-container">
              {/* Zoom controls */}
              <div className={`zoom-controls ${diagram && diagram.root ? 'visible' : ''}`}>
                <button className="zoom-btn" onClick={zoomOut} disabled={zoomLevel <= ZOOM_MIN} title="Zoom out (Ctrl/⌘ + −)">−</button>
                <div className="zoom-indicator" onClick={zoomReset} title="Reset zoom (Ctrl/⌘ + 0)">{zoomLevel}%</div>
                <button className="zoom-btn" onClick={zoomIn} disabled={zoomLevel >= ZOOM_MAX} title="Zoom in (Ctrl/⌘ + +)">+</button>
              </div>

              {/* Autosave indicator */}
              <div className={`autosave-indicator ${(isSaving || lastSaved) && diagram ? 'visible' : ''}`}>
                {isSaving ? (
                  <span style={{display:'flex',alignItems:'center',gap:'4px'}}>

                  </span>
                ) : lastSaved ? (
                  <span>✓ Auto-saved {formatTimeAgo(lastSaved)}</span>

              </div>

              {/* Linking mode indicator */}
              {linkingLayerId && (
                <div style={{
                  position: 'absolute', top: '12px', left: '50%', transform: 'translateX(-50%)',
                  background: 'var(--accent)', color: 'white', padding: '8px 20px', borderRadius: '8px',
                  fontSize: '0.9rem', fontWeight: 500, zIndex: 9999, boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
                  display: 'flex', alignItems: 'center', gap: '10px'
                }}>
                  <span>Click a layer node on another spine or a base node to link</span>
                  <button onClick={() => setLinkingLayerId(null)} style={{
                    background: 'rgba(255,255,255,0.2)', border: 'none', color: 'white', 
                    borderRadius: '4px', padding: '2px 8px', cursor: 'pointer', fontSize: '0.85rem'
                  }}>Cancel</button>
                </div>
              )}

              <div style={{ minWidth: wrapperNaturalSize.w ? wrapperNaturalSize.w * (zoomLevel / 100) : '100%', minHeight: wrapperNaturalSize.h ? wrapperNaturalSize.h * (zoomLevel / 100) : '100%', position: 'relative' }}>
              <div className="tree-wrapper" ref={wrapperRef} style={{ paddingTop: `${BASE_TREE_PADDING_TOP + extraTopPadding}px`, paddingRight: `${TREE_PADDING_SIDE}px`, paddingBottom: `${TREE_PADDING_BOTTOM}px`, paddingLeft: `${TREE_PADDING_SIDE}px`, transform: `scale(${zoomLevel / 100})`, transformOrigin: '0 0' }}>
                
                <svg className="svg-layer">
                  {svgLines.filter(l => {
                    if (!showConstituent && (
                      l.id.startsWith('line-') || l.id.startsWith('perif-') || 
                      l.id.startsWith('expr-line-') || l.id.startsWith('expr-triangle-')
                    )) return false;
                    if (!showOperators && (
                      l.id.startsWith('op-line-') || l.id.startsWith('oparrow-') || 
                      l.id.startsWith('oplink-') || l.id.startsWith('crosslink-')
                    )) return false;
                    // Asegurarnos de ocultar el Speech Act y Actual Focus si se apaga la proyección IS
                    if (!showInfoStructure && (l.id.startsWith('info-line-') || l.id.startsWith('info-bracket-') || l.id.startsWith('pfd-') || l.id.startsWith('afd-'))) return false;
                    return true;
                  }).map(l => {
                    let lineOpacity = 1;
                    if (showOperators && showInfoStructure) {
                      if (projectionFocus === 'IS' && (l.id.startsWith('op-line-') || l.id.startsWith('oparrow-') || l.id.startsWith('oplink-') || l.id.startsWith('crosslink-'))) {
                        lineOpacity = 0.25;
                      }

                      if (projectionFocus === 'OP' && (l.id.startsWith('info-line-') || l.id.startsWith('info-bracket-') || l.id.startsWith('pfd-') || l.id.startsWith('afd-'))) {
                        lineOpacity = 0.25;

                          {/* Hit area invisible para facilitar el clic */}

                              x={l.x - 56} y={l.y - 16}
                              width={112} height={24}
                              fill="transparent"
                              style={{ cursor: 'pointer' }}
                              onClick={(e) => { e.stopPropagation(); setSelectedId('speech-act'); setEditingId(null); }}

                              rx="3" ry="3"

                          key={l.id} d={l.d} fill="none" 
                          stroke={l.stroke || "#343a40"} 
                          strokeWidth={l.strokeWidth || "1.5"}

                          style={{ transition: 'opacity 0.3s ease', opacity: lineOpacity }}

                        fill="none"
                        stroke="#343a40"
                        strokeWidth="1.5"
                        strokeDasharray={l.isDashed ? "6 4" : (l.isDotted ? "0 4" : null)}

                        strokeLinecap={l.isDotted ? "round" : undefined}
                        markerEnd={l.isArrow ? "url(#arrowhead)" : null}
                        style={{ transition: 'opacity 0.3s ease', opacity: lineOpacity }}
                      />
                    )
                  })}
                </svg>
                
                {diagram.root && showConstituent && (

                    <TreeNode node={diagram.root} selectedId={selectedId} editingId={editingId} shifts={shifts}

                  </div>
                )}
                
                <div className="lexical-equator" style={{ zIndex: (editingType === 'expression' || editingType === 'operator' || editingType === 'operatorNode' || editingType === 'infoUnit') ? 1000 : 2 }}>

                    <ExpressionItem key={expr.id} expr={expr} selectedId={selectedId} editingId={editingId} shifts={shifts}
                      onSelect={handleNodeClick} showOperators={showOperators} showInfoStructure={showInfoStructure} projectionFocus={projectionFocus}
                      onChange={handleLabelChange} onEndEdit={() => setEditingId(null)} onDelete={deleteItem} />
                  ))}
                </div>
              </div>
              </div>
            </div>
          </div>

          <div className="sidebar" onClick={(e) => e.stopPropagation()}>
            {info ? (

                {isSyntax && (

                      <button onClick={() => addPeriphery('right')} style={{ fontWeight: 'normal' }}>← Add Right</button>

                        <button className="btn" onClick={addParentNode} style={{ padding: '4px 12px', fontSize: '0.85rem', fontWeight: 'normal' }}>+ Add Parent</button>
                      </div>

                              const myIds = getNodeLinkIds(selectedNodeData);

                          </div>

                                const isOwnedByOther = owner && !isOwnedByMe;

                                </div>
                                <label style={{display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.85rem', cursor: 'pointer'}}>
                                  <input

                                    onChange={handleToggleTriangle}

                              </div>

                            </label>

                        </div>

                      + Add Operator Layer
                    </button>
                    {diagram.expressions[info.index]?.operatorLayers?.length > 0 && (
                      <span style={{fontSize: '0.75rem', color: 'var(--text-secondary)', marginTop: '4px'}}>
                        {diagram.expressions[info.index].operatorLayers.length} layer(s) attached
                      </span>
                    )}
                  </div>
                )}

                {isExpr && (
                  <div className="sidebar-section">
                    <div className="sidebar-title">Information Structure</div>
                    {diagram.expressions[info.index]?.infoUnit ? (
                      <>
                        <span style={{fontSize: '0.85rem', color: 'var(--accent-hover)'}}>
                          ✓ Marked as information unit: {renderInfoLabel(diagram.expressions[info.index].infoUnit.label)}
                        </span>
                        <button 
                          className="btn" 
                          onClick={() => deleteInfoUnit(selectedId)} 
                          style={{ width: '100%', fontWeight: 'normal', color: 'var(--danger)', borderColor: 'rgba(220,53,69,0.3)', marginTop: '6px' }}
                        >
                          ✕ Remove Information Unit
                        </button>
                      </>
                    ) : (
                      <button 
                        className="btn" 
                        onClick={() => addInfoUnit(selectedId)} 
                        style={{ width: '100%', fontWeight: 'normal' }}
                      >
                        + Mark as Information Unit
                      </button>
                    )}
                  </div>
                )}

                {isOperator && (() => {
                  const currentLayer = diagram.expressions[info.exprIndex]?.operatorLayers?.[info.layerIndex];
                  const canMoveUp = (currentLayer?.manualYOffset || 0) > 0;
                  return (
                  <div className="sidebar-section">
                    <div className="sidebar-title">Operator Projection</div>
                    <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '4px'}}>
                      Layer {info.layerIndex + 1} of {diagram.expressions[info.exprIndex]?.operatorLayers?.length || 0}
                    </span>
                    <button 
                      className="btn" 
                      onClick={() => addOperatorLayerAfter(selectedId)} 
                      style={{ width: '100%', fontWeight: 'normal', marginTop: '4px' }}

                    <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)', marginTop: '12px', marginBottom: '4px'}}>Add operator:</span>

                      <button onClick={() => moveOperatorLayerVertical(selectedId, 1)} style={{ fontWeight: 'normal' }}>↓ Move Down</button>
                    </div>

                    <div style={{borderTop: '1px solid var(--border-light)', paddingTop: '12px', marginTop: '12px'}}>
                      <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '6px', display: 'block'}}>Cross-spine link:</span>
                      {currentLayer?.superiorLayerId ? (
                        <button 
                          className="btn" 
                          onClick={() => {
                            const newExprs = diagram.expressions.map((ex, ei) => {
                              if (ei !== info.exprIndex) return ex;
                              const newLayers = ex.operatorLayers.map(l => {
                                if (l.id !== selectedId) return l;
                                const { superiorLayerId, ...rest } = l;
                                return rest;
                              });
                              return { ...ex, operatorLayers: newLayers };
                            });
                            commitChange({ ...diagram, expressions: newExprs });
                          }}
                          style={{ width: '100%', fontWeight: 'normal', color: 'var(--danger)', borderColor: 'rgba(220,53,69,0.3)' }}
                        >
                          ✕ Remove Link

                          className="btn"

                      ) : (
                        <button 
                          className="btn" 
                          onClick={() => setLinkingLayerId(selectedId)}
                          style={{ width: '100%', fontWeight: 'normal' }}
                        >

                  </div>

                {isOperatorNode && (() => {

                {isInfoUnit && (() => {

                  const sRight = currentUnit?.spanRight || 0;
                  
                  // Validar que no nos salgamos de los límites del arreglo
                  const canGrowLeft = info.exprIndex - sLeft > 0;
                  const canGrowRight = info.exprIndex + sRight < diagram.expressions.length - 1;
                  const canShrinkLeft = sLeft > 0;
                  const canShrinkRight = sRight > 0;

                  const updateSpan = (dLeft, dRight) => {
                    const newExprs = [...diagram.expressions];
                    newExprs[info.exprIndex] = {
                      ...currentExpr,
                      infoUnit: {
                        ...currentUnit,
                        spanLeft: Math.max(0, sLeft + dLeft),
                        spanRight: Math.max(0, sRight + dRight)

                    commitChange({ ...diagram, expressions: newExprs });

                                infoUnit: { ...currentUnit, isPotentialFocus: !currentUnit.isPotentialFocus }

                            onChange={() => {
                              const newExprs = [...diagram.expressions];
                              newExprs[info.exprIndex] = {
                                ...currentExpr,
                                infoUnit: { ...currentUnit, isActualFocus: !currentUnit.isActualFocus }
                              };
                              commitChange({ ...diagram, expressions: newExprs });

                          Part of the Actual Focus Domain

                        onClick={() => commitChange({ ...diagram, speechActYOffset: 0 })}

                <div className="sidebar-section" style={{marginTop: '10px'}}>
                  <div className="sidebar-title">Position & Alignment</div>
                  
                  {isSyntax && info.parent && (
                    <button 
                      className="btn" 
                      onClick={toggleSpine}
                      disabled={!canSpine}
                      style={{ 
                        background: isSpineActive ? 'rgba(15, 81, 50, 0.06)' : 'white', 
                        borderColor: isSpineActive ? 'var(--accent-hover)' : 'var(--border)',
                        opacity: canSpine ? 1 : 0.5,
                        marginBottom: '8px',
                        fontWeight: 'normal'
                      }}
                    >
                      {isSpineActive ? '✓ Centered Vertically' : 'Center Vertically (Spine)'}
                    </button>
                  )}
                  
                  { (info.parent || isExpr) && !isOperator && !isOperatorNode && !isInfoUnit && (
                    <div className="action-row">
                      <button 
                        onClick={() => moveItem(-1)} 
                        disabled={!canMoveLeft || (isSyntax && getNodeLinkIds(selectedNodeData).length > 0)} 
                        style={{ fontWeight: 'normal' }}
                      >
                        ← Swap Left
                      </button>
                      <button 
                        onClick={() => moveItem(1)} 
                        disabled={!canMoveRight || (isSyntax && getNodeLinkIds(selectedNodeData).length > 0)} 
                        style={{ fontWeight: 'normal' }}
                      >
                        Swap Right →
                      </button>
                    </div>
                  )}

                  {canDeleteSelection && (
                    <div className="action-row" style={{marginTop: '10px'}}>
                      <button onClick={() => deleteItem(selectedId)} style={{ fontWeight: 'normal', color: 'var(--danger)', borderColor: 'rgba(220,53,69,0.3)' }}>{deleteLabel}</button>
                    </div>
                  )}
                </div>
                )}
                
                <div style={{ color: '#adb5bd', textAlign: 'center', marginTop: '40px' }}>
                  Click any node to select and edit its text.
                </div>
              </>
            ) : (
              <div className="sidebar-section">
                <div className="sidebar-title">Projections</div>
                
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', marginBottom: '12px' }}>
                  <input 
                    type="checkbox" 
                    checked={showConstituent} 
                    onChange={(e) => setShowConstituent(e.target.checked)} 
                    disabled={!diagram.root}
                    style={{ marginTop: '10px', width: '16px', height: '16px', cursor: diagram.root ? 'pointer' : 'not-allowed', accentColor: 'var(--accent)', flexShrink: 0 }}
                  />
                  <div style={{ flex: 1 }}>
                    <button 
                      className="btn" 
                      style={{ width: '100%', textAlign: 'left', fontWeight: 'bold', borderColor: diagram.root ? 'var(--accent)' : 'var(--border)', borderRadius: '8px' }}
                      onClick={initializeConstituentProjection}
                    >
                      {diagram.root ? '✓ Constituent Projection' : 'Constituent Projection'}
                    </button>
                    {!diagram.root && <p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Click to start building the syntactic tree.</p>}
                  </div>
                </div>

                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', marginBottom: '12px' }}>
                  <input 
                    type="checkbox" 
                    checked={showOperators} 
                    onChange={(e) => setShowOperators(e.target.checked)} 
                    disabled={!diagram.expressions.some(e => e.operatorLayers?.length)}
                    style={{ marginTop: '10px', width: '16px', height: '16px', cursor: diagram.expressions.some(e => e.operatorLayers?.length) ? 'pointer' : 'not-allowed', accentColor: 'var(--accent)', flexShrink: 0 }}
                  />
                  <div style={{ flex: 1 }}>
                    <button 
                      className="btn" 
                      style={{ width: '100%', textAlign: 'left', borderRadius: '8px', fontWeight: diagram.expressions.some(e => e.operatorLayers?.length) ? 'bold' : 'normal', borderColor: diagram.expressions.some(e => e.operatorLayers?.length) ? 'var(--accent)' : 'var(--border)' }}
                      disabled
                    >
                      {diagram.expressions.some(e => e.operatorLayers?.length) ? '✓ Operator Projection' : 'Operator Projection'}
                    </button>
                    <p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Select any item of the expression to add operator layers.</p>
                  </div>
                </div>

                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', marginBottom: '12px' }}>
                  <input 
                    type="checkbox" 
                    checked={showInfoStructure} 
                    onChange={(e) => setShowInfoStructure(e.target.checked)} 
                    disabled={!diagram.expressions.some(e => e.infoUnit)}
                    style={{ marginTop: '10px', width: '16px', height: '16px', cursor: diagram.expressions.some(e => e.infoUnit) ? 'pointer' : 'not-allowed', accentColor: 'var(--accent)', flexShrink: 0 }}
                  />
                  <div style={{ flex: 1 }}>
                    <button 
                      className="btn" 
                      style={{ width: '100%', textAlign: 'left', borderRadius: '8px', fontWeight: diagram.expressions.some(e => e.infoUnit) ? 'bold' : 'normal', borderColor: diagram.expressions.some(e => e.infoUnit) ? 'var(--accent)' : 'var(--border)' }}
                      disabled
                    >
                      {diagram.expressions.some(e => e.infoUnit) ? '✓ Information Structure' : 'Information Structure'}
                    </button>
                    <p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Select any item of the expression to mark as information unit.</p>
                  </div>
                </div>

                {showOperators && showInfoStructure && diagram.expressions.some(e => e.operatorLayers?.length) && diagram.expressions.some(e => e.infoUnit) && (
                  <div style={{ marginTop: '24px', paddingTop: '16px', borderTop: '1px solid var(--border-light)' }}>
                  <div className="sidebar-title">Dim projections</div>
                    <select 
                      className="node-select" 
                      style={{ marginTop: '8px' }}
                      value={projectionFocus}
                      onChange={(e) => setProjectionFocus(e.target.value)}
                    >
                      <option value="all">Do not dim anything</option>
                      <option value="OP">Dim Information Structure</option>
                      <option value="IS">Dim Operators</option>
                    </select>
                  </div>
                )}

                {diagram.root && (
                  <div style={{ color: '#adb5bd', textAlign: 'center', marginTop: '40px' }}>
                    Select a node in the diagram to view its tools.
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
        <footer className="app-footer">
          <p>Carlos González Vergara (<strong><a href="mailto:cgonzalv@uc.cl">cgonzalv@uc.cl</a></strong>)</p>
          <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer">
            <img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by-nc-nd.svg" alt="CC BY-NC-ND 4.0" />
          </a>
        </footer>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<TelperionApp />);
  </script>
</body>
</html>
