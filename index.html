<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telperion - RRG Tree Builder</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-color: #ffffff;
      --surface: #f5faf7;
      --surface-warm: #eaf3ed;
      --border: #dee2e6;
      --border-light: #e9ecef;
      --text: #212529;
      --text-secondary: #6c757d;
      --accent: #0f5132;
      --accent-hover: #198754;
      --selected: #0d6efd;
      --selected-bg: #e3f2fd;
      --selected-glow: rgba(13, 110, 253, 0.12);
      --danger: #dc3545;
      --level-gap: 25px;
      --equator-gap: 5px;
      --sibling-gap: 30px;
      --equator-item-gap: 20px;
      --font-serif: 'Crimson Pro', Georgia, serif;
      --font-sans: 'Source Sans 3', system-ui, sans-serif;
      --shadow-soft: 0 8px 24px rgba(0,0,0,0.06);
      --shadow-float: 0 12px 32px rgba(0,0,0,0.08);
      --shadow-glow: 0 0 0 3px var(--selected-glow);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    #root { display: flex; flex-direction: column; flex: 1; min-height: 0; }
    body { font-family: var(--font-sans); background: var(--bg-color); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    .topbar { background: var(--surface); padding: 10px 24px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; z-index: 10; }
    
    /* Nuevos estilos para el branding en la cabecera */
    .brand-header { display: flex; align-items: center; gap: 12px; }
    .brand-logo { height: 36px; width: auto; object-fit: contain; }
    .brand-text { display: flex; flex-direction: column; justify-content: center; }
    .brand-title { font-family: var(--font-serif); font-size: 1.35rem; font-weight: 700; color: var(--accent); line-height: 1; letter-spacing: 0.05em; text-transform: uppercase; }
    .brand-subtitle { font-family: var(--font-sans); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-secondary); margin-top: 3px; font-weight: 600; }

    .btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer; font-weight: 600; transition: all 0.2s ease; font-family: inherit; font-size: 0.875rem; color: var(--text); }
    .btn:hover:not(:disabled) { background: var(--surface-warm); border-color: #ced4da; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }

    .main-layout { display: grid; grid-template-columns: minmax(0, 1fr) 300px; grid-template-rows: 1fr; flex: 1; overflow: hidden; min-width: 0; min-height: 0; width: 100%; }

    /* Canvas Architecture - Locked Vertical Axis */
    .canvas-container { width: 100%; min-width: 0; min-height: 0; flex: 1 1 0; overflow-x: auto; overflow-y: auto; position: relative; background: var(--bg-color); display: block; }
    
    .tree-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; width: max-content; box-sizing: border-box; padding: 0 32px; transform-origin: 0 0; }
    
    /* La capa SVG no debe interceptar eventos */
    .svg-layer { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: visible; }

    /* Los contenedores estructurales DEBEN ser "atravesables" por el ratón para evitar solapamientos */
    .syntax-tree-container { display: flex; justify-content: center; z-index: 2; position: relative; width: max-content; min-width: 100%; min-height: 150px; pointer-events: none; }
    .lexical-equator { position: relative; display: flex; gap: var(--equator-item-gap); justify-content: center; align-items: flex-start; flex-wrap: nowrap; margin-top: var(--equator-gap); pointer-events: none; }

    /* Init Screen */
    .init-screen { display: flex; flex-direction: column; align-items: center; flex: 1; min-height: 0; width: 100%; background: #2a4d35; padding: 0; overflow-y: auto; }
    .init-hero { display: flex; flex-direction: column; align-items: center; padding: 40px 20px 28px; width: 100%; }
    .init-hero img { 
      height: auto; 
      max-height: 200px; 
      max-width: 90%; 
      margin-bottom: 0; 
    }
    .init-container { display: flex; gap: 20px; max-width: 960px; width: 100%; align-items: stretch; padding: 0 20px; }
    .init-box { background: #f5faf7; padding: 32px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.3); flex: 1; display: flex; flex-direction: column; }
    .init-box .sentence-input { background: white; border-color: var(--border); color: var(--text); }
    .init-box .sentence-input::placeholder { color: #adb5bd; }
    .init-box .sentence-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10); }
    .init-screen .app-footer { background: transparent; border-top: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); }
    .init-screen .app-footer a { color: rgba(255,255,255,0.7); }
    .init-screen .app-footer a:hover { color: white; }
    .init-screen .app-footer img { filter: invert(1); opacity: 0.4; }
    .init-screen .app-footer img:hover { opacity: 0.7; }
    
    /* Sidebar */
    .sidebar { width: 300px; min-width: 300px; max-width: 300px; background: var(--surface); border-left: 1px solid var(--border-light); padding: 20px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 24px; box-shadow: -4px 0 16px rgba(0,0,0,0.03); z-index: 10; height: 100%; }
    .sidebar-section { display: flex; flex-direction: column; gap: 10px; }
    .sidebar-title { font-family: var(--font-serif); font-size: 0.95rem; text-transform: none; letter-spacing: 0.01em; color: var(--accent); font-weight: 600; margin-bottom: 4px; border-bottom: 1px solid var(--border-light); padding-bottom: 6px; }
    
    .action-row { display: flex; gap: 8px; }
    .action-row button { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 6px; background: white; cursor: pointer; font-family: inherit; font-size: 0.85rem; color: var(--text); transition: all 0.2s ease; }
    .action-row button:hover:not(:disabled) { background: var(--surface-warm); border-color: #ced4da; }
    .action-row button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Nodes */
    /* La caja invisible del nodo debe ignorar los eventos del cursor */
    .tree-node { display: flex; flex-direction: column; align-items: center; position: relative; flex: 0 0 auto; pointer-events: none; }
    
    .node-content { margin-bottom: var(--level-gap); position: relative; display: flex; justify-content: center; align-items: center; min-height: 32px; }
    
    /* The Ghost Label Trick 2.0 - Rehabilitamos los eventos aquí */
    .node-label { 
      position: relative; 
      padding: 0 10px; 
      border: 2px solid transparent; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 16px; 
      min-width: 40px; 
      height: 32px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      background: var(--bg-color); 
      transition: all 0.2s ease; 
      pointer-events: auto; /* IMPORTANTE: Hace que la etiqueta sea clickeable */
    }
    .node-label:hover { border-color: var(--border-light); background: rgba(248,249,250,0.9); }
    .node-label.selected { border-color: var(--accent); background: rgba(15, 81, 50, 0.04); box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10); padding: 0 4px; }
    
    /* Chevrón verde, ubicado por fuera del nodo */
    .node-chevron {
      position: absolute;
      right: -14px; 
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: auto; /* IMPORTANTE */
      cursor: pointer;
      padding: 4px;
      z-index: 30;
    }
    .node-content:hover .node-chevron, .node-chevron.active {
      opacity: 1;
    }
    .node-chevron:hover {
      color: var(--accent-hover);
      transform: translateY(-50%) scale(1.15);
    }

    .node-label.is-editing .node-display {
      opacity: 0;
      pointer-events: none;
    }

    .node-display {
      white-space: pre; 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      line-height: 1;
    }

    /* Marcador de nodo vacío (Estilo Kilmer / Ent) */
    .node-display.placeholder {
      color: #adb5bd;
      border: 1.5px dashed #ced4da;
      background: rgba(227, 242, 253, 0.25);
      padding: 2px 12px;
      border-radius: 6px;
      min-width: 40px;
    }
    .node-display.placeholder::before {
      content: "✎ ";
      opacity: 0.4;
      font-size: 13px;
    }
    
    .node-input { 
      position: absolute;
      inset: 0;
      font-family: inherit; 
      font-size: 16px; 
      font-style: inherit;
      font-weight: inherit;
      color: inherit;
      line-height: 28px;
      text-align: center; 
      padding: 0 4px; 
      border: 2px solid var(--accent); 
      border-radius: 6px; 
      outline: none; 
      box-sizing: border-box; 
      background: rgba(255,255,255,0.98);
      box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10); 
      margin: 0; 
      z-index: 20;
      min-width: 100%;
      width: 100%;
      height: 100%;
      appearance: none;
      -webkit-appearance: none;
      vertical-align: top;
      pointer-events: auto; /* IMPORTANTE */
    }

    /* Lista Desplegable Personalizada */
    .dropdown-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      box-shadow: var(--shadow-float); 
      max-height: 220px;
      overflow-y: auto;
      z-index: 9999; 
      width: max-content;
      min-width: 130px;
      padding: 4px 0;
      list-style: none;
      pointer-events: auto; /* IMPORTANTE */
    }
    .dropdown-list li {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text);
      text-align: left;
      font-weight: 500;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .dropdown-list li:hover {
      background: var(--accent);
      color: white;
    }
    .dropdown-list li.no-label {
      color: var(--text-secondary);
      font-style: italic;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 4px;
      padding-bottom: 8px;
    }
    .dropdown-list li.no-label:hover {
      background: var(--surface-warm);
      color: var(--danger);
    }

    /* Input Numérico de Hijos (Estilo Sidebar) */
    .node-number-input {
      font-family: inherit;
      font-size: 15px;
      padding: 4px 4px 4px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 60px;
      outline: none;
      text-align: center;
      font-weight: 400;
      color: var(--text);
      background: white;
      transition: all 0.2s ease;
    }
    .node-number-input:focus {
      border-color: var(--selected);
      box-shadow: var(--shadow-glow);
    }
    .node-number-input::-webkit-inner-spin-button, 
    .node-number-input::-webkit-outer-spin-button {
      opacity: 1;
      height: 28px;
      cursor: pointer;
    }

    .node-select { font-family: inherit; font-size: 14px; padding: 6px; border: 1px solid var(--border); border-radius: 6px; width: 100%; outline: none; cursor: pointer; pointer-events: auto; transition: all 0.2s ease; }
    .node-select:focus { border-color: var(--selected); box-shadow: var(--shadow-glow); }
    
    .node-children { display: flex; justify-content: center; gap: var(--sibling-gap); position: relative; align-items: flex-start; pointer-events: none; }

    .equator-item { font-style: normal; font-weight: 400; color: var(--text); padding: 0 10px; pointer-events: auto; } 

    /* Operator Layer Nodes */
    .operator-layer-content { pointer-events: none; }
    .operator-label { pointer-events: auto; font-size: 15px; }

    /* Zoom Controls */
    .zoom-controls {
      position: absolute; top: 10px; right: 10px; display: flex; align-items: center; gap: 2px;
      background: rgba(255,255,255,0.95); border: 1px solid var(--border-light); border-radius: 8px;
      padding: 4px; z-index: 200; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
      box-shadow: var(--shadow-soft);
    }
    .zoom-controls.visible { opacity: 0.6; pointer-events: auto; }
    .zoom-controls.visible:hover { opacity: 1; }
    .zoom-btn {
      width: 28px; height: 28px; border: none; background: transparent; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600;
      color: var(--text); border-radius: 4px; transition: background 0.2s ease;
    }
    .zoom-btn:hover:not(:disabled) { background: rgba(0,0,0,0.06); }
    .zoom-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .zoom-indicator {
      min-width: 44px; height: 28px; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-radius: 4px;
      transition: background 0.2s ease, color 0.2s ease; user-select: none;
    }
    .zoom-indicator:hover { background: rgba(0,0,0,0.06); color: var(--text); }

    /* Autosave Indicator */
    .autosave-indicator {
      position: absolute; top: 10px; left: 10px; display: flex; align-items: center;
      background: rgba(255,255,255,0.95); border: 1px solid var(--border-light); border-radius: 8px;
      padding: 6px 12px; z-index: 200; opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
      box-shadow: var(--shadow-soft); font-size: 12px; color: var(--text-secondary);
    }
    .autosave-indicator.visible { opacity: 0.6; pointer-events: auto; }
    .autosave-indicator.visible:hover { opacity: 1; }
    .autosave-indicator span { color: var(--accent-hover); }

    /* Footer */
    .app-footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 24px;
      font-size: 0.85rem;
      color: #495057;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .app-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .app-footer a:hover {
      text-decoration: underline;
      color: var(--accent-hover);
    }
    .app-footer img {
      height: 24px;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }
    .app-footer img:hover {
      opacity: 1;
    }

    /* Segmentation Interface */
    .sentence-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 1.1rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-sans);
      outline: none;
      transition: all 0.2s ease;
      background: white;
      color: var(--text);
    }
    .sentence-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.10);
    }
    .sentence-input::placeholder {
      color: #adb5bd;
      font-style: italic;
    }

    /* IPA Character Picker */
    .ipa-toggle-btn {
      padding: 6px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
      transition: all 0.2s ease;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ipa-toggle-btn:hover { background: var(--surface-warm); border-color: #ced4da; color: var(--text); }
    .ipa-toggle-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .ipa-toggle-btn.active:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    .ipa-panel {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-top: 8px;
      box-shadow: var(--shadow-soft);
      max-height: 260px;
      overflow-y: auto;
    }
    .ipa-category-title {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-top: 8px;
      margin-bottom: 4px;
      padding-left: 2px;
    }
    .ipa-category-title:first-child { margin-top: 0; }
    .ipa-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
    }
    .ipa-char-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border-light);
      border-radius: 5px;
      background: var(--surface);
      cursor: pointer;
      font-family: var(--font-sans);
      font-size: 1.05rem;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      padding: 0;
    }
    .ipa-char-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: scale(1.12);
    }
    .ipa-char-btn:active { transform: scale(0.95); }

    .segment-workspace {
      background: var(--surface);
      border-radius: 8px;
      border: 1.5px solid var(--border-light);
      padding: 20px;
      margin: 16px 0 24px 0;
    }
    .word-flow {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      padding: 8px 0;
      min-height: 44px;
      gap: 0;
      user-select: none;
    }
    .word-token {
      padding: 6px 3px;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.4;
    }
    .cut-zone {
      width: 24px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 4px;
      transition: background 0.15s ease;
    }
    .cut-zone::after {
      content: '';
      display: block;
      width: 2px;
      height: 0;
      border-radius: 1px;
      transition: all 0.2s ease;
    }
    .cut-zone:hover {
      background: rgba(15, 81, 50, 0.05);
    }
    .cut-zone:hover::after {
      height: 70%;
      background: var(--border);
    }
    .cut-zone.active::after {
      height: 85%;
      background: var(--accent);
    }
    .cut-zone.active:hover::after {
      background: var(--danger);
    }
    .segment-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
      min-height: 32px;
      align-items: center;
    }
    .segment-chip {
      padding: 5px 14px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.9rem;
      color: var(--text);
      font-family: var(--font-sans);
    }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

    const generateId = () => Math.random().toString(36).substring(2, 9);
    const MAX_HISTORY = 100;
    const BASE_TREE_PADDING_TOP = 40;
    const TREE_PADDING_SIDE = 48;
    const TREE_PADDING_BOTTOM = 56;
    const MIN_VISIBLE_TOP_GAP = 24;
    const NODE_INSERT_Y_OFFSET = 72;
    const COLLISION_MIN_NODE_GAP = 18;
    const COLLISION_LEVEL_BAND = 22;
    const PERIPHERY_MIN_EDGE_GAP = 32;
    const EQUATOR_MIN_ITEM_GAP = 22;

    const ZOOM_MIN = 60;
    const ZOOM_MAX = 150;
    const ZOOM_STEP = 10;

    // --- RRG Dictionary ---
    const RRG_LABELS = [
      "SENTENCE", "CLAUSE", "CORE", "NUC", "PRED", "PERIPHERY", "AUX",
      "PrDP", "PoDP", "PrCS", "PoCS", "ECS", "LM",
      "RP", "PP", "MP", "XP",
      "CORE_P", "NUC_P",
      "CORE_R", "NUC_R", "RPIP", "RPFP",
      "CORE_M", "NUC_M",
      "CORE_W", "NUC_W", "AFF", "CL"
    ];

    const RRG_OPERATOR_STRATA = [
      "NUC", "CORE", "CLAUSE", "SENTENCE",
      "NUC_P", "CORE_P", "PP",
      "NUC_R", "CORE_R", "RP",
      "NUC_M", "CORE_M", "MP",
    ];

    const RRG_OPERATOR_LABELS = [
      "ASP", "NEG", "DIR_NUC", "DIR_CORE", "EVQ", "MOD", "STA", "TNS", "EVID", "IF",
      "NASP", "NUM", "DEF", "DEIC"
    ];

    const RRG_INFO_STRUCTURE_LABELS = [
      "IU", "{IU}", "{IU", "IU}", "IU}top", "IU}comm", "{IU}top", "{IU}comm"
    ];

    const renderInfoLabel = (text) => {
      if (!text) return text;
      // Pattern: text ending with }superscript  e.g. "UI}top" → "UI}" + sup("top")
      const match = text.match(/^(.+\})(\w+)$/);
      if (match) {
        return React.createElement('span', { style: { display: 'inline-flex', alignItems: 'flex-start' } },
          React.createElement('span', null, match[1]),
          React.createElement('sup', { style: { fontSize: '0.65em', lineHeight: '1' } }, match[2])
        );
      }
      return text;
    };

    const renderLabel = (text) => {
      if (!text || !text.includes('_')) return text;
      const parts = text.split('_');
      return React.createElement('span', { style: { display: 'inline-flex', alignItems: 'flex-end' } },
        React.createElement('span', null, parts[0]),
        ...parts.slice(1).map((part, i) => 
          React.createElement('span', { key: i, style: { fontSize: '0.7em', lineHeight: '1.1' } }, part)
        )
      );
    };

    const debounce = (func, delay) => {
      let timeout;
      return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func(...args), delay); };
    };

    const formatTimeAgo = (date) => {
      const seconds = Math.floor((Date.now() - date) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes === 1) return '1 minute ago';
      if (minutes < 60) return `${minutes} minutes ago`;
      const hours = Math.floor(minutes / 60);
      if (hours === 1) return '1 hour ago';
      return `${hours} hours ago`;
    };

    // --- Syntactic Node Component (Top) ---
    const TreeNode = ({ 
      node, selectedId, editingId, shifts = {}, 
      onNodeClick, onLabelChange, onEditEnd
    }) => {
      const isSelected = selectedId === node.id;
      const isEditing = editingId === node.id;
      const [localVal, setLocalVal] = useState(node.label === '...' ? '' : node.label);
      const [showDropdown, setShowDropdown] = useState(false);
      const inputRef = useRef(null);

      const isEditingAncestor = useMemo(() => {
        if (!editingId) return false;
        const check = (n) => {
          if (!n) return false;
          if (n.id === editingId) return true;
          if (n.children?.some(check)) return true;
          if (n.peripheries?.some(check)) return true;
          return false;
        };
        return node.children?.some(check) || node.peripheries?.some(check);
      }, [node, editingId]);

      useEffect(() => {
        if (isEditing) {
          setLocalVal(node.label === '...' ? '' : node.label);
          setTimeout(() => {
            if (inputRef.current) inputRef.current.focus();
          }, 0);
        } else {
          setShowDropdown(false);
        }
      }, [isEditing, node.label]);

      const selectLabel = (lbl) => {
        const finalLabel = lbl === 'NO LABEL' ? '...' : lbl;
        onLabelChange(node.id, finalLabel);
        setLocalVal(finalLabel === '...' ? '' : finalLabel);
        setShowDropdown(false);
        onEditEnd();
      };

      const handleLabelClick = (e) => {
        e.stopPropagation();
        if (!isEditing) {
          onNodeClick(e, node.id);
        }
      };

      const handleChevronMouseDown = (e) => {
        e.preventDefault(); 
        e.stopPropagation();
        if (!isEditing) {
          onNodeClick(e, node.id); 
          setShowDropdown(true);   
        } else {
          setShowDropdown(prev => !prev);
          if (inputRef.current) inputRef.current.focus();
        }
      };

      const offsetY = node.manualYOffset || 0;
      const offsetX = node.manualXOffset || 0;
      const shiftX = (shifts[node.id] || 0) + offsetX;
      
      const shiftStyle = { 
        transform: (shiftX || offsetY) ? `translate(${shiftX}px, ${offsetY}px)` : 'none',
        zIndex: isEditing ? 10000 : (isEditingAncestor ? 9999 : '') 
      };
      
      const leftPerifs = (node.peripheries || []).filter(p => p.side === 'left');
      const rightPerifs = (node.peripheries || []).filter(p => p.side === 'right');

      const isPlaceholder = !node.label || node.label === '...';
      const filteredLabels = RRG_LABELS.filter(l => l.includes(localVal));

      const inputWidth = Math.max(100, (localVal.length + 1) * 10);
      const dynamicChevronStyle = isEditing ? {
        left: `calc(50% + ${inputWidth / 2}px + 2px)`, 
        right: 'auto'
      } : {};

      const NodeCore = (
        <div className="tree-node" data-node-id={node.id} style={shiftStyle}>
          <div className="node-content" style={{ zIndex: isEditing ? 10000 : (isEditingAncestor ? 9999 : 2) }}>

              className={`node-label ${isSelected && !isEditing ? 'selected' : ''} ${isEditing ? 'is-editing' : ''}`}

                <>

                    style={{ 
                      width: `${inputWidth}px`, 
                      left: '50%',

                      textTransform: 'uppercase'

                    value={localVal} 
                    size={Math.max(3, localVal.length)}

                      setLocalVal(e.target.value.toUpperCase());
                      setShowDropdown(true); 
                    }}
                    onBlur={(e) => { 
                      onLabelChange(node.id, e.target.value.toUpperCase() || '...'); 
                      onEditEnd(); 
                    }}
                    onKeyDown={(e) => { 
                      if (e.key === 'Enter') {
                        onLabelChange(node.id, localVal || '...'); 
                        onEditEnd();
                      } else if (e.key === 'Escape') {
                        if (showDropdown) {
                          setShowDropdown(false); 
                          e.stopPropagation();

                    </ul>

            </div>

            {isEditing && (
              <div 
                className={`node-chevron ${showDropdown ? 'active' : ''}`} 
                onMouseDown={handleChevronMouseDown}

      if (leftPerifs.length === 0 && rightPerifs.length === 0) return NodeCore;

          {leftPerifs.map(p => <TreeNode key={p.id} node={p} selectedId={selectedId} editingId={editingId} shifts={shifts} onNodeClick={onNodeClick} onLabelChange={onLabelChange} onEditEnd={onEditEnd} />)}
          {NodeCore}
          {rightPerifs.map(p => <TreeNode key={p.id} node={p} selectedId={selectedId} editingId={editingId} shifts={shifts} onNodeClick={onNodeClick} onLabelChange={onLabelChange} onEditEnd={onEditEnd} />)}

    // --- Expression Node Component (Equator Bottom) ---
    const ExpressionItem = ({ expr, selectedId, editingId, shifts = {}, onSelect, onChange, onEndEdit, showOperators = true, showInfoStructure = true, projectionFocus = 'all' }) => {

    const TelperionApp = () => {
      const [diagram, setDiagram] = useState(null);
      const [selectedId, setSelectedId] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [pendingEditId, setPendingEditId] = useState(null);
      const [linkingLayerId, setLinkingLayerId] = useState(null);
      
      const [rawText, setRawText] = useState('');
      const [cuts, setCuts] = useState(new Set());
      const [isDragOver, setIsDragOver] = useState(false);
      
      // Projection visibility toggles
      const [showConstituent, setShowConstituent] = useState(true);
      const [showOperators, setShowOperators] = useState(true);
      const [showInfoStructure, setShowInfoStructure] = useState(true);
      const [projectionFocus, setProjectionFocus] = useState('all');
      
      const [shifts, setShifts] = useState({});
      const [svgLines, setSvgLines] = useState([]);
      const [extraTopPadding, setExtraTopPadding] = useState(0);

      const [history, setHistory] = useState([]);
      const [historyIndex, setHistoryIndex] = useState(-1);
      
      const wrapperRef = useRef(null);
      const fileInputRef = useRef(null);
      const sentenceInputRef = useRef(null);

      // IPA character picker
      const [showIPA, setShowIPA] = useState(false);

      const ipaCategories = [
        { title: 'Vowels', chars: 'i y ɨ ʉ ɯ u ɪ ʏ ʊ e ø ɘ ɵ ɤ o ə ɛ œ ɜ ɞ ʌ ɔ æ ɐ a ɶ ɑ ɒ'.split(' ') },
        { title: 'Plosives', chars: 'p b t d ʈ ɖ c ɟ k ɡ q ɢ ʔ'.split(' ') },
        { title: 'Nasals', chars: 'm ɱ n ɳ ɲ ŋ ɴ'.split(' ') },
        { title: 'Fricatives', chars: 'ɸ β f v θ ð s z ʃ ʒ ʂ ʐ ç ʝ x ɣ χ ʁ ħ ʕ h ɦ'.split(' ') },
        { title: 'Approximants', chars: 'ʋ ɹ ɻ j ɰ l ɭ ʎ ʟ'.split(' ') },
        { title: 'Others', chars: 'ʙ r ʀ ⱱ ɾ ɽ ɬ ɮ ɺ ʘ ǀ ǃ ǂ ǁ ɓ ɗ ʄ ɠ ʛ'.split(' ') },
        { title: 'Suprasegmentals', chars: 'ˈ ˌ ː ˑ ̆  ‿ | ‖'.split(' ') },
        { title: 'Diacritics', chars: '̥ ̬ ̤ ̰ ̼ ʰ ʷ ʲ ˠ ˤ ⁿ ˡ ̹ ̜ ̟ ̠ ̈ ̽ ̩ ̯ ˞ ̃ ̴'.split(' ') },
        { title: 'Tones', chars: '˥ ˦ ˧ ˨ ˩ ↗ ↘'.split(' ') },
        { title: 'Brackets', chars: '/ [ ]'.split(' ') },
      ];

      const insertIPAChar = (char) => {
        const input = sentenceInputRef.current;
        if (!input) return;
        const start = input.selectionStart;
        const end = input.selectionEnd;
        const newVal = rawText.substring(0, start) + char + rawText.substring(end);
        setRawText(newVal);
        setCuts(new Set());
        // Restore cursor position after React re-render
        setTimeout(() => {
          input.focus();
          const pos = start + char.length;
          input.setSelectionRange(pos, pos);
        }, 0);
      };
      const [layoutTick, setLayoutTick] = useState(0);

      // Zoom state
      const [zoomLevel, setZoomLevel] = useState(100);
      const [wrapperNaturalSize, setWrapperNaturalSize] = useState({ w: 0, h: 0 });
      const zoomIn = useCallback(() => setZoomLevel(prev => Math.min(prev + ZOOM_STEP, ZOOM_MAX)), []);
      const zoomOut = useCallback(() => setZoomLevel(prev => Math.max(prev - ZOOM_STEP, ZOOM_MIN)), []);
      const zoomReset = useCallback(() => setZoomLevel(100), []);

      // Autosave state
      const [lastSaved, setLastSaved] = useState(null);
      const [isSaving, setIsSaving] = useState(false);
      const isUndoRedo = useRef(false);

      const performAutoSave = useCallback(() => {
        if (!diagram || isUndoRedo.current) return;
        setIsSaving(true);
        try {
          localStorage.setItem('telperion-autosave', JSON.stringify({ diagram, timestamp: new Date().toISOString(), version: '1.0' }));
          setLastSaved(new Date());
          setTimeout(() => setIsSaving(false), 500);
        } catch (err) { console.error('Autosave error:', err); setIsSaving(false); }
      }, [diagram]);

      const autoSaveDebounced = useRef(null);
      if (!autoSaveDebounced.current) {
        autoSaveDebounced.current = debounce((fn) => fn(), 3000);
      }

      const commitChange = (newDiagram) => {
        const newHistory = history.slice(0, historyIndex + 1);
        newHistory.push(newDiagram);
        if (newHistory.length > MAX_HISTORY) {
          newHistory.splice(0, newHistory.length - MAX_HISTORY);
        }
        setHistory(newHistory);
        setHistoryIndex(newHistory.length - 1);
        setDiagram(newDiagram);
      };

      const undo = useCallback(() => {
        if (historyIndex > 0) {
          isUndoRedo.current = true;
          const prevIndex = historyIndex - 1;
          setHistoryIndex(prevIndex);
          setDiagram(history[prevIndex]);
          setSelectedId(null);
          setEditingId(null);
          setTimeout(() => { isUndoRedo.current = false; }, 0);
        }
      }, [historyIndex, history]);

      const redo = useCallback(() => {
        if (historyIndex < history.length - 1) {
          isUndoRedo.current = true;
          const nextIndex = historyIndex + 1;
          setHistoryIndex(nextIndex);
          setDiagram(history[nextIndex]);
          setSelectedId(null);
          setEditingId(null);
          setTimeout(() => { isUndoRedo.current = false; }, 0);
        }
      }, [historyIndex, history]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          const isMod = e.metaKey || e.ctrlKey;
          if (isMod && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); } 
          else if (isMod && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
          else if (isMod && e.key === 's') { e.preventDefault(); handleSave(); }
          else if (isMod && (e.key === '+' || e.key === '=')) { e.preventDefault(); zoomIn(); }
          else if (isMod && e.key === '-') { e.preventDefault(); zoomOut(); }
          else if (isMod && e.key === '0') { e.preventDefault(); zoomReset(); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [undo, redo, zoomIn, zoomOut, zoomReset]);

      // Autosave: trigger on diagram change
      useEffect(() => {
        if (diagram && !isUndoRedo.current) {
          autoSaveDebounced.current(performAutoSave);
        }
      }, [diagram, performAutoSave]);

      // Autosave: restore on mount
      useEffect(() => {
        const saved = localStorage.getItem('telperion-autosave');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            const savedDate = new Date(data.timestamp);
            const minutesAgo = Math.round((Date.now() - savedDate) / 60000);
            const message = minutesAgo < 1
              ? 'Found recent unsaved work.\n\nContinue where you left off?'
              : `Found unsaved work from ${minutesAgo} minute${minutesAgo === 1 ? '' : 's'} ago.\n\nContinue where you left off?`;
            if (confirm(message)) {
              setDiagram(data.diagram);
              setHistory([data.diagram]);
              setHistoryIndex(0);
            } else {
              localStorage.removeItem('telperion-autosave');
            }
          } catch (err) { console.error('Restore error:', err); localStorage.removeItem('telperion-autosave'); }
        }
      }, []);

      useLayoutEffect(() => {
        if (!wrapperRef.current || typeof ResizeObserver === 'undefined') return;
        const wrapper = wrapperRef.current;
        let raf = null;
        const observer = new ResizeObserver(() => {
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => setLayoutTick(t => t + 1));
        });
        observer.observe(wrapper);
        return () => {
          observer.disconnect();
          if (raf) cancelAnimationFrame(raf);
        };
      }, [diagram]);

      useEffect(() => {
        if (!pendingEditId || !diagram) return;

        let raf1 = null;
        let raf2 = null;

        raf1 = requestAnimationFrame(() => {
          raf2 = requestAnimationFrame(() => {
            setEditingId(pendingEditId);
            setPendingEditId(null);
          });
        });

        return () => {
          if (raf1) cancelAnimationFrame(raf1);
          if (raf2) cancelAnimationFrame(raf2);
        };
      }, [pendingEditId, diagram]);

      const startNewDiagram = () => {
        setDiagram(null);
        setRawText('');
        setCuts(new Set());
        setHistory([]);
        setHistoryIndex(-1);
        setSelectedId(null);
        setEditingId(null);
        setExtraTopPadding(0);
        setShowConstituent(true);
        setShowOperators(true);
        setShowInfoStructure(true);
        setProjectionFocus('all');
        localStorage.removeItem('telperion-autosave');
        setLastSaved(null);
      };

      // --- Segmentation logic ---
      const words = rawText.trim().split(/\s+/).filter(Boolean);

      const handleRawTextChange = (e) => {
        setRawText(e.target.value);
        setCuts(new Set());
      };

      const toggleCut = (index) => {
        setCuts(prev => {
          const next = new Set(prev);
          if (next.has(index)) next.delete(index);
          else next.add(index);
          return next;
        });
      };

      const splitAll = () => {
        const newCuts = new Set();
        for (let i = 0; i < words.length - 1; i++) newCuts.add(i);
        setCuts(newCuts);
      };

      const clearCuts = () => setCuts(new Set());

      const getSegments = () => {
        if (words.length === 0) return [];
        const segments = [];
        let current = [];
        words.forEach((word, i) => {
          current.push(word);
          if (cuts.has(i) || i === words.length - 1) {
            segments.push(current.join(' '));
            current = [];
          }
        });
        return segments;
      };

      const handleGenerateBase = (e) => {
        if (e) e.preventDefault();
        const segments = getSegments();
        if (segments.length === 0) return;
        const expressions = segments.map(s => ({ id: generateId(), label: s }));
        const newDiagram = { root: null, expressions };
        setHistory([newDiagram]);
        setHistoryIndex(0);
        setDiagram(newDiagram);
      };

      const initializeConstituentProjection = () => {
        if (!diagram || diagram.root) return;
        const newRoot = { id: generateId(), label: '', children: [], peripheries: [], isSpine: false };
        commitChange({ ...diagram, root: newRoot });
      };

      const handleSave = () => {
        if (!diagram) return;
        const filename = (prompt('Enter filename:', 'diagram') || '').replace(/\s+/g, '_');
        if (!filename) return;
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(diagram, null, 2));
        const anchor = document.createElement('a');
        anchor.setAttribute("href", dataStr);
        anchor.setAttribute("download", `${filename}.tlp`);
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
      };

      const handleExportPNG = async () => {
        const filename = (prompt('Enter filename:', 'diagram') || 'diagram').replace(/\s+/g, '_');
        if (!filename) return;

        const SCALE = 3;

        // Padding around the diagram inside the PNG (in CSS px, before scaling)
        const PAD = 60;

        const el = wrapperRef.current;
        if (!el) return;

        // ── 1) Snapshot current state & force zoom=100% (scale=1) ──
        const savedZoom = zoomLevel;
        setZoomLevel(100);
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        await new Promise(r => setTimeout(r, 250));

        // ── 2) Temporarily clean UI-only states on the LIVE DOM (restore later) ──
        const selectedEls = el.querySelectorAll('.node-label.selected');
        selectedEls.forEach(x => x.classList.remove('selected'));
        const editingEls = el.querySelectorAll('.node-label.is-editing');
        editingEls.forEach(x => x.classList.remove('is-editing'));

        // If any dropdown is open, remove it from export (it can expand bounds unpredictably)
        const openDropdowns = el.querySelectorAll('.dropdown-list');
        openDropdowns.forEach(d => d.remove());

        // ── 3) Compute the real diagram bounds (DOM rect union) ──
        const baseRect = el.getBoundingClientRect();
        let minL = Infinity, minT = Infinity, maxR = -Infinity, maxB = -Infinity;

        const consider = (rect) => {
          if (!rect) return;
          if (!isFinite(rect.left) || !isFinite(rect.top) || !isFinite(rect.right) || !isFinite(rect.bottom)) return;
          minL = Math.min(minL, rect.left);
          minT = Math.min(minT, rect.top);
          maxR = Math.max(maxR, rect.right);
          maxB = Math.max(maxB, rect.bottom);
        };

        // Consider wrapper itself + all relevant descendants (nodes, equator, operator labels, SVG)
        consider(baseRect);
        el.querySelectorAll('.node-label, .equator-item, .operator-label, svg').forEach(node => consider(node.getBoundingClientRect()));

        // Fallback if nothing was measurable
        if (!isFinite(minL) || !isFinite(minT) || !isFinite(maxR) || !isFinite(maxB)) {
          minL = baseRect.left; minT = baseRect.top; maxR = baseRect.right; maxB = baseRect.bottom;
        }

        // Convert to local coordinates (wrapper space)
        const minX = minL - baseRect.left;
        const minY = minT - baseRect.top;
        const maxX = maxR - baseRect.left;
        const maxY = maxB - baseRect.top;

        const contentW = Math.max(1, Math.ceil(maxX - minX));
        const contentH = Math.max(1, Math.ceil(maxY - minY));

        const totalW = contentW + PAD * 2;
        const totalH = contentH + PAD * 2;

        // Offset to place the *visible* diagram inside the padded export area
        const offX = Math.round(PAD - minX);
        const offY = Math.round(PAD - minY);

        // ── 4) Rasterize SVG layer from the LIVE DOM (coords are correct) ──
        const svgEl = el.querySelector('svg.svg-layer');
        let svgImg = null;
        if (svgEl) {
          const svgClone = svgEl.cloneNode(true);
          svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');

          // Bake arrowheads (markers don’t reliably survive SVG->IMG rasterization)
          svgClone.querySelectorAll('line[marker-end]').forEach(line => {
            try {
              const x1 = parseFloat(line.getAttribute('x1'));
              const y1 = parseFloat(line.getAttribute('y1'));
              const x2 = parseFloat(line.getAttribute('x2'));
              const y2 = parseFloat(line.getAttribute('y2'));
              if (![x1,y1,x2,y2].every(v => Number.isFinite(v))) return;
              const ang = Math.atan2(y2 - y1, x2 - x1);
              const hL = 10, hW = 7;
              const tx = x2, ty = y2;
              const bx = tx - hL * Math.cos(ang), by = ty - hL * Math.sin(ang);
              const lx = bx + (hW/2)*Math.cos(ang+Math.PI/2), ly = by + (hW/2)*Math.sin(ang+Math.PI/2);
              const rx = bx + (hW/2)*Math.cos(ang-Math.PI/2), ry = by + (hW/2)*Math.sin(ang-Math.PI/2);
              const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
              poly.setAttribute('points', `${tx},${ty} ${lx},${ly} ${rx},${ry}`);
              poly.setAttribute('fill', line.getAttribute('stroke') || '#343a40');
              svgClone.appendChild(poly);
              line.removeAttribute('marker-end');
            } catch(_) {}
          });

          // The SVG coordinates are in wrapper-local space.
          // In the export, we translate the wrapper by (offX, offY), so shift the viewBox accordingly.
          svgClone.setAttribute('viewBox', `${-offX} ${-offY} ${totalW} ${totalH}`);
          svgClone.setAttribute('width', Math.round(totalW * SCALE));
          svgClone.setAttribute('height', Math.round(totalH * SCALE));
          svgClone.removeAttribute('style');
          svgClone.removeAttribute('class');
          svgClone.style.overflow = 'visible';

          const svgString = new XMLSerializer().serializeToString(svgClone);
          const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
          const svgUrl = URL.createObjectURL(svgBlob);
          try {
            svgImg = await new Promise((resolve) => {
              const img = new Image();
              img.onload = () => resolve(img);
              img.onerror = () => { console.warn('SVG rasterize failed'); resolve(null); };
              img.src = svgUrl;
            });
          } finally { URL.revokeObjectURL(svgUrl); }
        }

        // ── 5) Clone the wrapper into an offscreen container sized to the computed bounds ──
        const clone = el.cloneNode(true);

        // Remove UI-only things from the clone
        clone.querySelectorAll('.dropdown-list').forEach(n => n.remove());
        clone.querySelectorAll('.node-chevron').forEach(n => n.remove());
        clone.querySelectorAll('.node-label.selected').forEach(n => n.classList.remove('selected'));
        clone.querySelectorAll('.node-label.is-editing').forEach(n => n.classList.remove('is-editing'));

        // Ensure the clone is stable (no transforms / no inherited overflow clipping)
        clone.style.transform = 'none';
        clone.style.transformOrigin = '0 0';
        clone.style.position = 'relative';
        clone.style.left = '0';
        clone.style.top = '0';
        clone.style.margin = '0';
        clone.style.overflow = 'visible';

        // Create offscreen stage: the clone is shifted by padding via spacer
        const container = document.createElement('div');
        container.style.position = 'fixed';
        container.style.left = '0';
        container.style.top = '0';
        container.style.width = `${totalW}px`;
        container.style.height = `${totalH}px`;
        container.style.overflow = 'hidden';
        container.style.background = 'transparent';
        container.style.zIndex = '-9999';
        container.style.pointerEvents = 'none';

        const spacer = document.createElement('div');
        spacer.style.position = 'relative';
        spacer.style.width = `${totalW}px`;
        spacer.style.height = `${totalH}px`;
        spacer.style.paddingLeft = `${offX}px`;
        spacer.style.paddingTop = `${offY}px`;
        spacer.style.boxSizing = 'border-box';

        // Hide SVG inside the clone (we’ll composite it from svgImg to avoid double rendering)
        const cloneSvg = clone.querySelector('svg.svg-layer');
        if (cloneSvg) cloneSvg.style.visibility = 'hidden';

        spacer.appendChild(clone);
        container.appendChild(spacer);
        document.body.appendChild(container);

        // Wait for layout
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

        // ── 6) Render HTML layer (from the offscreen stage) ──
        let htmlCanvas;
        try {
          htmlCanvas = await html2canvas(container, {
            backgroundColor: null,
            scale: SCALE,
            useCORS: true,
            logging: false
          });
        } catch (err) {
          console.error('html2canvas failed:', err);
          document.body.removeChild(container);
          // Restore UI state
          selectedEls.forEach(x => x.classList.add('selected'));
          editingEls.forEach(x => x.classList.add('is-editing'));
          setZoomLevel(savedZoom);
          return;
        } finally {
          // Clean up offscreen DOM
          if (document.body.contains(container)) document.body.removeChild(container);
        }

        // ── 7) Composite SVG (behind) + HTML (front) ──
        const finalPxW = Math.round(totalW * SCALE);
        const finalPxH = Math.round(totalH * SCALE);
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = finalPxW;
        finalCanvas.height = finalPxH;
        const ctx = finalCanvas.getContext('2d');

        // 1) SVG first (lines / arrowheads)
        if (svgImg) ctx.drawImage(svgImg, 0, 0, finalPxW, finalPxH);

        // 2) HTML above (nodes / labels)
        ctx.drawImage(htmlCanvas, 0, 0);

        // ── 8) Restore UI state ──
        selectedEls.forEach(x => x.classList.add('selected'));
        editingEls.forEach(x => x.classList.add('is-editing'));
        setZoomLevel(savedZoom);

        // ── 9) Download ──
        const a = document.createElement('a');
        a.download = `${filename}.png`;
        a.href = finalCanvas.toDataURL('image/png');
        a.click();
      };
      const handleLoadClick = () => { if (fileInputRef.current) fileInputRef.current.click(); };

      const loadFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            setDiagram(parsed);
            setHistory([parsed]);
            setHistoryIndex(0);
            setSelectedId(null);
            setEditingId(null);
          } catch (err) { alert("Error: The .tlp file is invalid or corrupted."); }
        };
        reader.readAsText(file);
      };

      const handleFileChange = (e) => {
        loadFile(e.target.files[0]);
        e.target.value = null;
      };

      const handleDrop = (e) => {
        e.preventDefault();
        setIsDragOver(false);
        const file = e.dataTransfer.files[0];
        if (file && file.name.endsWith('.tlp')) loadFile(file);
        else if (file) alert('Please drop a .tlp file.');
      };

      const handleDragOver = (e) => { e.preventDefault(); setIsDragOver(true); };
      const handleDragLeave = () => setIsDragOver(false);

      const updateNode = (node, id, updater) => {
        if (!node) return null;
        if (node.id === id) return updater(node);
        const newChildren = node.children ? node.children.map(c => updateNode(c, id, updater)) : [];
        const newPeripheries = node.peripheries ? node.peripheries.map(p => updateNode(p, id, updater)) : [];
        return { ...node, children: newChildren, peripheries: newPeripheries };
      };

      const findNode = (node, searchId) => {
        if (!node) return null;
        if (node.id === searchId) return node;
        if (node.children) { for (let c of node.children) { const res = findNode(c, searchId); if (res) return res; } }
        if (node.peripheries) { for (let p of node.peripheries) { const res = findNode(p, searchId); if (res) return res; } }
        return null;
      };

      const findParentAndIndex = (node, searchId, parent = null) => {
        if (!node) return null;
        if (node.id === searchId) {
          if (!parent) return { parent: null, index: -1, nodeType: 'root' };
          const cIdx = parent.children ? parent.children.findIndex(c => c.id === searchId) : -1;
          if (cIdx !== -1) return { parent, index: cIdx, nodeType: 'child' };
          const pIdx = parent.peripheries ? parent.peripheries.findIndex(p => p.id === searchId) : -1;
          if (pIdx !== -1) return { parent, index: pIdx, nodeType: 'periphery' };
          return { parent, index: -1, nodeType: 'unknown' };
        }
        if (node.children) { for (let c of node.children) { const res = findParentAndIndex(c, searchId, node); if (res) return res; } }
        if (node.peripheries) { for (let p of node.peripheries) { const res = findParentAndIndex(p, searchId, node); if (res) return res; } }
        return null;
      };

      const getItemTypeById = (id) => {
        if (!diagram) return null;
        // Speech Act virtual node
        if (id === 'speech-act') return { type: 'speechAct' };
        const eIdx = diagram.expressions.findIndex(e => e.id === id);
        if (eIdx !== -1) return { type: 'expression', index: eIdx };
        // Check info structure units
        for (let ei = 0; ei < diagram.expressions.length; ei++) {
          const expr = diagram.expressions[ei];
          if (expr.infoUnit && expr.infoUnit.id === id) {
            return { type: 'infoUnit', exprIndex: ei, anchorExprId: expr.id };
          }
        }
        // Check operator layers and their operator nodes
        for (let ei = 0; ei < diagram.expressions.length; ei++) {
          const expr = diagram.expressions[ei];
          if (expr.operatorLayers) {
            for (let li = 0; li < expr.operatorLayers.length; li++) {
              const layer = expr.operatorLayers[li];
              if (layer.id === id) return { type: 'operator', exprIndex: ei, layerIndex: li, anchorExprId: expr.id };
              if (layer.operators) {
                const oi = layer.operators.findIndex(o => o.id === id);
                if (oi !== -1) return { type: 'operatorNode', exprIndex: ei, layerIndex: li, opIndex: oi, layerId: layer.id, anchorExprId: expr.id };
              }
            }
          }
        }
        if (diagram.root) {
          const nodeInfo = findParentAndIndex(diagram.root, id);
          if (nodeInfo) return { type: 'node', ...nodeInfo };
        }
        return null;
      };

      const getSelectedInfo = () => {
        if (!selectedId || !diagram) return null;
        return getItemTypeById(selectedId);
      };

      const handleLabelChange = (id, newLabel) => {
        const itemInfo = getItemTypeById(id);
        if (!itemInfo) return;
        if (itemInfo.type === 'expression') {
          const newExprs = diagram.expressions.map(e => e.id === id ? { ...e, label: newLabel } : e);
          if (JSON.stringify(newExprs) !== JSON.stringify(diagram.expressions)) commitChange({ ...diagram, expressions: newExprs });
        } else if (itemInfo.type === 'operator') {
          const newExprs = diagram.expressions.map((e, ei) => {
            if (ei !== itemInfo.exprIndex) return e;
            const newLayers = e.operatorLayers.map(l => l.id === id ? { ...l, label: newLabel } : l);
            return { ...e, operatorLayers: newLayers };
          });
          commitChange({ ...diagram, expressions: newExprs });
        } else if (itemInfo.type === 'infoUnit') {
          const newExprs = diagram.expressions.map((e, ei) => {
            if (ei !== itemInfo.exprIndex) return e;
            return { ...e, infoUnit: { ...e.infoUnit, label: newLabel } };
          });
          commitChange({ ...diagram, expressions: newExprs });
        } else if (itemInfo.type === 'operatorNode') {
          const newExprs = diagram.expressions.map((e, ei) => {
            if (ei !== itemInfo.exprIndex) return e;
            const newLayers = e.operatorLayers.map((l, li) => {
              if (li !== itemInfo.layerIndex) return l;
              const newOps = l.operators.map(o => o.id === id ? { ...o, label: newLabel } : o);
              return { ...l, operators: newOps };
            });
            return { ...e, operatorLayers: newLayers };
          });
          commitChange({ ...diagram, expressions: newExprs });
        } else {
          const newRoot = updateNode(diagram.root, id, n => ({ ...n, label: newLabel }));
          if (JSON.stringify(newRoot) !== JSON.stringify(diagram.root)) commitChange({ ...diagram, root: newRoot });
        }
      };

      const collectNodes = (n, acc = []) => {
        if (!n) return acc;
        acc.push(n);
        if (n.children) n.children.forEach(child => collectNodes(child, acc));
        if (n.peripheries) n.peripheries.forEach(perif => collectNodes(perif, acc));
        return acc;
      };

      const buildSimpleChildren = (count) => {
        return Array.from({ length: count }, () => ({
          id: generateId(), label: '...', children: [], peripheries: [], isSpine: false
        }));
      };

      const buildSimplePeriphery = (side) => ({
        id: generateId(), label: '...', side, children: [], peripheries: [], isSpine: false
      });

      // LÓGICA REESCRITA PARA EL INPUT NUMÉRICO
      const setDaughtersCount = (newCount) => {
        if (!selectedId || isNaN(newCount) || newCount < 0) return;
        const currentNode = findNode(diagram.root, selectedId);
        if (!currentNode) return;
        
        const currentCount = currentNode.children ? currentNode.children.length : 0;
        if (newCount === currentCount) return;

        let newRoot = diagram.root;
        if (newCount > currentCount) {
          // Agregar nodos nuevos a la derecha
          const toAdd = newCount - currentCount;
          const addedNodes = buildSimpleChildren(toAdd);
          newRoot = updateNode(diagram.root, selectedId, n => ({ ...n, children: [...(n.children || []), ...addedNodes] }));
        } else {
          // Remover nodos desde la derecha
          newRoot = updateNode(diagram.root, selectedId, n => ({ ...n, children: (n.children || []).slice(0, newCount) }));
        }
        commitChange({ ...diagram, root: newRoot });
      };

      const addPeriphery = (side) => {
        if (!selectedId) return;
        const newPeriphery = buildSimplePeriphery(side);
        const newRoot = updateNode(diagram.root, selectedId, n => ({ ...n, peripheries: [...(n.peripheries || []), newPeriphery] }));
        commitChange({ ...diagram, root: newRoot });
      };

      const addParentNode = () => {
        const info = getSelectedInfo();
        if (!info || info.type !== 'node' || info.parent) return;

        const currentNode = findNode(diagram.root, selectedId);
        if (!currentNode) return;

        const insertedLevelOffset = NODE_INSERT_Y_OFFSET;
        let requiredRootShift = 0;

        if (wrapperRef.current) {
          const currentLabelEl = wrapperRef.current.querySelector(`[data-node-id="${selectedId}"] > .node-content > .node-label`);
          if (currentLabelEl) {
            const wrapperRect = wrapperRef.current.getBoundingClientRect();
            const currentRect = currentLabelEl.getBoundingClientRect();
            const predictedParentTop = (currentRect.top - wrapperRect.top) - insertedLevelOffset;
            requiredRootShift = Math.max(0, Math.ceil(MIN_VISIBLE_TOP_GAP - predictedParentTop));
          }
        }

        const wrappedChild = { ...currentNode, isSpine: true, manualYOffset: currentNode.manualYOffset || 0 };
        const newParent = {
          id: generateId(),
          label: '',
          children: [wrappedChild],
          peripheries: [],
          isSpine: false,
          manualYOffset: -(insertedLevelOffset) + requiredRootShift
        };

        commitChange({ ...diagram, root: newParent });
        setSelectedId(newParent.id);
        setPendingEditId(newParent.id);
      };


      const getNodeLinkIds = (node) => {
        if (!node) return [];
        if (Array.isArray(node.exprIds)) return node.exprIds.filter(Boolean);
        return node.exprId ? [node.exprId] : [];
      };

      const setNodeLinkIds = (node, ids) => {
        const clean = [...new Set((ids || []).filter(Boolean))];
        const updated = { ...node };
        delete updated.exprId;
        delete updated.exprIds;
        if (clean.length === 1) {
          updated.exprId = clean[0];
        } else if (clean.length > 1) {
          updated.exprIds = clean;
        }
        return updated;
      };

      const getLinkedExpressionsMaps = () => {
        const syntaxMap = {}; 
        const operatorMap = {};
        if (!diagram) return { syntaxMap, operatorMap };
        
        // 1. Enlaces del árbol de constituyentes
        if (diagram.root) {
          const walk = (n) => {
            if (!n) return;
            getNodeLinkIds(n).forEach(exprId => { syntaxMap[exprId] = n.label; });
            if (n.children) n.children.forEach(walk);
            if (n.peripheries) n.peripheries.forEach(walk);
          };
          walk(diagram.root);
        }
        
        // 2. Enlaces de la proyección de operadores
        diagram.expressions.forEach(e => {
          if (!e.operatorLayers) return;
          e.operatorLayers.forEach(l => {
            if (!l.operators) return;
            l.operators.forEach(op => {
              getNodeLinkIds(op).forEach(exprId => { 
                if (!operatorMap[exprId]) operatorMap[exprId] = op.label; 
              });
            });
          });
        });
        
        return { syntaxMap, operatorMap };
      };

      const handleToggleTriangle = () => {
        if (!selectedId) return;
        const newRoot = updateNode(diagram.root, selectedId, n => ({
          ...n,
          linkAsTriangle: !n.linkAsTriangle
        }));
        commitChange({ ...diagram, root: newRoot });
      };

      const handleLinkExpression = (exprId) => {
        if (!selectedId) return;
        const info = getSelectedInfo();
        const currentNode = findNode(diagram.root, selectedId);
        if (!currentNode) return;
        const currentIds = getNodeLinkIds(currentNode);
        const isPeriphery = info?.nodeType === 'periphery';

        const unlinkPrevious = (n) => {
          if (!n) return n;
          let updated = { ...n };
          const existing = getNodeLinkIds(updated);
          if (existing.includes(exprId) && updated.id !== selectedId) {
            updated = setNodeLinkIds(updated, existing.filter(id => id !== exprId));
          }
          if (updated.children) updated.children = updated.children.map(unlinkPrevious);
          if (updated.peripheries) updated.peripheries = updated.peripheries.map(unlinkPrevious);
          return updated;
        };

        let newRoot = diagram.root;
        if (exprId) newRoot = unlinkPrevious(newRoot);

        newRoot = updateNode(newRoot, selectedId, n => {
          const ids = getNodeLinkIds(n);
          if (!exprId) return setNodeLinkIds(n, []);
          if (isPeriphery) {
            const nextIds = ids.includes(exprId) ? ids.filter(id => id !== exprId) : [...ids, exprId];
            return setNodeLinkIds(n, nextIds);
          }
          return setNodeLinkIds(n, [exprId]);
        });

        commitChange({ ...diagram, root: newRoot });
      };

      const handleLinkExpressionForOpNode = (exprId) => {
        if (!selectedId) return;
        const info = getItemTypeById(selectedId);
        if (!info || info.type !== 'operatorNode') return;

        const newExprs = diagram.expressions.map((e, ei) => {
          if (ei !== info.exprIndex) return e;
          const newLayers = e.operatorLayers.map((l, li) => {
            if (li !== info.layerIndex) return l;
            const newOps = l.operators.map(o => {
              if (o.id !== selectedId) return o;
              const ids = getNodeLinkIds(o);
              if (!exprId) return setNodeLinkIds(o, []);
              const nextIds = ids.includes(exprId) ? ids.filter(id => id !== exprId) : [...ids, exprId];
              return setNodeLinkIds(o, nextIds);
            });
            return { ...l, operators: newOps };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
      };

      // --- NUEVAS FUNCIONES PARA GESTIÓN DE ENLACES ---
      const getIncomingLinks = (exprId) => {
        const links = [];
        if (!diagram) return links;

        // Buscar en la proyección de constituyentes
        if (diagram.root) {
          const walk = (n) => {
            if (!n) return;
            if (getNodeLinkIds(n).includes(exprId)) {
              links.push({ type: 'syntax', sourceId: n.id, label: n.label });
            }
            if (n.children) n.children.forEach(walk);
            if (n.peripheries) n.peripheries.forEach(walk);
          };
          walk(diagram.root);
        }

        // Buscar en la proyección de operadores
        diagram.expressions.forEach(e => {
          if (e.operatorLayers) {
            e.operatorLayers.forEach(l => {
              if (l.operators) {
                l.operators.forEach(op => {
                  if (getNodeLinkIds(op).includes(exprId)) {
                    links.push({ type: 'operator', sourceId: op.id, label: op.label });
                  }
                });
              }
            });
          }
        });
        return links;
      };

      const handleRemoveIncomingLink = (exprId, link) => {
        if (link.type === 'syntax') {
          const newRoot = updateNode(diagram.root, link.sourceId, n => {
            const currentIds = getNodeLinkIds(n);
            return setNodeLinkIds(n, currentIds.filter(id => id !== exprId));
          });
          commitChange({ ...diagram, root: newRoot });
        } else if (link.type === 'operator') {
          const newExprs = diagram.expressions.map(e => {
            if (!e.operatorLayers) return e;
            const newLayers = e.operatorLayers.map(l => {
              if (!l.operators) return l;
              const newOps = l.operators.map(op => {
                if (op.id !== link.sourceId) return op;
                const currentIds = getNodeLinkIds(op);
                return setNodeLinkIds(op, currentIds.filter(id => id !== exprId));
              });
              return { ...l, operators: newOps };
            });
            return { ...e, operatorLayers: newLayers };
          });
          commitChange({ ...diagram, expressions: newExprs });
        }
      };

      const clearSpawnTargetDeep = (node) => {
        if (!node) return node;
        const { spawnTargetX, ...rest } = node;
        return {
          ...rest,
          children: (rest.children || []).map(clearSpawnTargetDeep),
          peripheries: (rest.peripheries || []).map(clearSpawnTargetDeep)
        };
      };

      const clearSpawnTargetShallow = (node) => {
        if (!node) return node;
        const { spawnTargetX, ...rest } = node;
        return rest;
      };

      const addLexicalItem = (direction) => {
        const info = getSelectedInfo();
        if (!info || info.type !== 'expression') return;
        const newExpr = { id: generateId(), label: '...' };
        const insertIndex = direction === -1 ? info.index : info.index + 1;
        const newExpressions = [...diagram.expressions];
        newExpressions.splice(insertIndex, 0, newExpr);
        commitChange({ ...diagram, expressions: newExpressions });
      };

      // --- Information Structure functions ---
      const addInfoUnit = (exprId) => {
        const newUnit = { id: generateId(), label: '...', spanLeft: 0, spanRight: 0 };
        const newExprs = diagram.expressions.map(e => {
          if (e.id !== exprId) return e;
          return { ...e, infoUnit: newUnit };
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newUnit.id);
        setPendingEditId(newUnit.id);
      };

      const deleteInfoUnit = (exprId) => {
        const newExprs = diagram.expressions.map(e => {
          if (e.id !== exprId) return e;
          const { infoUnit, ...rest } = e;
          return rest;
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(null);
        setEditingId(null);
      };

      const addOperatorLayer = (exprId) => {
        const newLayer = { id: generateId(), label: '...' };
        const newExprs = diagram.expressions.map(e => {
          if (e.id !== exprId) return e;
          const layers = e.operatorLayers ? [...e.operatorLayers, newLayer] : [newLayer];
          return { ...e, operatorLayers: layers };
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newLayer.id);
        setPendingEditId(newLayer.id);
      };

      const addOperatorLayerAfter = (operatorId) => {
        const info = getItemTypeById(operatorId);
        if (!info || info.type !== 'operator') return;
        const expr = diagram.expressions[info.exprIndex];
        const newLayer = { id: generateId(), label: '...' };
        const newLayers = [...(expr.operatorLayers || [])];
        newLayers.splice(info.layerIndex + 1, 0, newLayer);
        const newExprs = diagram.expressions.map((e, i) => i === info.exprIndex ? { ...e, operatorLayers: newLayers } : e);
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newLayer.id);
        setPendingEditId(newLayer.id);
      };

      const deleteOperatorLayer = (layerId) => {
        const newExprs = diagram.expressions.map(e => {
          if (!e.operatorLayers) return e;
          const newLayers = e.operatorLayers
            .filter(l => l.id !== layerId)
            .map(l => l.superiorLayerId === layerId ? (() => { const { superiorLayerId, ...rest } = l; return rest; })() : l);
          return { ...e, operatorLayers: newLayers.length > 0 ? newLayers : undefined };
        });
        commitChange({ ...diagram, expressions: newExprs });
        if (selectedId === layerId) { setSelectedId(null); setEditingId(null); }
      };

      const addOperatorToLayer = (layerId, side) => {
        const newOp = { id: generateId(), label: '...', side };
        const newExprs = diagram.expressions.map(e => {
          if (!e.operatorLayers) return e;
          const newLayers = e.operatorLayers.map(l => {
            if (l.id !== layerId) return l;
            return { ...l, operators: [...(l.operators || []), newOp] };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
        setSelectedId(newOp.id);
        setPendingEditId(newOp.id);
      };

      const deleteOperatorNode = (opId) => {
        const newExprs = diagram.expressions.map(e => {
          if (!e.operatorLayers) return e;
          const newLayers = e.operatorLayers.map(l => {
            if (!l.operators) return l;
            const newOps = l.operators.filter(o => o.id !== opId);
            return { ...l, operators: newOps.length > 0 ? newOps : undefined };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
        if (selectedId === opId) { setSelectedId(null); setEditingId(null); }
      };

      const moveOperatorNode = (opId, direction) => {
        const info = getItemTypeById(opId);
        if (!info || info.type !== 'operatorNode') return;
        const step = direction * 20;
        const newExprs = diagram.expressions.map((e, ei) => {
          if (ei !== info.exprIndex) return e;
          const newLayers = e.operatorLayers.map((l, li) => {
            if (li !== info.layerIndex) return l;
            const newOps = l.operators.map(o => {
              if (o.id !== opId) return o;
              const curr = o.manualXOffset || 0;
              const next = curr + step;
              // Left operators: offset <= 0 (can't move closer than creation pos)
              // Right operators: offset >= 0
              if (o.side === 'left' && next > 0) return o;
              if (o.side === 'right' && next < 0) return o;
              return { ...o, manualXOffset: next };
            });
            return { ...l, operators: newOps };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
      };

      const moveOperatorLayerVertical = (layerId, direction) => {
        const info = getItemTypeById(layerId);
        if (!info || info.type !== 'operator') return;
        const step = direction * 25;
        const newExprs = diagram.expressions.map((e, ei) => {
          if (ei !== info.exprIndex) return e;
          const newLayers = e.operatorLayers.map((l, li) => {
            if (li !== info.layerIndex) return l;
            const curr = l.manualYOffset || 0;
            const next = Math.max(0, curr + step);
            return { ...l, manualYOffset: next };
          });
          return { ...e, operatorLayers: newLayers };
        });
        commitChange({ ...diagram, expressions: newExprs });
      };

      const moveSpeechActVertical = (direction) => {
        const step = direction * 10;
        const curr = diagram.speechActYOffset || 0;
        const next = curr + step;
        commitChange({ ...diagram, speechActYOffset: next });
      };

      const toggleSpine = () => {
        const info = getSelectedInfo();
        if (!info || info.type !== 'node' || !info.parent || info.nodeType !== 'child') return; 
        const { parent } = info;
        const currentIsSpine = parent.children.find(c => c.id === selectedId)?.isSpine || false;
        const newChildren = parent.children.map(c => ({ ...clearSpawnTargetDeep(c), isSpine: c.id === selectedId ? !currentIsSpine : false }));
        const newRoot = updateNode(diagram.root, parent.id, n => ({ ...n, children: newChildren }));
        commitChange({ ...diagram, root: newRoot });
      };

      const moveItem = (direction) => { 
        const info = getSelectedInfo();
        if (!info) return;

        if (info.type === 'expression') {
          const idx = info.index;
          const newIdx = idx + direction;
          if (newIdx < 0 || newIdx >= diagram.expressions.length) return;
          const newExprs = [...diagram.expressions];
          const temp = newExprs[idx];
          newExprs[idx] = newExprs[newIdx];
          newExprs[newIdx] = temp;
          commitChange({ ...diagram, expressions: newExprs });
          return;
        }

        if (info.type === 'node' && info.parent) {
          const { parent, nodeType, index } = info;
          if (nodeType === 'child') {
            const newIndex = index + direction;
            if (newIndex < 0 || newIndex >= parent.children.length) return;
            const newChildren = parent.children.map(clearSpawnTargetDeep);
            const temp = newChildren[index];
            newChildren[index] = newChildren[newIndex];
            newChildren[newIndex] = temp;
            const newRoot = updateNode(diagram.root, parent.id, n => ({ ...n, children: newChildren }));
            commitChange({ ...diagram, root: newRoot });
          } else if (nodeType === 'periphery') {
            const lefts = (parent.peripheries || []).filter(p => p.side === 'left');
            const rights = (parent.peripheries || []).filter(p => p.side === 'right');
            const visual = [...lefts, 'CORE', ...rights];
            const currentIndex = visual.findIndex(item => item !== 'CORE' && item.id === selectedId);
            const newIndex = currentIndex + direction;
            if (newIndex < 0 || newIndex >= visual.length) return;

            const temp = visual[currentIndex];
            visual[currentIndex] = visual[newIndex];
            visual[newIndex] = temp;

            const newPeripheries = [];
            let currentSide = 'left';
            for (const item of visual) {
              if (item === 'CORE') currentSide = 'right';
              else newPeripheries.push({ ...clearSpawnTargetDeep(item), side: currentSide });
            }
            const newRoot = updateNode(diagram.root, parent.id, n => ({ ...n, peripheries: newPeripheries }));
            commitChange({ ...diagram, root: newRoot });
          }
        }
      };

      const deleteItem = (idToRemove) => {
        if (diagram.root && diagram.root.id === idToRemove) {
          commitChange({ ...diagram, root: null });
          setSelectedId(null);
          setEditingId(null);
          return;
        }
        // Check if it's an operator layer or operator node
        const opInfo = getItemTypeById(idToRemove);
        if (opInfo && opInfo.type === 'operator') {
          deleteOperatorLayer(idToRemove);
          return;
        }
        if (opInfo && opInfo.type === 'operatorNode') {
          deleteOperatorNode(idToRemove);
          return;
        }
        if (opInfo && opInfo.type === 'infoUnit') {
          deleteInfoUnit(opInfo.anchorExprId);
          return;
        }
        if (diagram.expressions.find(e => e.id === idToRemove)) {
          const unlink = (n) => {
            if(!n) return n;
            let newN = {...n}; // <-- FIX 1: Changed const to let
            newN = setNodeLinkIds(newN, getNodeLinkIds(newN).filter(linkId => linkId !== idToRemove));
            if(newN.children) newN.children = newN.children.map(unlink);
            if(newN.peripheries) newN.peripheries = newN.peripheries.map(unlink);
            return newN;
          };
          const newRoot = diagram.root ? unlink(diagram.root) : null;
          const newExprs = diagram.expressions.filter(e => e.id !== idToRemove);
          commitChange({ root: newRoot, expressions: newExprs });
          if (selectedId === idToRemove) { setSelectedId(null); setEditingId(null); }
          return;
        }
        if (diagram.root) {
          const removeRecursively = (nodes) => {
            if (!nodes) return [];
            return nodes.filter(n => n.id !== idToRemove).map(n => ({
                ...n, children: removeRecursively(n.children), peripheries: removeRecursively(n.peripheries)
            }));
          };
          const newRoot = {
            ...diagram.root,
            children: removeRecursively(diagram.root.children),
            peripheries: removeRecursively(diagram.root.peripheries)
          };
          commitChange({ ...diagram, root: newRoot });
        }
        if (selectedId === idToRemove) { setSelectedId(null); setEditingId(null); }
      };

      const handleNodeClick = (e, id) => {
        e.stopPropagation();

        // If in layer linking mode, check if clicked target is a valid operator layer on a different spine
        if (linkingLayerId) {
          const sourceInfo = getItemTypeById(linkingLayerId);
          const targetInfo = getItemTypeById(id);
          const isValidOperatorTarget = targetInfo && targetInfo.type === 'operator' && targetInfo.anchorExprId !== sourceInfo?.anchorExprId;
          const isValidExpressionTarget = targetInfo && targetInfo.type === 'expression';
          if (isValidOperatorTarget || isValidExpressionTarget) {
            // Link source layer to target layer or expression base node
            const newExprs = diagram.expressions.map((e, ei) => {
              if (ei !== sourceInfo.exprIndex) return e;
              const newLayers = e.operatorLayers.map(l => {
                if (l.id !== linkingLayerId) return l;
                return { ...l, superiorLayerId: id };
              });
              return { ...e, operatorLayers: newLayers };
            });
            commitChange({ ...diagram, expressions: newExprs });
            setLinkingLayerId(null);
            setSelectedId(linkingLayerId);
            setEditingId(null);
            return;
          }
          // Cancel linking if clicking elsewhere
          setLinkingLayerId(null);
        }

        setSelectedId(id);
        setEditingId(id);
      };

      const getNodeToExprMap = () => {
        const map = {};
        const walk = (n) => {
          if (!n) return;
          const linkIds = getNodeLinkIds(n);
          if (linkIds.length) map[n.id] = linkIds;
          (n.children || []).forEach(walk);
          (n.peripheries || []).forEach(walk);
        };
        walk(diagram?.root);
        return map;
      };

      const solveEquatorPositions = (exprMetrics, desiredCenters) => {
        if (!exprMetrics.length) return {};

        const sorted = [...exprMetrics].sort((a, b) => a.index - b.index);
        const centers = sorted.map(expr => expr.left + expr.width / 2);
        const isAnchored = sorted.map(expr => desiredCenters[expr.id] !== undefined);

        // Linked lexical items stay exactly under their linked syntactic node.
        sorted.forEach((expr, i) => {
          if (isAnchored[i]) centers[i] = desiredCenters[expr.id];
        });
