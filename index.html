                    })()}
                                        
                    <div className="sidebar-section" style={{ marginTop: '14px' }}>
                      <div style={{ fontSize: '0.82rem', color: diagram.expressions.some(e => e.infoUnit?.focusType === 'actual') ? '#adb5bd' : 'var(--text-secondary)', fontWeight: 600, marginBottom: '6px' }}>Special Focus Domains</div>
                      {diagram.expressions.some(e => e.infoUnit?.focusType === 'actual') && <p style={{ fontSize: '0.78rem', color: '#adb5bd', marginTop: '-2px', marginBottom: '6px', fontStyle: 'italic' }}>Disabled: actual focus is active</p>}
                      <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                        <button className="btn" style={{ width: '100%', fontWeight: focusSelectionMode === 'completive' ? 700 : 'normal', fontSize: '0.85rem', background: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'rgba(0,0,0,0.04)' : (focusSelectionMode === 'completive' ? 'var(--accent)' : 'white'), color: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'var(--text-secondary)' : (focusSelectionMode === 'completive' ? 'white' : 'var(--text)'), borderColor: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'var(--border)' : (focusSelectionMode === 'completive' ? 'var(--accent)' : 'var(--border)'), display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', opacity: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 0.6 : 1, cursor: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'not-allowed' : 'pointer' }} disabled={diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')} onClick={() => { if (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) return; setFocusSelectionMode(focusSelectionMode === 'completive' ? null : 'completive'); setSelectedId(null); setEditingId(null); }}>
                          {focusSelectionMode === 'completive' ? '● Selecting completive IU… (click to stop)' : 'Mark IU as Completive Focus'}
                          <svg style={{ width: 16, height: 12, border: '1px solid currentColor', borderRadius: 2, flexShrink: 0, opacity: 0.7 }} viewBox="0 0 16 12"><line x1="0" y1="3" x2="16" y2="3" stroke="currentColor" strokeWidth="0.8"/><line x1="0" y1="6" x2="16" y2="6" stroke="currentColor" strokeWidth="0.8"/><line x1="0" y1="9" x2="16" y2="9" stroke="currentColor" strokeWidth="0.8"/></svg>
                        </button>

                        {diagram.expressions.some(e => e.infoUnit?.focusType === 'completive') && (
                          <div style={{ fontSize: '0.84rem', paddingLeft: '4px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                            <span style={{ color: 'var(--accent)', fontWeight: 600 }}>✓</span>
                            {(() => {
                              const ex = diagram.expressions.find(e => e.infoUnit?.focusType === 'completive');
                              if (!ex) return '…';
                              const ei = diagram.expressions.indexOf(ex);
                              const sL = ex.infoUnit?.spanLeft || 0; const sR = ex.infoUnit?.spanRight || 0;
                              const labels = [];
                              for (let i = Math.max(0, ei - sL); i <= Math.min(diagram.expressions.length - 1, ei + sR); i++) labels.push(diagram.expressions[i].label || '…');
                              return labels.length > 1 ? labels.join(' · ') : (ex.label || '…');
                            })()}
                            <span style={{ color: 'var(--danger)', cursor: 'pointer', fontSize: '0.78rem', marginLeft: 'auto' }} onClick={() => { const newExprs = diagram.expressions.map(e => e.infoUnit?.focusType === 'completive' ? { ...e, infoUnit: { ...e.infoUnit, isActualFocus: false, focusType: undefined } } : e ); commitChange({ ...diagram, expressions: newExprs }); }}>✕ remove</span>
                          </div>
                        )}

                        <button className="btn" style={{ width: '100%', fontWeight: focusSelectionMode === 'contrastive' ? 700 : 'normal', fontSize: '0.85rem', background: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'rgba(0,0,0,0.04)' : (focusSelectionMode === 'contrastive' ? 'var(--accent)' : 'white'), color: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'var(--text-secondary)' : (focusSelectionMode === 'contrastive' ? 'white' : 'var(--text)'), borderColor: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'var(--border)' : (focusSelectionMode === 'contrastive' ? 'var(--accent)' : 'var(--border)'), display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px', opacity: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 0.6 : 1, cursor: (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) ? 'not-allowed' : 'pointer' }} disabled={diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')} onClick={() => { if (diagram.expressions.some(e => e.infoUnit?.focusType === 'actual')) return; setFocusSelectionMode(focusSelectionMode === 'contrastive' ? null : 'contrastive'); setSelectedId(null); setEditingId(null); }}>
                          {focusSelectionMode === 'contrastive' ? '● Selecting contrastive IU… (click to stop)' : 'Mark IU as Contrastive Focus'}
                          <svg style={{ width: 16, height: 12, border: '1px solid currentColor', borderRadius: 2, flexShrink: 0, opacity: 0.7 }} viewBox="0 0 16 12"><line x1="2" y1="0" x2="2" y2="12" stroke="currentColor" strokeWidth="0.8"/><line x1="6" y1="0" x2="6" y2="12" stroke="currentColor" strokeWidth="0.8"/><line x1="10" y1="0" x2="10" y2="12" stroke="currentColor" strokeWidth="0.8"/><line x1="14" y1="0" x2="14" y2="12" stroke="currentColor" strokeWidth="0.8"/></svg>
                        </button>

                        {diagram.expressions.some(e => e.infoUnit?.focusType === 'contrastive') && (
                          <div style={{ fontSize: '0.84rem', paddingLeft: '4px', display: 'flex', alignItems: 'center', gap: '6px' }}>
                            <span style={{ color: 'var(--accent)', fontWeight: 600 }}>✓</span>
                            {(() => {
                              const ex = diagram.expressions.find(e => e.infoUnit?.focusType === 'contrastive');
                              if (!ex) return '…';
                              const ei = diagram.expressions.indexOf(ex);
                              const sL = ex.infoUnit?.spanLeft || 0; const sR = ex.infoUnit?.spanRight || 0;
                              const labels = [];
                              for (let i = Math.max(0, ei - sL); i <= Math.min(diagram.expressions.length - 1, ei + sR); i++) labels.push(diagram.expressions[i].label || '…');
                              return labels.length > 1 ? labels.join(' · ') : (ex.label || '…');
                            })()}
                            <span style={{ color: 'var(--danger)', cursor: 'pointer', fontSize: '0.78rem', marginLeft: 'auto' }} onClick={() => { const newExprs = diagram.expressions.map(e => e.infoUnit?.focusType === 'contrastive' ? { ...e, infoUnit: { ...e.infoUnit, isActualFocus: false, focusType: undefined } } : e ); commitChange({ ...diagram, expressions: newExprs }); }}>✕ remove</span>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
              </div>
            ) : (
              <div className="sidebar-section">
                <div className="sidebar-title" style={{ fontSize: '1.1rem' }}>Projections</div>
                
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', marginBottom: '12px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0, marginTop: '10px' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={diagram.root ? 'var(--text-secondary)' : 'var(--border)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }} title="Toggle visibility"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <input type="checkbox" checked={showConstituent} onChange={(e) => setShowConstituent(e.target.checked)} disabled={!diagram.root} style={{ width: '16px', height: '16px', cursor: diagram.root ? 'pointer' : 'not-allowed', accentColor: 'var(--accent)' }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <button className={diagram.root ? "btn btn-no-hover" : "btn"} style={{ width: '100%', textAlign: 'left', borderRadius: '8px', fontWeight: 'bold', borderColor: diagram.root ? 'var(--accent)' : 'var(--border)', cursor: diagram.root ? 'default' : 'pointer', display: 'flex', justifyContent: 'space-between', alignItems: 'center', boxShadow: diagram.root ? 'none' : '0 2px 4px rgba(0,0,0,0.04)' }} onClick={initializeConstituentProjection}>
                      <span>{diagram.root ? '✓ Constituent Projection' : 'Constituent Projection'}</span>
                      {!diagram.root && <div style={{ width: '16px', height: '16px' }}></div>}
                    </button>
                    {!diagram.root ? (<p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Click to start building the syntactic tree</p>) : (<p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Click on any node of the Constituent Projection to see options</p>)}
                  </div>
                </div>

                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', marginBottom: '12px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0, marginTop: '10px' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={diagram.expressions.some(e => e.operatorLayers?.length) ? 'var(--text-secondary)' : 'var(--border)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }} title="Toggle visibility"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <input type="checkbox" checked={showOperators} onChange={(e) => setShowOperators(e.target.checked)} disabled={!diagram.expressions.some(e => e.operatorLayers?.length)} style={{ width: '16px', height: '16px', cursor: diagram.expressions.some(e => e.operatorLayers?.length) ? 'pointer' : 'not-allowed', accentColor: 'var(--accent)' }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <button className="btn btn-no-hover" style={{ width: '100%', textAlign: 'left', borderRadius: '8px', fontWeight: diagram.expressions.some(e => e.operatorLayers?.length) ? 'bold' : 'normal', borderColor: diagram.expressions.some(e => e.operatorLayers?.length) ? 'var(--accent)' : 'var(--border)', opacity: diagram.expressions.some(e => e.operatorLayers?.length) ? 1 : 0.45, cursor: 'default' }}>
                      {diagram.expressions.some(e => e.operatorLayers?.length) ? '✓ Operator Projection' : 'Operator Projection'}
                    </button>
                    {diagram.expressions.some(e => e.operatorLayers?.length) ? (<p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Click on any node of the Operator Projection to see options</p>) : (<p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Select any item of the expression to add operator layers</p>)}
                  </div>
                </div>

                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px', marginBottom: '12px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '4px', flexShrink: 0, marginTop: '10px' }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={diagram.expressions.some(e => e.infoUnit) ? 'var(--text-secondary)' : 'var(--border)'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0 }} title="Toggle visibility"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <input type="checkbox" checked={showInfoStructure} onChange={(e) => setShowInfoStructure(e.target.checked)} disabled={!diagram.expressions.some(e => e.infoUnit)} style={{ width: '16px', height: '16px', cursor: diagram.expressions.some(e => e.infoUnit) ? 'pointer' : 'not-allowed', accentColor: 'var(--accent)' }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <button className="btn" disabled={!diagram.expressions.some(e => e.infoUnit)} style={{ width: '100%', textAlign: 'left', borderRadius: '8px', fontWeight: diagram.expressions.some(e => e.infoUnit) ? 'bold' : 'normal', borderColor: (diagram.expressions.some(e => e.infoUnit) || showFocusDomains) ? 'var(--accent)' : 'var(--border)', opacity: diagram.expressions.some(e => e.infoUnit) ? 1 : 0.45, display: 'flex', justifyContent: 'space-between', alignItems: 'center', boxShadow: '0 2px 4px rgba(0,0,0,0.04)' }} onClick={() => setShowFocusDomains(true)}>
                      <span>{diagram.expressions.some(e => e.infoUnit) ? '✓ Information Structure' : 'Information Structure'}</span>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{ opacity: 0.5 }}><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                    {!diagram.expressions.some(e => e.infoUnit) ? (<p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Select any item of the expression to mark it as Information Unit</p>) : (<p style={{fontSize: '0.8rem', color: 'var(--text-secondary)', marginTop: '4px'}}>Click to see Information Structure options</p>)}
                  </div>
                </div>

                {showOperators && showInfoStructure && diagram.expressions.some(e => e.operatorLayers?.length) && diagram.expressions.some(e => e.infoUnit) && (
                  <div style={{ marginTop: '24px', paddingTop: '16px', borderTop: '1px solid var(--border-light)' }}>
                  <div style={{ fontSize: '0.8rem', fontWeight: 700, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: '2px' }}>Dim projections</div>
                    <select className="node-select" style={{ marginTop: '8px' }} value={projectionFocus} onChange={(e) => setProjectionFocus(e.target.value)}>
                      <option value="all">Do not dim anything</option>
                      <option value="OP">Dim Information Structure</option>
                      <option value="IS">Dim Operators</option>
                    </select>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
        <footer className="app-footer">
          <p>Carlos González Vergara (<strong><a href="mailto:cgonzalv@uc.cl">cgonzalv@uc.cl</a></strong>)</p>
          <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer"><img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by-nc-nd.svg" alt="CC BY-NC-ND 4.0" /></a>
        </footer>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<TelperionApp />);
  </script>
</body>
</html>
