              const cleared = newExprs.map(ex => {
                if (!ex.infoUnit || ex.infoUnit.focusType !== 'completive') return ex;
                return { ...ex, infoUnit: { ...ex.infoUnit, isActualFocus: false, focusType: undefined } };
              });
              const target = cleared[exprIndex];
              cleared[exprIndex] = { ...target, infoUnit: { ...target.infoUnit, isActualFocus: true, focusType: 'completive' } };
              for (let i = 0; i < cleared.length; i++) {
                if (cleared[i].infoUnit && cleared[i].infoUnit.focusType === 'actual') {
                  cleared[i] = { ...cleared[i], infoUnit: { ...cleared[i].infoUnit, isActualFocus: false, focusType: undefined } };
                }
              }
              newExprs.splice(0, newExprs.length, ...cleared);
            } else if (focusSelectionMode === 'contrastive') {
              const cleared = newExprs.map(ex => {
                if (!ex.infoUnit || ex.infoUnit.focusType !== 'contrastive') return ex;
                return { ...ex, infoUnit: { ...ex.infoUnit, isActualFocus: false, focusType: undefined } };
              });
              const target = cleared[exprIndex];
              cleared[exprIndex] = { ...target, infoUnit: { ...target.infoUnit, isActualFocus: true, focusType: 'contrastive' } };
              for (let i = 0; i < cleared.length; i++) {
                if (cleared[i].infoUnit && cleared[i].infoUnit.focusType === 'actual') {
                  cleared[i] = { ...cleared[i], infoUnit: { ...cleared[i].infoUnit, isActualFocus: false, focusType: undefined } };
                }
              }
              newExprs.splice(0, newExprs.length, ...cleared);
            }

            commitChange({ ...diagram, expressions: newExprs });
            setSelectedId(null); setEditingId(null);
            if (focusSelectionMode === 'completive' || focusSelectionMode === 'contrastive') { setFocusSelectionMode(null); }
            return;
          }
          setFocusSelectionMode(null);
        }

        if (linkingLayerId) {
          const sourceInfo = getItemTypeById(linkingLayerId);
          const targetInfo = getItemTypeById(id);
          const isValidOperatorTarget = targetInfo && targetInfo.type === 'operator' && targetInfo.anchorExprId !== sourceInfo?.anchorExprId;
          const isValidExpressionTarget = targetInfo && (targetInfo.type === 'expression' || targetInfo.type === 'gloss');
          if (isValidOperatorTarget || isValidExpressionTarget) {
            const newExprs = diagram.expressions.map((e, ei) => {
              if (ei !== sourceInfo.exprIndex) return e;
              const newLayers = e.operatorLayers.map(l => {
                if (l.id !== linkingLayerId) return l;
                return { ...l, superiorLayerId: id.replace('-gloss', '') };
              });
              return { ...e, operatorLayers: newLayers };
            });
            commitChange({ ...diagram, expressions: newExprs });
            setLinkingLayerId(null); setSelectedId(linkingLayerId); setEditingId(null);
            return;
          }
          setLinkingLayerId(null);
        }

        setSelectedId(id); setEditingId(id);
      };

      const getNodeToExprMap = () => {
        const map = {};
        const walk = (n) => {
          if (!n) return;
          const linkIds = getNodeLinkIds(n);
          if (linkIds.length) map[n.id] = linkIds;
          (n.children || []).forEach(walk);
          (n.peripheries || []).forEach(walk);
        };
        walk(diagram?.root);
        return map;
      };

      const solveEquatorPositions = (exprMetrics, desiredCenters) => {
        if (!exprMetrics.length) return {};
        const sorted = [...exprMetrics].sort((a, b) => a.index - b.index);
        const centers = sorted.map(expr => expr.left + expr.width / 2);
        const isAnchored = sorted.map(expr => desiredCenters[expr.id] !== undefined);

        sorted.forEach((expr, i) => { if (isAnchored[i]) centers[i] = desiredCenters[expr.id]; });

        let firstAnchor = isAnchored.findIndex(Boolean);
        if (firstAnchor === -1) { firstAnchor = 0; } 
        else {
          for (let i = firstAnchor - 1; i >= 0; i--) {
            const minGap = sorted[i].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[i + 1].width / 2;
            centers[i] = centers[i + 1] - minGap;
          }
        }

        const reversedAnchor = [...isAnchored].reverse().findIndex(Boolean);
        const lastAnchor = reversedAnchor === -1 ? sorted.length - 1 : sorted.length - 1 - reversedAnchor;
        if (reversedAnchor !== -1) {
          for (let i = lastAnchor + 1; i < sorted.length; i++) {
            const minGap = sorted[i - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[i].width / 2;
            centers[i] = centers[i - 1] + minGap;
          }
        }

        let prevAnchor = -1;
        for (let i = 0; i < sorted.length; i++) {
          if (!isAnchored[i]) continue;
          if (prevAnchor === -1) { prevAnchor = i; continue; }
          const gapCount = i - prevAnchor;
          if (gapCount > 1) {
            const left = centers[prevAnchor]; const right = centers[i];
            const minNeeded = (() => {
              let acc = 0;
              for (let j = prevAnchor + 1; j <= i; j++) acc += sorted[j - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[j].width / 2;
              return acc;
            })();
            if (right - left >= minNeeded) {
              let cursor = left; const extra = (right - left - minNeeded) / gapCount;
              for (let j = prevAnchor + 1; j < i; j++) {
                cursor += sorted[j - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + extra + sorted[j].width / 2;
                centers[j] = cursor;
              }
            } else {
              let cursor = left;
              for (let j = prevAnchor + 1; j < i; j++) {
                cursor += sorted[j - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[j].width / 2;
                centers[j] = cursor;
              }
            }
          }
          prevAnchor = i;
        }

        if (!isAnchored.some(Boolean)) {
          for (let i = 1; i < sorted.length; i++) {
            const minCenter = centers[i - 1] + sorted[i - 1].width / 2 + EQUATOR_MIN_ITEM_GAP + sorted[i].width / 2;
            if (centers[i] < minCenter) centers[i] = minCenter;
          }
        }

        const shifts = {};
        sorted.forEach((expr, i) => {
          const naturalCenter = expr.left + expr.width / 2;
          shifts[expr.id] = centers[i] - naturalCenter;
        });
        return shifts;
      };

      useLayoutEffect(() => {
        if (!diagram || !wrapperRef.current) return;
        if (editingId !== null) return; 

        const wrapperEl = wrapperRef.current;
        wrapperEl.style.transform = 'none';
        void wrapperEl.offsetWidth; 

        const wrapperRect = wrapperEl.getBoundingClientRect();
        
        const getEl = (id) => document.querySelector(`[data-node-id="${id}"] > .node-content > .node-label`);
        const getExprEl = (id) => document.querySelector(`[data-expr-id="${id}"] > .node-content > .node-label.equator-item`);
        const getOpEl = (id) => document.querySelector(`[data-operator-id="${id}"] .node-label`);
        const getOpNodeEl = (id) => document.querySelector(`[data-opnode-id="${id}"] .node-label`);
        const getInfoEl = (id) => document.querySelector(`[data-info-id="${id}"] .node-label`);
        const getWrapperEl = (id) => document.querySelector(`[data-node-id="${id}"]`);

        const yOffsetMap = {};
        const xOffsetMap = {};
        const collectNodeOffsets = (n) => {
          if (!n) return;
          yOffsetMap[n.id] = n.manualYOffset || 0; xOffsetMap[n.id] = n.manualXOffset || 0;
          if (n.children) n.children.forEach(collectNodeOffsets);
          if (n.peripheries) n.peripheries.forEach(collectNodeOffsets);
        };
        collectNodeOffsets(diagram.root);

        document.querySelectorAll('[data-node-id].tree-node').forEach(el => {
          const id = el.getAttribute('data-node-id');
          const y = yOffsetMap[id] || 0; const x = xOffsetMap[id] || 0;
          el.style.transform = (x || y) ? `translate(${x}px, ${y}px)` : 'none';
        });

        document.querySelectorAll('[data-expr-id]').forEach(el => { el.style.transform = 'none'; });

        const localShifts = {};
        const calculatedLines = [];

        if (diagram.root) {
          const naturalXs = {};
          const measureNatural = (n) => {
            if(!n) return;
            const el = getEl(n.id);
            if (el) naturalXs[n.id] = el.getBoundingClientRect().left + el.getBoundingClientRect().width / 2;
            if(n.children) n.children.forEach(measureNatural);
            if(n.peripheries) n.peripheries.forEach(measureNatural);
          }
          measureNatural(diagram.root);

          const exprMetrics = [];
          diagram.expressions.forEach((expr, index) => {
             const el = getExprEl(expr.id);
             if (el) {
               const rect = el.getBoundingClientRect();
               naturalXs[expr.id] = rect.left + rect.width / 2;
               exprMetrics.push({ id: expr.id, index, left: rect.left - wrapperRect.left, width: rect.width });
             }
          });

          const anchorXs = {};
          const computeAnchors = (n) => {
              if (!n) return;
              if (n.children) n.children.forEach(computeAnchors);
              if (n.peripheries) n.peripheries.forEach(computeAnchors);

              const linkIds = getNodeLinkIds(n);
              const linkCenters = linkIds.map(id => naturalXs[id]).filter(x => x !== undefined);
              if (linkCenters.length) {
                  anchorXs[n.id] = linkCenters.reduce((a,b)=>a+b,0) / linkCenters.length;
              } else if (n.children && n.children.length > 0) {
                  const spineChild = n.children.find(c => c.isSpine);
                  if (spineChild && anchorXs[spineChild.id] !== undefined) {
                      anchorXs[n.id] = anchorXs[spineChild.id];
                  } else {
                      const childAnchors = n.children.map(c => anchorXs[c.id]).filter(x => x !== undefined);
                      if (childAnchors.length > 0) anchorXs[n.id] = (Math.min(...childAnchors) + Math.max(...childAnchors)) / 2;
                  }
              }
          };
          computeAnchors(diagram.root);

          const targetXs = {};
          const computeTargetsTopDown = (n, parentShift) => {
              if (!n || naturalXs[n.id] === undefined) return;
              if (anchorXs[n.id] !== undefined) targetXs[n.id] = anchorXs[n.id];
              else targetXs[n.id] = naturalXs[n.id] + parentShift;

              let containerShift = targetXs[n.id] - naturalXs[n.id];
              const spineChild = n.children && n.children.find(c => c.isSpine);
              if (spineChild && naturalXs[spineChild.id] !== undefined) containerShift = targetXs[n.id] - naturalXs[spineChild.id];

              if (n.children) n.children.forEach(c => computeTargetsTopDown(c, containerShift));
              if (n.peripheries) n.peripheries.forEach(p => computeTargetsTopDown(p, containerShift));
          };
          computeTargetsTopDown(diagram.root, 0);

          const allTreeNodes = collectNodes(diagram.root);
          const nodeRectsForCollision = [];
          allTreeNodes.forEach(n => {
            const el = getEl(n.id);
            if (!el || targetXs[n.id] === undefined) return;
            const rect = el.getBoundingClientRect();
            nodeRectsForCollision.push({ id: n.id, targetCX: targetXs[n.id], width: rect.width, top: rect.top, node: n });
          });

          const shiftSubtree = (node, dx) => {
            (node.children || []).forEach(c => {
              if (targetXs[c.id] !== undefined) targetXs[c.id] += dx;
              const entry = nodeRectsForCollision.find(nr => nr.id === c.id);
              if (entry) entry.targetCX += dx;
              shiftSubtree(c, dx);
            });
            (node.peripheries || []).forEach(p => {
              if (targetXs[p.id] !== undefined) targetXs[p.id] += dx;
              const entry = nodeRectsForCollision.find(nr => nr.id === p.id);
              if (entry) entry.targetCX += dx;
              shiftSubtree(p, dx);
            });
          };

          const resolveOverlaps = () => {
            const bands = {};
            nodeRectsForCollision.forEach(nr => {
              const key = Math.round(nr.top / COLLISION_LEVEL_BAND);
              if (!bands[key]) bands[key] = [];
              bands[key].push(nr);
            });
            Object.values(bands).forEach(group => {
              if (group.length < 2) return;
              for (let pass = 0; pass < 8; pass++) {
                group.sort((a, b) => a.targetCX - b.targetCX);
                let anyOverlap = false;
                for (let i = 1; i < group.length; i++) {
                  const prev = group[i - 1]; const curr = group[i];
                  const minDist = (prev.width + curr.width) / 2 + COLLISION_MIN_NODE_GAP;
                  const dist = curr.targetCX - prev.targetCX;
                  if (dist < minDist) {
                    anyOverlap = true;
                    const push = (minDist - dist) / 2 + 0.5;
                    prev.targetCX -= push; targetXs[prev.id] = prev.targetCX; shiftSubtree(prev.node, -push);
                    curr.targetCX += push; targetXs[curr.id] = curr.targetCX; shiftSubtree(curr.node, push);
                  }
                }
                if (!anyOverlap) break;
              }
            });
          };

          resolveOverlaps();

          const alignSingleChildParents = (n) => {
            if (!n) return;
            (n.children || []).forEach(alignSingleChildParents);
            (n.peripheries || []).forEach(alignSingleChildParents);
            if (n.children && n.children.length === 1 && !getNodeLinkIds(n).length) {
              const child = n.children[0];
              if (targetXs[child.id] !== undefined && targetXs[n.id] !== undefined) {
                const dx = targetXs[child.id] - targetXs[n.id];
                if (Math.abs(dx) > 0.5) {
                  targetXs[n.id] = targetXs[child.id];
                  const entry = nodeRectsForCollision.find(nr => nr.id === n.id);
                  if (entry) entry.targetCX = targetXs[n.id];
                }
              }
            }
          };
          alignSingleChildParents(diagram.root);

          resolveOverlaps();

          const enforcePeripheryGap = (n) => {
            if (!n) return;
            (n.children || []).forEach(enforcePeripheryGap);
            (n.peripheries || []).forEach(perif => {
              enforcePeripheryGap(perif);
              if (targetXs[n.id] === undefined || targetXs[perif.id] === undefined) return;
              const coreEntry = nodeRectsForCollision.find(nr => nr.id === n.id);
              const perifEntry = nodeRectsForCollision.find(nr => nr.id === perif.id);
              if (!coreEntry || !perifEntry) return;
              const coreHalf = coreEntry.width / 2; const perifHalf = perifEntry.width / 2;
              const edgeGap = Math.abs(targetXs[perif.id] - targetXs[n.id]) - coreHalf - perifHalf;
              if (edgeGap < PERIPHERY_MIN_EDGE_GAP) {
                const push = PERIPHERY_MIN_EDGE_GAP - edgeGap;
                if (targetXs[perif.id] < targetXs[n.id]) {
                  targetXs[perif.id] -= push;
                  if (perifEntry) perifEntry.targetCX = targetXs[perif.id];
                  shiftSubtree(perif, -push);
                } else {
                  targetXs[perif.id] += push;
                  if (perifEntry) perifEntry.targetCX = targetXs[perif.id];
                  shiftSubtree(perif, push);
                }
              }
            });
          };
          enforcePeripheryGap(diagram.root);

          resolveOverlaps();

          const nodeToExprMap = getNodeToExprMap();
          const desiredExprCenters = {};
          Object.entries(nodeToExprMap).forEach(([nodeId, exprIds]) => {
            if (targetXs[nodeId] !== undefined) {
              const ids = Array.isArray(exprIds) ? exprIds : [exprIds];
              if (ids.length === 1) {
                desiredExprCenters[ids[0]] = targetXs[nodeId] - wrapperRect.left;
              } else if (ids.length > 1) {
                const exprs = ids.map(id => exprMetrics.find(e => e.id === id)).filter(Boolean);
                if (exprs.length > 0) {
                  let totalWidth = exprs.reduce((sum, e, i) => sum + e.width + (i < exprs.length - 1 ? EQUATOR_MIN_ITEM_GAP : 0), 0);
                  let startX = (targetXs[nodeId] - wrapperRect.left) - totalWidth / 2;
                  exprs.forEach(e => {
                    desiredExprCenters[e.id] = startX + e.width / 2;
                    startX += e.width + EQUATOR_MIN_ITEM_GAP;
                  });
                }
              }
            }
          });
          const finalExprShiftMap = solveEquatorPositions(exprMetrics, desiredExprCenters);

          Object.entries(nodeToExprMap).forEach(([nodeId, exprIds]) => {
            const ids = Array.isArray(exprIds) ? exprIds : [exprIds];
            if (ids.length > 0 && targetXs[nodeId] !== undefined) {
              const centers = ids.map(exprId => {
                const expr = exprMetrics.find(e => e.id === exprId);
                if (!expr) return null;
                return wrapperRect.left + (expr.left + expr.width / 2) + (finalExprShiftMap[expr.id] || 0);
              }).filter(c => c !== null);
              if (centers.length > 0) {
                const avgCenter = centers.reduce((a, b) => a + b, 0) / centers.length;
                targetXs[nodeId] = avgCenter;
                const entry = nodeRectsForCollision.find(nr => nr.id === nodeId);
                if (entry) entry.targetCX = avgCenter;
              }
            }
          });

          alignSingleChildParents(diagram.root);

          const applyLocalShifts = (n, inheritedDOMShift) => {
             if (!n || targetXs[n.id] === undefined || naturalXs[n.id] === undefined) return;
             const myAbsShift = targetXs[n.id] - naturalXs[n.id];
             localShifts[n.id] = myAbsShift - inheritedDOMShift;
             if (n.children) n.children.forEach(c => applyLocalShifts(c, myAbsShift));
             if (n.peripheries) n.peripheries.forEach(p => applyLocalShifts(p, inheritedDOMShift));
          }
          applyLocalShifts(diagram.root, 0);

          Object.assign(localShifts, finalExprShiftMap);

          Object.keys(localShifts).forEach(id => {
            const el = getWrapperEl(id);
            if (el) {
              const x = (localShifts[id] || 0) + (xOffsetMap[id] || 0);
              const y = (yOffsetMap[id] || 0);
              el.style.transform = (x || y) ? `translate(${x}px, ${y}px)` : 'none';
            }
          });

          exprMetrics.forEach(expr => {
            const el = document.querySelector(`[data-expr-id="${expr.id}"]`);
            if (!el) return;
            const x = localShifts[expr.id] || 0;
            el.style.transform = x ? `translateX(${x}px)` : 'none';
          });

          diagram.expressions.forEach(expr => {
            if (!expr.operatorLayers) return;
            let currentSpineShiftX = 0; 
            expr.operatorLayers.forEach(layer => {
              if (layer.superiorLayerId) {
                const sourceLabel = getOpEl(layer.id);
                const targetLabel = getOpEl(layer.superiorLayerId) || getExprEl(layer.superiorLayerId);
                const exprLabel = getExprEl(expr.id); 
                if (sourceLabel && targetLabel && exprLabel) {
                  const targetRect = targetLabel.getBoundingClientRect();
                  const exprRect = exprLabel.getBoundingClientRect();
                  const targetX = targetRect.left + targetRect.width / 2;
                  const anchorX = exprRect.left + exprRect.width / 2;
                  const midX = (anchorX + targetX) / 2;
                  currentSpineShiftX = midX - anchorX;
                }
              }
              const layerWrapper = document.querySelector(`[data-operator-id="${layer.id}"]`);
              if (layerWrapper) {
                const manualX = layer.manualXOffset || 0;
                const totalX = currentSpineShiftX + manualX;
                layerWrapper.style.transform = totalX ? `translateX(${totalX}px)` : 'none';
              }
            });
          });

          const measureLines = (n) => {
            if (!n) return;
            const pLabel = getEl(n.id);
            if (pLabel) {
              const pRect = pLabel.getBoundingClientRect();
              const pBottomX = pRect.left + pRect.width / 2 - wrapperRect.left;
              const pBottomY = pRect.bottom - wrapperRect.top;

              const linkedExprIds = getNodeLinkIds(n);
              if (linkedExprIds.length) {
                if (n.linkAsTriangle) {
                  let minLeft = Infinity; let maxRight = -Infinity; let eTop = 0;
                  linkedExprIds.forEach((exprId) => {
                    const eLabel = getExprEl(exprId);
                    if (eLabel) {
                      const eRect = eLabel.getBoundingClientRect();
                      minLeft = Math.min(minLeft, eRect.left - wrapperRect.left);
                      maxRight = Math.max(maxRight, eRect.right - wrapperRect.left);
                      eTop = eRect.top - wrapperRect.top;
                    }
                  });
                  if (minLeft !== Infinity) {
                    const padX = 4; const liftY = 2; 
                    calculatedLines.push({
                      id: `expr-triangle-${n.id}`,
                      isTriangle: true,
                      points: `${pBottomX},${pBottomY} ${minLeft - padX},${eTop - liftY} ${maxRight + padX},${eTop - liftY}`
                    });
                  }
                } else {
                  linkedExprIds.forEach((exprId, idx) => {
                    const eLabel = getExprEl(exprId);
                    if (eLabel) {
                      const eRect = eLabel.getBoundingClientRect();
                      calculatedLines.push({
                        id: `expr-line-${n.id}-${exprId}-${idx}`,
                        x1: pBottomX, y1: pBottomY,
                        x2: eRect.left + eRect.width / 2 - wrapperRect.left,
                        y2: eRect.top - wrapperRect.top,
                        isArrow: false
                      });
                    }
                  });
                }
              }

              if (n.children) {
                n.children.forEach(child => {
                  const childLabel = getEl(child.id);
                  if (childLabel) {
                    const cRect = childLabel.getBoundingClientRect();
                    calculatedLines.push({
                      id: `line-${n.id}-${child.id}`,
                      x1: pBottomX, y1: pBottomY,
                      x2: cRect.left + cRect.width / 2 - wrapperRect.left,
                      y2: cRect.top - wrapperRect.top,
                      isArrow: false
                    });
                  }
                  measureLines(child);
                });
              }

              if (n.peripheries) {
                const mainRect = pLabel.getBoundingClientRect();
                const mainCenterX = mainRect.left + mainRect.width / 2;
                n.peripheries.forEach(perif => {
                  const perifLabel = getEl(perif.id);
                  if (perifLabel) {
                    const pRect = perifLabel.getBoundingClientRect();
                    const pCenterX = pRect.left + pRect.width / 2;
                    const y = mainRect.top + mainRect.height / 2 - wrapperRect.top;
                    let x1, x2; const buffer = 4;
                    if (pCenterX < mainCenterX) {
                        x1 = pRect.right - wrapperRect.left + buffer;
                        x2 = mainRect.left - wrapperRect.left - buffer;
                    } else {
                        x1 = pRect.left - wrapperRect.left - buffer;
                        x2 = mainRect.right - wrapperRect.left + buffer;
                    }
                    calculatedLines.push({
                      id: `perif-${n.id}-${perif.id}`,
                      x1, y1: y, x2, y2: y,
                      isArrow: true
                    });
                  }
                  measureLines(perif);
                });
              }
            }
          };
          measureLines(diagram.root);
        }

        diagram.expressions.forEach(expr => {
          if (!expr.operatorLayers || !expr.operatorLayers.length) return;
          const exprLabel = getExprEl(expr.id);
          if (!exprLabel) return;
          const exprRect = exprLabel.getBoundingClientRect();
          
          let prevBottomX = exprRect.left + exprRect.width / 2 - wrapperRect.left;
          let prevBottomY = exprRect.bottom - wrapperRect.top;
          
          if (diagram.hasSecondaryGloss) {
            prevBottomY += 25;
          }

          expr.operatorLayers.forEach((layer) => {
            const layerLabel = getOpEl(layer.id);
            if (!layerLabel) return;
            const layerRect = layerLabel.getBoundingClientRect();
            
            const currentLayerX = layerRect.left + layerRect.width / 2 - wrapperRect.left;
            const layerTopY = layerRect.top - wrapperRect.top;
            const layerBottomY = layerRect.bottom - wrapperRect.top;

            calculatedLines.push({
              id: `op-line-${expr.id}-${layer.id}`,
              x1: prevBottomX, y1: prevBottomY,
              x2: currentLayerX, y2: layerTopY,
              isArrow: false
            });
            
            prevBottomX = currentLayerX;
            prevBottomY = layerBottomY;

            if (layer.operators) {
              const layerCenterX = layerRect.left + layerRect.width / 2;
              layer.operators.forEach(op => {
                const opLabel = getOpNodeEl(op.id);
                if (!opLabel) return;
                const opRect = opLabel.getBoundingClientRect();
                const opCenterX = opRect.left + opRect.width / 2;
                const y = layerRect.top + layerRect.height / 2 - wrapperRect.top;
                const buffer = 4;
                let x1, x2;
                if (opCenterX < layerCenterX) {
                  x1 = opRect.right - wrapperRect.left + buffer;
                  x2 = layerRect.left - wrapperRect.left - buffer;
                } else {
                  x1 = opRect.left - wrapperRect.left - buffer;
                  x2 = layerRect.right - wrapperRect.left + buffer;
                }
                calculatedLines.push({
                  id: `oparrow-${layer.id}-${op.id}`,
                  x1, y1: y, x2, y2: y,
                  isArrow: true
                });

                const opLinkedIds = getNodeLinkIds(op);
                opLinkedIds.forEach((linkedExprId, idx) => {
                  const linkedExprLabel = getExprEl(linkedExprId);
                  if (!linkedExprLabel) return;
                  const linkedRect = linkedExprLabel.getBoundingClientRect();
                  calculatedLines.push({
                    id: `oplink-${op.id}-${linkedExprId}-${idx}`,
                    x1: opRect.left + opRect.width / 2 - wrapperRect.left,
                    y1: opRect.top - wrapperRect.top,
                    x2: linkedRect.left + linkedRect.width / 2 - wrapperRect.left,
                    y2: linkedRect.bottom - wrapperRect.top + (diagram.hasSecondaryGloss ? 25 : 0),
                    isArrow: false,
                    isDashed: true
                  });
                });
              });
            }
          });
        });

        diagram.expressions.forEach(expr => {
          if (!expr.operatorLayers) return;
          expr.operatorLayers.forEach(layer => {
            if (!layer.superiorLayerId) return;
            const sourceLabel = getOpEl(layer.id);
            const targetLabel = getOpEl(layer.superiorLayerId) || getExprEl(layer.superiorLayerId);
            if (!sourceLabel || !targetLabel) return;
            const srcRect = sourceLabel.getBoundingClientRect();
            const tgtRect = targetLabel.getBoundingClientRect();
            calculatedLines.push({
              id: `crosslink-${layer.id}-${layer.superiorLayerId}`,
              x1: srcRect.left + srcRect.width / 2 - wrapperRect.left,
              y1: srcRect.top - wrapperRect.top,
              x2: tgtRect.left + tgtRect.width / 2 - wrapperRect.left,
              y2: tgtRect.bottom - wrapperRect.top,
              isArrow: false,
              isDashed: false
            });
          });
        });

        diagram.expressions.forEach((expr, idx) => {
          if (!expr.infoUnit) return;
          const exprLabel = getExprEl(expr.id);
          const infoLabel = getInfoEl(expr.infoUnit.id);
          const infoNodeWrapper = document.querySelector(`[data-info-id="${expr.infoUnit.id}"]`);
          if (!exprLabel || !infoLabel || !infoNodeWrapper) return;

          const exprRect = exprLabel.getBoundingClientRect();
          const sLeft = expr.infoUnit.spanLeft || 0;
          const sRight = expr.infoUnit.spanRight || 0;

          let minLeft = Infinity; let maxRight = -Infinity; let maxBottomY = -Infinity;
          for (let i = Math.max(0, idx - sLeft); i <= Math.min(diagram.expressions.length - 1, idx + sRight); i++) {
            const spanExpr = diagram.expressions[i];
            const spanExprEl = getExprEl(spanExpr.id);
            if (spanExprEl) {
              const sRect = spanExprEl.getBoundingClientRect();
              minLeft = Math.min(minLeft, sRect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, sRect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, sRect.bottom - wrapperRect.top);
            }
          }
          
          if (diagram.hasSecondaryGloss) {
            maxBottomY += 25;
          }

          const targetCenterX = (minLeft + maxRight) / 2;
          const anchorCenterX = (exprRect.left + exprRect.width / 2) - wrapperRect.left;
          const shiftX = targetCenterX - anchorCenterX;

          infoNodeWrapper.style.transform = `translateX(${shiftX}px)`;

          const infoRectNow = infoLabel.getBoundingClientRect();
          const infoCenterX = infoRectNow.left + infoRectNow.width / 2 - wrapperRect.left;
          const infoTopY = infoRectNow.top - wrapperRect.top;

          if (sLeft === 0 && sRight === 0) {
            calculatedLines.push({
              id: `info-line-${expr.id}-${expr.infoUnit.id}-single`,
              x1: anchorCenterX, y1: maxBottomY,
              x2: infoCenterX, y2: infoTopY,
              isArrow: false, isDotted: true
            });
          } else {
            const bracketY = maxBottomY + 10; 
            const tickHeight = 6; 
            calculatedLines.push({
              id: `info-bracket-${expr.id}-${expr.infoUnit.id}`,
              isPath: true,
              d: `M ${minLeft} ${bracketY - tickHeight} L ${minLeft} ${bracketY} L ${maxRight} ${bracketY} L ${maxRight} ${bracketY - tickHeight}`,
              stroke: "#343a40", strokeWidth: "1.5", isDashed: false 
            });
            calculatedLines.push({
              id: `info-line-${expr.id}-${expr.infoUnit.id}-center`,
              x1: targetCenterX, y1: bracketY,
              x2: infoCenterX, y2: infoTopY,
              isArrow: false, isDotted: true 
            });
          }
        });

        let globalPfdMidX = null; let globalPfdVertexY = null;
        let pfdLeftX = null, pfdRightX = null, pfdBaseY = null, pfdVertexX = null, pfdVtxY = null;

        const pfdNodes = diagram.expressions.filter(e => e.infoUnit && e.infoUnit.isPotentialFocus);
        if (pfdNodes.length > 0) {
          let minLeft = Infinity; let maxRight = -Infinity; let maxBottomY = -Infinity;
          pfdNodes.forEach(expr => {
            const infoLabel = getInfoEl(expr.infoUnit.id);
            if (infoLabel) {
              const rect = infoLabel.getBoundingClientRect();
              minLeft = Math.min(minLeft, rect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, rect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, rect.bottom - wrapperRect.top);
            }
          });
          if (minLeft !== Infinity) {
            const baseY = maxBottomY + 16; 
            const speechActOffset = diagram.speechActYOffset || 0;
            const pfdHeight = 150;
            const vertexY = baseY + pfdHeight + speechActOffset; 
            const midX = (minLeft + maxRight) / 2;
            
            const dxLeft = Math.abs(midX - minLeft);
            const hypRatioLeft = Math.sqrt(dxLeft * dxLeft + pfdHeight * pfdHeight) / pfdHeight;
            const dxRight = Math.abs(maxRight - midX);
            const hypRatioRight = Math.sqrt(dxRight * dxRight + pfdHeight * pfdHeight) / pfdHeight;

            const hasSolidFocusTriangle = diagram.expressions.some(e => 
              e.infoUnit && (e.infoUnit.isActualFocus || e.infoUnit.focusType === 'completive' || e.infoUnit.focusType === 'contrastive')
            );

            let dynamicPadLeft = 17; let dynamicPadRight = 17;
            if (hasSolidFocusTriangle) {
              const specializedPad = 9; const visualGap = 26; 
              dynamicPadLeft = Math.max(17, specializedPad + (visualGap * hypRatioLeft));
              dynamicPadRight = Math.max(17, specializedPad + (visualGap * hypRatioRight));
            }

            const pfdInset = 7;
            dynamicPadLeft = Math.max(9, dynamicPadLeft - pfdInset);
            dynamicPadRight = Math.max(9, dynamicPadRight - pfdInset);

            globalPfdMidX = midX; globalPfdVertexY = vertexY;
            pfdLeftX = minLeft - dynamicPadLeft; pfdRightX = maxRight + dynamicPadRight;
            pfdBaseY = baseY; pfdVertexX = midX; pfdVtxY = vertexY;

            calculatedLines.push({
              id: 'pfd-triangle-path',
              isPath: true, isDashed: true,
              d: `M ${pfdLeftX} ${baseY} L ${midX} ${vertexY} L ${pfdRightX} ${baseY}`,
              stroke: "#343a40", strokeWidth: "1.5"
            });

            calculatedLines.push({
              id: 'pfd-text',
              isText: true, isSpeechAct: true,
              text: 'Speech Act',
              x: midX, y: vertexY + 22 
            });
          }
        }

        const afdNodes = diagram.expressions.filter(e => e.infoUnit && e.infoUnit.isActualFocus);
        if (afdNodes.length > 0) {
          let minLeft = Infinity; let maxRight = -Infinity; let maxBottomY = -Infinity;
          afdNodes.forEach(expr => {
            const infoLabel = getInfoEl(expr.infoUnit.id);
            if (infoLabel) {
              const rect = infoLabel.getBoundingClientRect();
              minLeft = Math.min(minLeft, rect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, rect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, rect.bottom - wrapperRect.top);
            }
          });

          if (minLeft !== Infinity) {
            const padX = 9; const speechActOffset = diagram.speechActYOffset || 0; const gap = 15; 
            let afdLX = minLeft - padX; let afdRX = maxRight + padX; let afdBY = maxBottomY + 16;
            const afdMidX = (afdLX + afdRX) / 2;
            let afdVY = afdBY + 145 + speechActOffset;
            const afdVX = globalPfdMidX !== null ? globalPfdMidX : afdMidX;

            if (pfdVtxY !== null) {
              const distToLine = (px, py, x1, y1, x2, y2) => {
                const A = py - y1; const B = px - x1; const dx = x2 - x1; const dy = y2 - y1;
                return Math.abs(A * dx - B * dy) / Math.sqrt(dx * dx + dy * dy);
              };

              afdBY = pfdBaseY;
              const distL = distToLine(afdLX, afdBY, pfdLeftX, pfdBaseY, pfdVertexX, pfdVtxY);
              if (distL < gap) {
                const lDx = pfdVertexX - pfdLeftX; const lDy = pfdVtxY - pfdBaseY;
                const lLen = Math.sqrt(lDx * lDx + lDy * lDy);
                const needed = (gap - distL) * lLen / Math.abs(lDy);
                afdLX += needed;
              }

              const distR = distToLine(afdRX, afdBY, pfdRightX, pfdBaseY, pfdVertexX, pfdVtxY);
              if (distR < gap) {
                const rDx = pfdVertexX - pfdRightX; const rDy = pfdVtxY - pfdBaseY;
                const rLen = Math.sqrt(rDx * rDx + rDy * rDy);
                const needed = (gap - distR) * rLen / Math.abs(rDy);
                afdRX -= needed;
              }
              afdVY = pfdVtxY - gap;
            }

            const hasCompletiveFD = diagram.expressions.some(e => e.infoUnit && e.infoUnit.focusType === 'completive');
            const hasContrastiveFD = diagram.expressions.some(e => e.infoUnit && e.infoUnit.focusType === 'contrastive');
            const shouldDrawAfdTriangle = !(hasCompletiveFD && hasContrastiveFD);

            if (shouldDrawAfdTriangle) {
              calculatedLines.push({
                id: 'afd-triangle-path',
                isPath: true, isDashed: false,
                d: `M ${afdLX} ${afdBY - 2} L ${afdRX} ${afdBY - 2} L ${afdVX} ${afdVY} Z`,
                stroke: "#343a40", strokeWidth: "1.5"
              });
            }

            if (globalPfdVertexY === null) {
              calculatedLines.push({
                id: 'pfd-text',
                isText: true, isSpeechAct: true,
                text: 'Speech Act',
                x: afdVX, y: afdVY + 22
              });
            }
          }
        }

        const compNodes = diagram.expressions.filter(e => e.infoUnit && e.infoUnit.focusType === 'completive');
        if (compNodes.length > 0) {
          let minLeft = Infinity, maxRight = -Infinity, maxBottomY = -Infinity;
          compNodes.forEach(expr => {
            const infoLabel = getInfoEl(expr.infoUnit.id);
            if (infoLabel) {
              const rect = infoLabel.getBoundingClientRect();
              minLeft = Math.min(minLeft, rect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, rect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, rect.bottom - wrapperRect.top);
            }
          });
          if (minLeft !== Infinity) {
            const padX = 9; const speechActOffset = diagram.speechActYOffset || 0;
            let cLX = minLeft - padX, cRX = maxRight + padX, cBY = maxBottomY + 16;
            const cVX = globalPfdMidX !== null ? globalPfdMidX : (cLX + cRX) / 2;
            let cVY = cBY + 145 + speechActOffset;
            if (pfdVtxY !== null) { if (cVY > pfdVtxY - 15) cVY = pfdVtxY - 15; }
            let strokeLeftSide = true, strokeRightSide = true;
            if (pfdLeftX !== null && pfdRightX !== null && pfdBaseY !== null && pfdVtxY !== null) {
              const pfdLeftAtCBY = pfdLeftX + (pfdVertexX - pfdLeftX) * (cBY - pfdBaseY) / (pfdVtxY - pfdBaseY);
              const pfdRightAtCBY = pfdRightX + (pfdVertexX - pfdRightX) * (cBY - pfdBaseY) / (pfdVtxY - pfdBaseY);
              if (cLX <= pfdLeftAtCBY + 15) strokeLeftSide = false;
              if (cRX >= pfdRightAtCBY - 15) strokeRightSide = false;
            }
            let strokeD = '';
            if (strokeLeftSide && strokeRightSide) strokeD = `M ${cLX} ${cBY} L ${cVX} ${cVY} L ${cRX} ${cBY} Z`;
            else if (!strokeLeftSide && strokeRightSide) strokeD = `M ${cLX} ${cBY} L ${cRX} ${cBY} L ${cVX} ${cVY}`;
            else if (strokeLeftSide && !strokeRightSide) strokeD = `M ${cVX} ${cVY} L ${cLX} ${cBY} L ${cRX} ${cBY}`;
            else strokeD = `M ${cLX} ${cBY} L ${cRX} ${cBY}`;
            
            calculatedLines.push({
              id: 'comp-triangle-path',
              isPath: true, isHatchedV: true, fillPattern: 'hatch-horizontal',
              clipPoints: `${cLX},${cBY} ${cRX},${cBY} ${cVX},${cVY}`,
              d: strokeD, stroke: "#343a40", strokeWidth: "1.5"
            });
            if (globalPfdVertexY === null && !diagram.expressions.some(e => e.infoUnit?.isActualFocus)) {
              calculatedLines.push({ id: 'pfd-text', isText: true, isSpeechAct: true, text: 'Speech Act', x: cVX, y: Math.max(cVY, pfdVtxY || 0) + 22 });
            }
          }
        }

        const contNodes = diagram.expressions.filter(e => e.infoUnit && e.infoUnit.focusType === 'contrastive');
        if (contNodes.length > 0) {
          let minLeft = Infinity, maxRight = -Infinity, maxBottomY = -Infinity;
          contNodes.forEach(expr => {
            const infoLabel = getInfoEl(expr.infoUnit.id);
            if (infoLabel) {
              const rect = infoLabel.getBoundingClientRect();
              minLeft = Math.min(minLeft, rect.left - wrapperRect.left);
              maxRight = Math.max(maxRight, rect.right - wrapperRect.left);
              maxBottomY = Math.max(maxBottomY, rect.bottom - wrapperRect.top);
            }
          });
          if (minLeft !== Infinity) {
            const padX = 9; const speechActOffset = diagram.speechActYOffset || 0;
            let cLX = minLeft - padX, cRX = maxRight + padX, cBY = maxBottomY + 16;
            const cVX = globalPfdMidX !== null ? globalPfdMidX : (cLX + cRX) / 2;
            let cVY = cBY + 145 + speechActOffset;
            if (pfdVtxY !== null) { if (cVY > pfdVtxY - 15) cVY = pfdVtxY - 15; }
            let strokeLeftSide = true, strokeRightSide = true;
            if (pfdLeftX !== null && pfdRightX !== null && pfdBaseY !== null && pfdVtxY !== null) {
              const pfdLeftAtCBY = pfdLeftX + (pfdVertexX - pfdLeftX) * (cBY - pfdBaseY) / (pfdVtxY - pfdBaseY);
              const pfdRightAtCBY = pfdRightX + (pfdVertexX - pfdRightX) * (cBY - pfdBaseY) / (pfdVtxY - pfdBaseY);
              if (cLX <= pfdLeftAtCBY + 15) strokeLeftSide = false;
              if (cRX >= pfdRightAtCBY - 15) strokeRightSide = false;
            }
            let strokeD = '';
            if (strokeLeftSide && strokeRightSide) strokeD = `M ${cLX} ${cBY} L ${cVX} ${cVY} L ${cRX} ${cBY} Z`;
            else if (!strokeLeftSide && strokeRightSide) strokeD = `M ${cLX} ${cBY} L ${cRX} ${cBY} L ${cVX} ${cVY}`;
            else if (strokeLeftSide && !strokeRightSide) strokeD = `M ${cVX} ${cVY} L ${cLX} ${cBY} L ${cRX} ${cBY}`;
            else strokeD = `M ${cLX} ${cBY} L ${cRX} ${cBY}`;
            
            calculatedLines.push({
              id: 'cont-triangle-path',
              isPath: true, isHatchedV: true, fillPattern: 'hatch-vertical',
              clipPoints: `${cLX},${cBY} ${cRX},${cBY} ${cVX},${cVY}`,
              d: strokeD, stroke: "#343a40", strokeWidth: "1.5"
            });
            if (globalPfdVertexY === null && !diagram.expressions.some(e => e.infoUnit?.isActualFocus) && compNodes.length === 0) {
              calculatedLines.push({ id: 'pfd-text', isText: true, isSpeechAct: true, text: 'Speech Act', x: cVX, y: Math.max(cVY, pfdVtxY || 0) + 22 });
            }
          }
        }

        setShifts(prev => JSON.stringify(prev) === JSON.stringify(localShifts) ? prev : localShifts);
        setSvgLines(prev => JSON.stringify(prev) === JSON.stringify(calculatedLines) ? prev : calculatedLines);

        const natW = wrapperEl.scrollWidth; const natH = wrapperEl.scrollHeight;
        setWrapperNaturalSize(prev => (prev.w === natW && prev.h === natH) ? prev : { w: natW, h: natH });
        wrapperEl.style.transform = `scale(${zoomLevel / 100})`;

      }, [diagram, editingId, layoutTick, zoomLevel, showConstituent, showOperators, showInfoStructure, projectionFocus]); 

      const editingType = editingId ? getItemTypeById(editingId)?.type : null;

      if (!diagram) {
        return (
          <div className="init-screen">
            <input type="file" ref={fileInputRef} style={{ display: 'none' }} accept=".tlp" onChange={handleFileChange} />
            <div className="init-hero"><img src="telperion_logo.png" alt="Telperion – RRG Tree Builder" /></div>
            <div className="init-container">
              <div className="init-box">
                <h3 style={{fontFamily: 'var(--font-serif)', color: 'var(--accent)', marginBottom: '6px', fontSize: '1.2rem', fontWeight: 600}}>New Tree</h3>
                <p style={{color: 'var(--text-secondary)', marginBottom: '16px', fontSize: '0.9rem'}}>Type the full expression, then click between items to mark boundaries</p>
                <form onSubmit={handleGenerateBase} style={{display: 'flex', flexDirection: 'column', flex: 1}}>
                  <div style={{display: 'flex', gap: '8px', alignItems: 'stretch'}}>
                    <input type="text" className="sentence-input" placeholder="e.g. The big dog ran quickly through the park" value={rawText} onChange={handleRawTextChange} ref={sentenceInputRef} autoFocus style={{flex: 1}} />
                    <button type="button" className={`ipa-toggle-btn${showIPA ? ' active' : ''}`} onClick={() => setShowIPA(prev => !prev)} title="IPA character picker"><span style={{fontSize: '1.05rem'}}>ə</span> IPA</button>
                  </div>
                  {showIPA && (
                    <div className="ipa-panel">
                      {IPA_CATEGORIES.map((cat) => (
                        <div key={cat.title}>
                          <div className="ipa-category-title">{cat.title}</div>
                          <div className="ipa-grid">
                            {cat.chars.map((ch, j) => (<button key={j} type="button" className="ipa-char-btn" onClick={() => insertIPAChar(ch)} title={ch}>{ch}</button>))}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {words.length > 0 && (
                    <div className="segment-workspace">
                      <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '8px'}}>
                        <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)', fontStyle: 'italic'}}>Click between items to split</span>
                        <div style={{display: 'flex', gap: '6px'}}>
                          <button type="button" className="btn" style={{padding: '3px 10px', fontSize: '0.8rem', fontWeight: 'normal'}} onClick={splitAll}>Split All</button>
                          <button type="button" className="btn" style={{padding: '3px 10px', fontSize: '0.8rem', fontWeight: 'normal'}} onClick={clearCuts} disabled={cuts.size === 0}>Clear</button>
                        </div>
                      </div>
                      <div className="word-flow">
                        {words.map((word, i) => (
                          <React.Fragment key={i}>
                            <span className="word-token">{word}</span>
                            {i < words.length - 1 && (<div className={`cut-zone ${cuts.has(i) ? 'active' : ''}`} onClick={() => toggleCut(i)} title={cuts.has(i) ? 'Remove boundary' : 'Add boundary'} />)}
                          </React.Fragment>
                        ))}
                      </div>
                      <div className="segment-preview">
                        <span style={{fontSize: '0.8rem', color: 'var(--text-secondary)', fontStyle: 'italic', marginRight: '4px'}}>{getSegments().length === 1 ? '1 segment →' : `${getSegments().length} segments →`}</span>
                        {getSegments().map((seg, i) => (<span key={i} className="segment-chip">{seg}</span>))}
                      </div>
                    </div>
                  )}
                  <div style={{marginTop: 'auto'}}>
                    <button type="submit" className="btn btn-primary" style={{width: '100%', padding: '12px', fontSize: '1.05rem'}} disabled={words.length === 0}>Generate Initial Expression</button>
                  </div>
                </form>
              </div>

              <div 
                className="init-box" 
                style={{
                  flex: '0 0 280px', justifyContent: 'center', borderColor: isDragOver ? 'var(--accent)' : undefined,
                  borderStyle: isDragOver ? 'dashed' : 'solid', boxShadow: isDragOver ? '0 0 0 3px rgba(15, 81, 50, 0.10)' : undefined, transition: 'all 0.2s ease'
                }}
                onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}
              >
                <div style={{textAlign: 'center'}}>
                  {isDragOver ? (
                    <>
                      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom: '12px'}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                      <h3 style={{fontFamily: 'var(--font-serif)', color: 'var(--accent)', marginBottom: '8px', fontSize: '1.15rem', fontWeight: 600}}>Drop here</h3>
                    </>
                  ) : (
                    <>
                      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#adb5bd" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{marginBottom: '12px'}}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                      <h3 style={{fontFamily: 'var(--font-serif)', color: '#495057', marginBottom: '6px', fontSize: '1.15rem', fontWeight: 600}}>Load Tree</h3>
                      <p style={{color: 'var(--text-secondary)', marginBottom: '20px', fontSize: '0.85rem'}}>Drop a .tlp file here<br/>or click to browse</p>
                    </>
                  )}
                  <button type="button" className="btn" style={{width: '100%', padding: '10px', fontSize: '0.95rem'}} onClick={handleLoadClick}>Load .tlp File</button>
                </div>
              </div>
            </div>

            <div style={{textAlign: 'center', marginTop: '20px'}}>
              <a href="manual.html" target="_blank" rel="noopener noreferrer" style={{color: 'rgba(255,255,255,0.65)', fontSize: '1.1rem', textDecoration: 'none', fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: '6px', transition: 'color 0.2s ease'}} onMouseEnter={(e) => e.currentTarget.style.color = 'white'} onMouseLeave={(e) => e.currentTarget.style.color = 'rgba(255,255,255,0.65)'}>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>User Manual
              </a>
            </div>
            <footer className="app-footer" style={{marginTop: 'auto', width: '100%'}}>
              <p>Carlos González Vergara (<strong><a href="mailto:cgonzalv@uc.cl">cgonzalv@uc.cl</a></strong>)</p>
              <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank" rel="noopener noreferrer"><img src="https://mirrors.creativecommons.org/presskit/buttons/88x31/svg/by-nc-nd.svg" alt="CC BY-NC-ND 4.0" /></a>
            </footer>
          </div>
        );
      }

      const info = getSelectedInfo();
      const isSyntax = info && info.type === 'node';
      const isExpr = info && (info.type === 'expression' || info.type === 'gloss');
      const isOperator = info && info.type === 'operator';
      const isOperatorNode = info && info.type === 'operatorNode';
      const isInfoUnit = info && info.type === 'infoUnit';
      const isSpeechAct = info && info.type === 'speechAct';
      const canAddParent = isSyntax && info && !info.parent;
      const canDeleteSelection = Boolean(info) && !isSpeechAct;
      const deleteLabel = isInfoUnit ? '✕ Delete Information Unit' : isOperatorNode ? '✕ Delete Operator' : isOperator ? '✕ Delete Layer' : isExpr ? '✕ Delete Item' : (isSyntax ? '✕ Delete Node' : '✕ Delete');
      
      let canMoveLeft = false; let canMoveRight = false; let isSpineActive = false; let canSpine = false;
      
      if (info) {
        if (info.type === 'expression' || info.type === 'gloss') {
          canMoveLeft = info.index > 0;
          canMoveRight = info.index < diagram.expressions.length - 1;
        } else if (info.type === 'node' && info.parent) {
          if (info.nodeType === 'child') {
            canMoveLeft = info.index > 0;
            canMoveRight = info.index < info.parent.children.length - 1;
            canSpine = true;
            isSpineActive = info.parent.children[info.index].isSpine;
          } else if (info.nodeType === 'periphery') {
            const lefts = (info.parent.peripheries || []).filter(p => p.side === 'left');
            const rights = (info.parent.peripheries || []).filter(p => p.side === 'right');
            const visual = [...lefts, 'CORE', ...rights];
            const currentIndex = visual.findIndex(item => item !== 'CORE' && item.id === selectedId);
            canMoveLeft = currentIndex > 0;
            canMoveRight = currentIndex < visual.length - 1;
          }
        }
      }

      const selectedNodeData = isSyntax ? findNode(diagram.root, selectedId) : null;
      const { syntaxMap, operatorMap } = getLinkedExpressionsMaps();

      return (
        <>
        <div className="main-layout" onClick={() => { setSelectedId(null); setEditingId(null); setLinkingLayerId(null); }}>
          <svg style={{ width: 0, height: 0, position: 'absolute' }}>
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#343a40" />
              </marker>
            </defs>
          </svg>

          <div style={{ display: 'flex', flexDirection: 'column', minWidth: 0, minHeight: 0, overflow: 'hidden' }}>
            <header className="topbar">
              <div className="brand-header">
                <img src="telperion_mini.png" alt="Telperion Logo" className="brand-logo" />
                <div className="brand-text">
                  <span className="brand-title">Telperion</span>
                  <span className="brand-subtitle">RRG tree builder</span>
                </div>
                <button className="btn btn-primary" style={{ marginLeft: '16px' }} onClick={() => window.open('manual.html', '_blank')}>Manual</button>
              </div>
  
              <div style={{ display: 'flex', gap: '8px', alignItems: 'center' }}>
                <button className="btn" onClick={handleLoadClick}>Load .tlp</button>
                <button className="btn" onClick={handleSave} disabled={!diagram}>Save .tlp</button>
                <button className="btn" onClick={handleExportPNG} disabled={!diagram}>Export .png</button>
                <div style={{width: '1px', background: 'var(--border-light)', margin: '0 4px', alignSelf: 'stretch'}}></div>
                <button className="btn" onClick={undo} disabled={historyIndex <= 0} title="Undo (Ctrl/⌘+Z)" style={{padding: '7px 10px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M3 7v6h6"></path>
                    <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path>
                  </svg>
                </button>
                <button className="btn" onClick={redo} disabled={historyIndex >= history.length - 1} title="Redo (Ctrl/⌘+Y)" style={{padding: '7px 10px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M21 7v6h-6"></path>
                    <path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path>
                  </svg>
                </button>
                <div style={{width: '1px', background: 'var(--border-light)', margin: '0 4px', alignSelf: 'stretch'}}></div>
                <button className="btn btn-primary" onClick={startNewDiagram}>New Diagram</button>
                <input type="file" ref={fileInputRef} style={{ display: 'none' }} accept=".tlp" onChange={handleFileChange} />
              </div>
            </header>

            <div className="canvas-container" onClick={(e) => {
              e.stopPropagation(); setSelectedId(null); setEditingId(null); setLinkingLayerId(null); setFocusSelectionMode(null); setShowFocusDomains(false);
            }}>
              <div className={`zoom-controls ${diagram ? 'visible' : ''}`}>
                <button className="zoom-btn" onClick={zoomOut} disabled={zoomLevel <= ZOOM_MIN} title="Zoom out (Ctrl/⌘ + −)">−</button>
                <div className="zoom-indicator" onClick={zoomReset} title="Reset zoom (Ctrl/⌘ + 0)">{zoomLevel}%</div>
                <button className="zoom-btn" onClick={zoomIn} disabled={zoomLevel >= ZOOM_MAX} title="Zoom in (Ctrl/⌘ + +)">+</button>
              </div>

              <div className={`autosave-indicator ${(isSaving || lastSaved) && diagram ? 'visible' : ''}`}>
                {isSaving ? (<span style={{display:'flex',alignItems:'center',gap:'4px'}}><span style={{animation:'pulse 1.5s ease-in-out infinite'}}>☁</span> Saving</span>) : lastSaved ? (<span>✓ Auto-saved {formatTimeAgo(lastSaved)}</span>) : null}
              </div>

              {linkingLayerId && (
                <div style={{
                  position: 'absolute', top: '12px', left: '50%', transform: 'translateX(-50%)', background: 'var(--accent)', color: 'white', padding: '8px 20px', borderRadius: '8px',
                  fontSize: '0.9rem', fontWeight: 500, zIndex: 9999, boxShadow: '0 2px 8px rgba(0,0,0,0.15)', display: 'flex', alignItems: 'center', gap: '10px'
                }}>
                  <span>Click a layer node on another spine or a base node to link</span>
                  <button onClick={() => setLinkingLayerId(null)} style={{ background: 'rgba(255,255,255,0.2)', border: 'none', color: 'white', borderRadius: '4px', padding: '2px 8px', cursor: 'pointer', fontSize: '0.85rem' }}>Cancel</button>
                </div>
              )}

              <div style={{ minWidth: wrapperNaturalSize.w ? wrapperNaturalSize.w * (zoomLevel / 100) : '100%', minHeight: wrapperNaturalSize.h ? wrapperNaturalSize.h * (zoomLevel / 100) : '100%', position: 'relative' }}>
              <div className="tree-wrapper" ref={wrapperRef} style={{ paddingTop: `${BASE_TREE_PADDING_TOP + extraTopPadding}px`, paddingRight: `${TREE_PADDING_SIDE}px`, paddingBottom: `${TREE_PADDING_BOTTOM}px`, paddingLeft: `${TREE_PADDING_SIDE}px`, transform: `scale(${zoomLevel / 100})`, transformOrigin: '0 0' }}>
                
                {(() => {
                  const isOperatorSvg = (id) => (id.startsWith('op-line-') || id.startsWith('oparrow-') || id.startsWith('oplink-') || id.startsWith('crosslink-'));

                  const defsBlock = (
                    <defs>
                      <pattern id="hatch-horizontal" patternUnits="userSpaceOnUse" width="6" height="6"><line x1="0" y1="3" x2="6" y2="3" stroke="#343a40" strokeWidth="0.8" /></pattern>
                      <pattern id="hatch-vertical" patternUnits="userSpaceOnUse" width="6" height="6"><line x1="3" y1="0" x2="3" y2="6" stroke="#343a40" strokeWidth="0.8" /></pattern>
                    </defs>
                  );

                  const visibleLines = svgLines.filter(l => {
                    if (!showConstituent && (l.id.startsWith('line-') || l.id.startsWith('perif-') || l.id.startsWith('expr-line-') || l.id.startsWith('expr-triangle-'))) return false;
                    if (!showOperators && isOperatorSvg(l.id)) return false;
                    if (!showInfoStructure && (l.id.startsWith('info-line-') || l.id.startsWith('info-bracket-') || l.id.startsWith('pfd-') || l.id.startsWith('afd-') || l.id.startsWith('comp-') || l.id.startsWith('cont-'))) return false;
                    return true;
                  });

                  const backLines = visibleLines.filter(l => !isOperatorSvg(l.id) && !l.isText);
                  const frontLines = visibleLines.filter(l => isOperatorSvg(l.id) && !l.isText);
                  const textLines = visibleLines.filter(l => l.isText);

                  const renderLine = (l) => {
                    let lineOpacity = 1;
                    if (showOperators && showInfoStructure) {
                      if (projectionFocus === 'IS' && isOperatorSvg(l.id)) lineOpacity = 0.25;
                      if (projectionFocus === 'OP' && (l.id.startsWith('info-line-') || l.id.startsWith('info-bracket-') || l.id.startsWith('pfd-') || l.id.startsWith('afd-') || l.id.startsWith('comp-') || l.id.startsWith('cont-'))) lineOpacity = 0.25;
                    }

                    if (l.isText) {
                      const isSelected = l.isSpeechAct && selectedId === 'speech-act';
                      return (
                        <g key={l.id} style={{ pointerEvents: l.isSpeechAct ? 'auto' : 'none' }}>
                          {l.isSpeechAct && (<rect x={l.x - 56} y={l.y - 16} width={112} height={24} fill="transparent" style={{ cursor: 'pointer' }} onClick={(e) => { e.stopPropagation(); setSelectedId(null); setEditingId(null); setFocusSelectionMode(null); setShowFocusDomains(true); }} />)}
                          {isSelected && (<rect x={l.x - 52} y={l.y - 14} width={104} height={20} rx="3" ry="3" fill="var(--accent)" fillOpacity="0.12" stroke="var(--accent)" strokeWidth="1.5" />)}
                          <text x={l.x} y={l.y} textAnchor="middle" fill="var(--text)" fontSize="16px" fontWeight="400" style={{ fontFamily: "'Source Sans 3', system-ui, sans-serif", transition: 'opacity 0.3s ease', opacity: lineOpacity, cursor: l.isSpeechAct ? 'pointer' : 'default' }} onClick={l.isSpeechAct ? (e) => { e.stopPropagation(); setSelectedId(null); setEditingId(null); setFocusSelectionMode(null); setShowFocusDomains(true); } : undefined}>
                            {l.text}
                          </text>
                        </g>
                      );
                    }

                    if (l.isPath) {
                      if (l.isHatchedV) {
                        const clipId = `clip-${l.id}`;
                        return (
                          <g key={l.id} style={{ transition: 'opacity 0.3s ease', opacity: lineOpacity }}>
                            <defs><clipPath id={clipId}><polygon points={l.clipPoints} /></clipPath></defs>
                            <rect
                              x={l.clipPoints.split(' ').reduce((min, p) => Math.min(min, parseFloat(p.split(',')[0])), Infinity)}
                              y={l.clipPoints.split(' ').reduce((min, p) => Math.min(min, parseFloat(p.split(',')[1])), Infinity)}
                              width={l.clipPoints.split(' ').reduce((max, p) => Math.max(max, parseFloat(p.split(',')[0])), -Infinity) - l.clipPoints.split(' ').reduce((min, p) => Math.min(min, parseFloat(p.split(',')[0])), Infinity)}
                              height={l.clipPoints.split(' ').reduce((max, p) => Math.max(max, parseFloat(p.split(',')[1])), -Infinity) - l.clipPoints.split(' ').reduce((min, p) => Math.min(min, parseFloat(p.split(',')[1])), Infinity)}
                              fill={`url(#${l.fillPattern})`} clipPath={`url(#${clipId})`}
                            />
                            <path d={l.d} fill="none" stroke={l.stroke} strokeWidth={l.strokeWidth} />
                          </g>
                        );
                      }
                      return (<path key={l.id} d={l.d} fill={l.fillPattern ? `url(#${l.fillPattern})` : "none"} stroke={l.stroke || "#343a40"} strokeWidth={l.strokeWidth || "1.5"} strokeDasharray={l.isDashed ? "6 4" : null} style={{ transition: 'opacity 0.3s ease', opacity: lineOpacity }} />);
                    }

                    return l.isTriangle ? (
                      <polygon key={l.id} points={l.points} fill="none" stroke="#343a40" strokeWidth="1.5" strokeDasharray={l.isDashed ? "6 4" : (l.isDotted ? "0 4" : null)} strokeLinecap={l.isDotted ? "round" : undefined} style={{ transition: 'opacity 0.3s ease', opacity: lineOpacity }} />
                    ) : (
                      <line key={l.id} x1={l.x1} y1={l.y1} x2={l.x2} y2={l.y2} stroke="#343a40" strokeWidth="1.5" strokeDasharray={l.isDashed ? "6 4" : (l.isDotted ? "0 4" : null)} strokeLinecap={l.isDotted ? "round" : undefined} markerEnd={l.isArrow ? "url(#arrowhead)" : null} style={{ transition: 'opacity 0.3s ease', opacity: lineOpacity }} />
                    );
                  };

                  return (
                    <>
                      <svg className="svg-layer svg-layer-back">{defsBlock}{backLines.map(renderLine)}</svg>
                      <svg className="svg-layer svg-layer-front">{defsBlock}{frontLines.map(renderLine)}</svg>
                      {textLines.map(l => {
                        let lineOpacity = 1;
                        if (showOperators && showInfoStructure) {
                        if (projectionFocus === 'OP' && l.id.startsWith('pfd-')) lineOpacity = 0.25;
                      }
                      const isSelected = l.isSpeechAct && selectedId === 'speech-act';
                      return (
                      <div key={l.id} 
                        style={{ 
                          position: 'absolute', 
                          left: l.x, 
                          top: l.y, 
                          transform: 'translate(-50%, -75%)', 
                          color: 'var(--text)', 
                          fontSize: '16px', 
                          fontFamily: 'var(--font-sans)', 
                          opacity: lineOpacity, 
                          transition: 'opacity 0.3s ease', 
                          cursor: l.isSpeechAct ? 'pointer' : 'default', 
                          pointerEvents: l.isSpeechAct ? 'auto' : 'none', 
                          zIndex: 65, 
                          padding: '2px 8px', 
                          borderRadius: '4px', 
                          backgroundColor: isSelected ? 'rgba(15, 81, 50, 0.12)' : 'transparent', 
                          border: isSelected ? '1.5px solid var(--accent)' : '1.5px solid transparent',
                          whiteSpace: 'nowrap'
                        }} 
                      onClick={l.isSpeechAct ? (e) => { e.stopPropagation(); setSelectedId(null); setEditingId(null); setFocusSelectionMode(null); setShowFocusDomains(true); } : undefined}>
                    {l.text}
                    </div>
                  );
                  })}
                  </>
                  );
                })()}
                
                {diagram.root && showConstituent && (
                  <div className="syntax-tree-container" style={{ zIndex: editingType === 'node' ? 1000 : 2 }}>
                    <TreeNode node={diagram.root} selectedId={selectedId} editingId={editingId} shifts={shifts} onNodeClick={handleNodeClick} onLabelChange={handleLabelChange} onEditEnd={() => setEditingId(null)} onAddChild={addChildToNode} />
                  </div>
                )}
                
                <div className="lexical-equator" style={{ zIndex: (editingType === 'expression' || editingType === 'gloss' || editingType === 'operator' || editingType === 'operatorNode' || editingType === 'infoUnit') ? 1000 : 2 }}>
                  {diagram.expressions.map(expr => (
                    <ExpressionItem key={expr.id} expr={expr} selectedId={selectedId} editingId={editingId} shifts={shifts}
                      hasSecondaryGloss={diagram.hasSecondaryGloss}
                      onSelect={handleNodeClick} showOperators={showOperators} showInfoStructure={showInfoStructure} projectionFocus={projectionFocus}
                      onAddOperatorLayerAfter={addOperatorLayerAfter}
                      onAddOperatorToLayer={addOperatorToLayer}
                      onChange={handleLabelChange} onEndEdit={() => setEditingId(null)} onDelete={deleteItem} />
                  ))}
                </div>
              </div>
              </div>
            </div>
          </div>

          <div className="sidebar" onClick={(e) => e.stopPropagation()}>
            {info ? (
              <>
                {isSyntax && (
                  <div className="sidebar-section">
                    <div className="btn btn-no-hover" style={{ width: '100%', textAlign: 'left', fontWeight: 'bold', borderColor: 'var(--accent)', borderRadius: '8px', backgroundColor: 'transparent', marginBottom: '12px', cursor: 'default' }}>
                      Constituent Projection
                    </div>
                    
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px' }}>
                      <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)'}}>Daughter(s) node(s):</span>
                      <input type="number" min="0" value={selectedNodeData?.children?.length || 0} onChange={(e) => setDaughtersCount(parseInt(e.target.value, 10))} className="node-number-input" />
                    </div>

                    <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)', marginBottom: '4px'}}>Add periphery or LM:</span>
                    <div className="action-row" style={{marginBottom: '10px'}}>
                      <button onClick={() => addPeriphery('left')} style={{ fontWeight: 'normal' }}>Add Left →</button>
                      <button onClick={() => addPeriphery('right')} style={{ fontWeight: 'normal' }}>← Add Right</button>
                    </div>

                    {canAddParent && (
                      <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '16px' }}>
                        <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)'}}>Add parent node:</span>
                        <button className="btn" onClick={addParentNode} style={{ padding: '4px 12px', fontSize: '0.85rem', fontWeight: 'normal' }}>+ Add Parent</button>
                      </div>
                    )}

                    {(!selectedNodeData.children || selectedNodeData.children.length === 0) && (
                      <>
                        <div style={{borderTop: '1px solid var(--border-light)', paddingTop: '12px', marginTop: '4px', marginBottom: '8px'}}>
                          <span style={{fontSize: '0.85rem', color: 'var(--text-secondary)'}}>Linking to expression item:</span>
                        </div>

                        {info.nodeType === 'periphery' ? (
                          <div style={{display:'flex', flexDirection:'column', gap:'6px', maxHeight:'350px', overflowY:'auto', padding:'6px 0'}}>
                            {diagram.expressions.map(ex => {
                              const owner = syntaxMap[ex.id];
                              const myIds = getNodeLinkIds(selectedNodeData);
                              const isOwnedByMe = myIds.includes(ex.id);
                              const isOwnedByOther = owner && !isOwnedByMe;
                              return (
                                <label key={ex.id} style={{display:'flex', alignItems:'center', gap:'8px', fontSize:'0.9rem', opacity:isOwnedByOther ? 0.65 : 1}}>
                                  <input type="checkbox" checked={isOwnedByMe} disabled={!!isOwnedByOther} onChange={() => handleLinkExpression(ex.id)} />
                                  <span>{renderLabel(ex.label)}{isOwnedByOther ? ` (linked → ${owner})` : ''}</span>
                                </label>
                              );
                            })}
                            {getNodeLinkIds(selectedNodeData).length > 0 && (
                              <>
                                <button className="btn" onClick={() => handleLinkExpression('')} style={{marginTop:'4px', fontWeight: 'normal', marginBottom: '6px'}}>Clear Links</button>
                                <div style={{borderTop: '1px solid var(--border-light)', paddingTop: '8px'}}>
                                  <label style={{display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.85rem', cursor: 'pointer'}}>
                                    <input type="checkbox" checked={!!selectedNodeData.linkAsTriangle} onChange={handleToggleTriangle} />
                                    Draw link as triangle
                                  </label>
                                </div>
                              </>
                            )}
                          </div>
                        ) : (
                          <>
                            <select className="node-select" value={getNodeLinkIds(selectedNodeData)[0] || ''} onChange={(e) => handleLinkExpression(e.target.value)}>
                              <option value="">-- No Link --</option>
                              {diagram.expressions.map(ex => {
                                const owner = syntaxMap[ex.id];
                                const isOwnedByMe = getNodeLinkIds(selectedNodeData).includes(ex.id);
                                const isOwnedByOther = owner && !isOwnedByMe;
                                return (
                                  <option key={ex.id} value={ex.id}>{ex.label}{isOwnedByOther ? ` (linked → ${owner})` : ''}</option>
                                );
                              })}
                            </select>
                            {getNodeLinkIds(selectedNodeData).length > 0 && (
                              <div style={{display: 'flex', flexDirection: 'column', gap: '6px', marginTop: '6px'}}>
                                <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                  <span style={{fontSize: '0.75rem', color: 'var(--accent-hover)'}}>✓ Linked</span>
                                  <button className="btn" onClick={() => handleLinkExpression('')} style={{padding: '2px 8px', fontSize: '0.75rem', fontWeight: 'normal'}}>✕ Clear Link</button>
                                </div>
                                <label style={{display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.85rem', cursor: 'pointer'}}>
                                  <input type="checkbox" checked={!!selectedNodeData.linkAsTriangle} onChange={handleToggleTriangle} />

                      {focusSelectionMode === 'pfd' ? '● Selecting PFD IU(s)… (click to stop)' : 'Select IU(s) as part of the PFD'}
                    </button>
                    {diagram.expressions.some(e => e.infoUnit?.isPotentialFocus) && (

                              {diagram.expressions.filter(e => e.infoUnit?.isActualFocus).map(expr => {

                                const sL = expr.infoUnit?.spanLeft || 0; const sR = expr.infoUnit?.spanRight || 0;
                                const coveredLabels = [];
                                for (let i = Math.max(0, ei - sL); i <= Math.min(diagram.expressions.length - 1, ei + sR); i++) coveredLabels.push(diagram.expressions[i].label || '…');
                                return (
                                  <label key={expr.id} style={{ display: 'flex', alignItems: 'center', gap: '6px', fontSize: '0.84rem', cursor: 'pointer', paddingLeft: '4px' }}>
                                    <input type="checkbox" checked={true} onChange={() => { const newExprs = diagram.expressions.map(e => e.id !== expr.id ? e : { ...e, infoUnit: { ...e.infoUnit, isActualFocus: false, focusType: undefined } }); commitChange({ ...diagram, expressions: newExprs }); }} style={{ width: 14, height: 14, accentColor: 'var(--accent)', cursor: 'pointer' }} />
                                    {coveredLabels.length > 1 ? coveredLabels.join(' · ') : (expr.label || '…')}
                                  </label>

                              })}
                            </div>
                          )}
                        </>
